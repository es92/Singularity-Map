<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity Map</title>
    <meta name="description" content="Navigate the branching futures of artificial intelligence. Your beliefs shape the path.">
    <meta property="og:title" content="Singularity Map">
    <meta property="og:description" content="Choose your own adventure through the future of AI.">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #08080f;
            --bg-surface: #0e0e18;
            --bg-card: #141422;
            --bg-card-hover: #1c1c32;
            --text: #e4e4f0;
            --text-secondary: #9898b0;
            --text-dim: #5c5c74;
            --accent: #00c8ff;
            --accent-glow: rgba(0, 200, 255, 0.1);
            --accent-2: #7c5cff;
            --border: #222238;
            --border-hover: #3a3a58;
            --radius: 12px;
            --radius-sm: 8px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);

            --mood-utopian: #00e088;
            --mood-dystopian: #ff3366;
            --mood-mixed: #ffaa22;
            --mood-stagnant: #7888aa;
            --mood-chaotic: #aa44ff;

            --pill-active-text: #000;
            --shadow-card: rgba(0, 0, 0, 0.25);
        }

        [data-theme="light"] {
            --bg: #f6f6fb;
            --bg-surface: #eeeef6;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0f8;
            --text: #1a1a2e;
            --text-secondary: #4e4e6a;
            --text-dim: #8888a4;
            --accent: #0090cc;
            --accent-glow: rgba(0, 144, 204, 0.08);
            --accent-2: #6a48e0;
            --border: #d4d4e4;
            --border-hover: #b0b0c8;

            --mood-utopian: #00a060;
            --mood-dystopian: #d42050;
            --mood-mixed: #c88000;
            --mood-stagnant: #607088;
            --mood-chaotic: #8830cc;

            --pill-active-text: #fff;
            --shadow-card: rgba(0, 0, 0, 0.08);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 50%, var(--accent-glow) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 20%, rgba(124, 92, 255, 0.025) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        [data-theme="light"] body::before { opacity: 0.5; }

        #app {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            min-height: 100vh;
        }

        #app.fade-out { animation: fadeOut 0.28s var(--ease) forwards; }
        #app.fade-in  { animation: fadeIn  0.28s var(--ease) forwards; }

        @keyframes fadeOut { to { opacity: 0; transform: translateY(8px); } }
        @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.025em; line-height: 1.15; }
        h2 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.015em; line-height: 1.3; }
        h3 { font-size: 1.15rem; font-weight: 600; line-height: 1.4; }

        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.8rem 1.6rem;
            border-radius: var(--radius);
            font-size: 0.95rem; font-weight: 500;
            cursor: pointer; border: none;
            transition: all 0.2s var(--ease);
            text-decoration: none; font-family: inherit;
        }
        .btn-primary { background: var(--accent); color: var(--pill-active-text); }
        .btn-primary:hover {
            filter: brightness(1.15);
            box-shadow: 0 0 24px var(--accent-glow);
        }
        .btn-secondary {
            background: var(--bg-card); color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .btn-ghost {
            background: transparent; color: var(--text-secondary);
            padding: 0.5rem 0.75rem; font-size: 0.9rem;
        }
        .btn-ghost:hover { color: var(--text); }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.85rem; }

        /* ---- Intro ---- */
        .intro {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 82vh; text-align: center;
        }
        .intro h1 {
            font-size: clamp(2.2rem, 6vw, 3.2rem);
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .intro .subtitle {
            color: var(--text-secondary); font-size: 1.15rem;
            margin-bottom: 3rem; max-width: 480px; line-height: 1.7;
        }
        .intro .actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .intro .discovery {
            margin-top: 2.5rem; color: var(--text-dim);
            font-size: 0.85rem; letter-spacing: 0.02em;
        }

        /* ---- Question ---- */
        .question-screen { padding-top: 1.5rem; }
        .breadcrumbs {
            display: flex; align-items: center; flex-wrap: wrap;
            gap: 0.4rem; margin-bottom: 2rem;
            font-size: 0.82rem; color: var(--text-dim);
        }
        .breadcrumbs .crumb { color: var(--text-secondary); cursor: pointer; border-radius: 4px; padding: 0.1rem 0.3rem; transition: background 0.15s, color 0.15s; }
        .breadcrumbs .crumb:hover { background: var(--bg-surface); color: var(--accent); }
        .breadcrumbs .sep { color: var(--text-dim); margin: 0 0.1rem; }
        .question-text {
            font-size: 1.45rem; font-weight: 600;
            margin-bottom: 1rem; line-height: 1.4;
        }
        .question-context {
            color: var(--text-secondary); margin-bottom: 0.75rem;
            font-size: 0.95rem; line-height: 1.75;
        }
        .question-source { margin-bottom: 2rem; }
        .question-source a {
            color: var(--accent); text-decoration: none;
            font-size: 0.82rem; opacity: 0.75;
        }
        .question-source a:hover { opacity: 1; text-decoration: underline; }
        .answers { display: flex; flex-direction: column; gap: 0.7rem; margin-bottom: 2.5rem; }
        .answer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.15rem 1.4rem;
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .answer-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateX(4px);
        }
        .answer-card .label { font-weight: 600; font-size: 1.02rem; margin-bottom: 0.2rem; }
        .answer-card .desc { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.5; }
        .question-nav { display: flex; gap: 0.75rem; }

        /* ---- Outcome ---- */
        .outcome-screen { padding-top: 1.5rem; }
        .outcome-header { margin-bottom: 2rem; }
        .outcome-header h1 { margin-bottom: 0.25rem; }
        .outcome-subtitle {
            color: var(--text-secondary); font-size: 1.15rem; font-weight: 400;
            font-style: italic; margin-bottom: 0.75rem;
        }
        .mood-badge {
            display: inline-block;
            padding: 0.22rem 0.7rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .mood-chaotic  { background: rgba(170,68,255,0.12); color: var(--mood-chaotic);  border: 1px solid rgba(170,68,255,0.25); }
        .mood-utopian  { background: rgba(0,224,136,0.12);  color: var(--mood-utopian);  border: 1px solid rgba(0,224,136,0.25); }
        .mood-dystopian{ background: rgba(255,51,102,0.12); color: var(--mood-dystopian); border: 1px solid rgba(255,51,102,0.25); }
        .mood-mixed    { background: rgba(255,170,34,0.12); color: var(--mood-mixed);    border: 1px solid rgba(255,170,34,0.25); }
        .mood-stagnant { background: rgba(120,136,170,0.12);color: var(--mood-stagnant); border: 1px solid rgba(120,136,170,0.25); }

        .outcome-summary {
            color: var(--text-secondary); font-size: 1.08rem;
            margin-bottom: 2rem; padding-bottom: 2rem;
            border-bottom: 1px solid var(--border); line-height: 1.7;
        }

        .outcome-flavors {
            margin-bottom: 2rem; padding-left: 1rem;
            border-left: 2px solid var(--accent);
        }
        .outcome-flavors p {
            color: var(--text-secondary); font-style: italic;
            font-size: 0.95rem; line-height: 1.7; margin-bottom: 0.5rem;
        }
        .outcome-flavors p:last-child { margin-bottom: 0; }

        .outcome-story { margin-bottom: 3rem; }
        .outcome-story p { margin-bottom: 1.2rem; font-size: 1.02rem; line-height: 1.85; }

        .timeline-section { margin-bottom: 3rem; }
        .timeline-section h2 { margin-bottom: 1.75rem; }
        .timeline { position: relative; padding-left: 2.5rem; }
        .timeline::before {
            content: ''; position: absolute;
            left: 7px; top: 8px; bottom: 8px; width: 2px;
            background: linear-gradient(to bottom, var(--accent), var(--accent-2));
            opacity: 0.3; border-radius: 1px;
        }
        .timeline-event { position: relative; margin-bottom: 1.75rem; }
        .timeline-event:last-child { margin-bottom: 0; }
        .timeline-event::before {
            content: ''; position: absolute;
            left: -2.5rem; top: 0.55rem;
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            border: 2px solid var(--bg);
        }
        .timeline-year {
            font-size: 0.8rem; font-weight: 700; color: var(--accent);
            letter-spacing: 0.04em; margin-bottom: 0.2rem;
        }
        .timeline-headline { font-weight: 600; margin-bottom: 0.2rem; font-size: 0.98rem; display: flex; align-items: baseline; flex-wrap: wrap; }
        .timeline-param-wrap {
            margin-left: auto; display: flex; align-items: baseline; gap: 0.35rem; white-space: nowrap;
        }
        .timeline-param {
            font-size: 0.7rem; font-weight: 500; padding: 0.15rem 0.5rem;
            border-radius: 12px; border: 1px solid var(--accent);
            color: var(--accent);
        }
        .timeline-param-dim {
            font-size: 0.7rem; color: var(--text-dim); font-weight: 400;
        }
        .timeline-desc { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.6; }
        .timeline-slider {
            display: flex; align-items: center; gap: 0.6rem;
            margin-top: 0.5rem; padding: 0.3rem 0;
        }
        .timeline-slider input[type="range"] {
            -webkit-appearance: none; appearance: none;
            height: 4px; border-radius: 2px;
            background: var(--border);
            outline: none; cursor: pointer;
        }
        .timeline-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 4px; height: 18px; border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent-glow);
            cursor: ew-resize;
        }
        .timeline-slider input[type="range"]::-moz-range-thumb {
            width: 4px; height: 18px; border-radius: 2px; border: none;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent-glow);
            cursor: ew-resize;
        }
        .timeline-slider-label {
            font-size: 0.75rem; color: var(--text-dim);
            white-space: nowrap; min-width: 5rem; text-align: right;
        }
        .timeline-year { transition: none; }

        /* ---- Path Summary ---- */
        .path-summary {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.4rem 1.5rem; margin-bottom: 2rem;
        }
        .path-summary h3 {
            margin-bottom: 1rem; color: var(--text-dim);
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 0.06em; font-weight: 600;
        }
        .path-step {
            display: flex; flex-direction: column; gap: 0.15rem;
            margin-bottom: 0.75rem; font-size: 0.88rem;
            line-height: 1.5;
        }
        .path-step:last-child { margin-bottom: 0; }
        .path-step .step-q { color: var(--text-dim); font-size: 0.82rem; }
        .path-step .step-a { color: var(--accent); font-weight: 500; }

        .outcome-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        /* ---- Dimensions badge row ---- */
        .dimensions-row {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            margin-bottom: 1.5rem;
        }
        .dim-badge {
            display: inline-block;
            padding: 0.18rem 0.55rem; border-radius: 12px;
            font-size: 0.7rem; font-weight: 500;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-secondary); letter-spacing: 0.02em;
        }

        /* ---- Gallery ---- */
        .gallery-screen { padding-top: 1.5rem; }
        .gallery-header { margin-bottom: 2rem; }
        .gallery-header h1 { margin-bottom: 0.5rem; }
        .gallery-counter { color: var(--text-secondary); font-size: 0.92rem; }
        .gallery-grid {
            display: grid; grid-template-columns: 1fr;
            gap: 0.85rem; margin-bottom: 2.5rem;
        }
        .gallery-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.35rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .gallery-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px var(--shadow-card);
        }
        .gallery-card .card-top {
            display: flex; align-items: center; gap: 0.65rem;
            margin-bottom: 0.6rem;
        }
        .gallery-card .card-title { font-weight: 600; font-size: 1.05rem; }
        .card-subtitle { font-weight: 400; color: var(--text-secondary); font-style: italic; }
        .gallery-card .card-summary {
            color: var(--text-secondary); font-size: 0.88rem; line-height: 1.6;
        }
        .gallery-card .discovered-tag {
            margin-top: 0.6rem; font-size: 0.75rem;
            color: var(--accent); font-weight: 500;
        }
        .gallery-card .template-tag {
            margin-top: 0.5rem; font-size: 0.7rem;
            color: var(--text-dim);
        }

        /* ---- Tree ---- */
        .tree-screen { padding-top: 1.5rem; }
        .tree-screen > h1 { margin-bottom: 0.5rem; }
        .tree-screen > .tree-subtitle {
            color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 2rem;
        }
        .tree { font-size: 0.88rem; }
        .tree ul { list-style: none; padding-left: 1.5rem; position: relative; }
        .tree > ul { padding-left: 0; }
        .tree ul ul::before {
            content: ''; position: absolute;
            left: 0.55rem; top: 0; bottom: 0.75rem;
            width: 1px; background: var(--border);
        }
        .tree li { position: relative; padding: 0.3rem 0; }
        .tree ul ul > li::before {
            content: ''; position: absolute;
            left: -0.95rem; top: 1.05rem;
            width: 0.85rem; height: 1px;
            background: var(--border);
        }
        .tree ul ul > li:last-child::after {
            content: ''; position: absolute;
            left: -0.95rem; top: 1.05rem; bottom: 0;
            width: 1px; background: var(--bg);
        }
        .tree-question {
            color: var(--text); font-weight: 500;
            margin-bottom: 0.15rem; line-height: 1.45;
            cursor: pointer; display: inline;
        }
        .tree-question:hover { color: var(--accent); }
        .tree-answer {
            color: var(--accent); font-weight: 500;
            cursor: default; line-height: 1.45;
        }
        .tree-outcome {
            display: inline-flex; align-items: center; gap: 0.4rem;
            color: var(--text-secondary); font-weight: 400;
            cursor: pointer; line-height: 1.45;
        }
        .tree-outcome:hover { color: var(--text); }
        .tree-outcome .tree-dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; flex-shrink: 0;
        }
        .tree-subtitle { font-style: italic; opacity: 0.7; }
        .tree-nav { margin-top: 2rem; }

        /* ---- Tree Stage Headers ---- */
        .tree-stage {
            margin-bottom: 1.5rem;
        }
        .tree-stage-header {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.65rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            user-select: none;
            margin-bottom: 0.75rem;
            transition: all 0.2s var(--ease);
        }
        .tree-stage-header:hover {
            border-color: var(--border-hover);
            background: var(--bg-card);
        }
        .tree-stage-header .stage-toggle {
            font-size: 0.7rem; color: var(--text-dim);
            transition: transform 0.2s var(--ease);
            flex-shrink: 0; width: 1rem; text-align: center;
        }
        .tree-stage.collapsed .stage-toggle { transform: rotate(-90deg); }
        .tree-stage-header .stage-num {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--accent); white-space: nowrap;
        }
        .tree-stage-header .stage-label {
            font-weight: 600; font-size: 0.92rem; color: var(--text);
        }
        .tree-stage-header .stage-desc {
            color: var(--text-dim); font-size: 0.8rem;
            margin-left: auto; white-space: nowrap;
        }
        .tree-stage-body {
            overflow: hidden;
            transition: max-height 0.3s var(--ease), opacity 0.2s var(--ease);
            max-height: 5000px; opacity: 1;
        }
        .tree-stage.collapsed .tree-stage-body {
            max-height: 0; opacity: 0;
        }

        .tree-condition {
            font-size: 0.75rem; color: var(--text-dim);
            font-weight: 400; font-style: italic;
            margin-left: 0.35rem;
        }
        .tree-stage-link {
            display: inline-flex; align-items: center; gap: 0.3rem;
            color: var(--accent); font-weight: 500;
            font-size: 0.85rem; cursor: pointer;
            padding: 0.15rem 0.5rem;
            background: var(--accent-glow);
            border-radius: var(--radius-sm);
            transition: all 0.15s var(--ease);
        }
        .tree-stage-link:hover {
            background: var(--accent-glow);
        }

        @media (max-width: 600px) {
            .tree-stage-header .stage-desc { display: none; }
        }

        /* ---- Outcome Dims ---- */
        .outcome-dims {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 0.85rem 1.1rem; margin-bottom: 2rem;
        }
        .outcome-dims-header {
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none;
        }
        .outcome-dims-label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-dim); margin: 0;
        }
        .outcome-dims-toggle {
            background: none; border: none; font-family: inherit;
            font-size: 0.78rem; color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.15rem 0; transition: color 0.15s var(--ease);
        }
        .outcome-dims-toggle:hover { color: var(--text-secondary); }
        .outcome-dims-toggle .chevron {
            display: inline-block; font-size: 0.6rem;
            transition: transform 0.25s var(--ease);
        }
        .outcome-dims.expanded .outcome-dims-toggle .chevron { transform: rotate(180deg); }
        .outcome-dims .dim-stages {
            position: relative;
            max-height: 4.5rem; overflow: hidden;
            transition: max-height 0.35s var(--ease), margin 0.25s var(--ease);
            margin-top: 0.65rem;
        }
        .outcome-dims .dim-stages::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3rem; pointer-events: none;
            background: linear-gradient(to bottom, transparent, var(--bg-surface));
            transition: opacity 0.25s var(--ease);
        }
        .outcome-dims.expanded .dim-stages {
            max-height: 3000px;
        }
        .outcome-dims.expanded .dim-stages::after {
            opacity: 0;
        }

        /* ---- Explorer ---- */
        .explorer-screen { padding-top: 1.5rem; }
        .explorer-screen > h1 { margin-bottom: 0.3rem; }
        .explorer-subtitle { color: var(--text-secondary); font-size: 0.92rem; margin-bottom: 2rem; }

        .dim-stages { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 2.5rem; }
        .dim-stage-panel {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1rem 1.25rem;
        }
        .dim-stage-label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.85rem;
        }
        .dim-row { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.65rem; }
        .dim-row:last-child { margin-bottom: 0; }
        .dim-row.hidden { display: none; }
        .dim-label {
            flex-shrink: 0; width: 110px; font-size: 0.82rem; font-weight: 500;
            color: var(--text-secondary); padding-top: 0.3rem;
        }
        .dim-pills { display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .dim-pill {
            padding: 0.28rem 0.7rem; border-radius: 20px; font-size: 0.78rem; font-weight: 500;
            cursor: pointer; border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-secondary); transition: all 0.15s var(--ease); user-select: none;
        }
        .dim-pill:hover:not(.active):not(.locked):not(.disabled) {
            border-color: var(--border-hover); color: var(--text);
        }
        .dim-pill.active { background: var(--accent); color: var(--pill-active-text); border-color: var(--accent); font-weight: 600; }
        .dim-pill.locked {
            background: var(--bg-card); color: var(--text-dim); border-color: var(--border);
            border-style: dashed; cursor: default; font-style: italic;
        }
        .dim-pill.locked.active {
            background: var(--accent-glow); color: var(--accent); border-color: var(--accent); border-style: dashed;
        }
        .dim-pill.disabled { opacity: 0.3; cursor: not-allowed; }

        .explorer-divider { border: none; border-top: 1px solid var(--border); margin: 0.5rem 0 1.5rem; }
        .explorer-match {
            margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: var(--bg-surface);
            border: 1px solid var(--accent); border-radius: var(--radius);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .explorer-match-label {
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--accent); margin-bottom: 0.5rem;
        }
        .explorer-match-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
        .explorer-match-subtitle { font-weight: 400; font-style: italic; opacity: 0.7; }
        .explorer-match-summary { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }
        .explorer-match-refine { color: var(--text-dim); font-size: 0.8rem; font-style: italic; margin-top: 0.5rem; }
        .explorer-match .mood-badge { margin-left: 0.5rem; vertical-align: middle; }
        .explorer-match-action { margin-top: 0.75rem; }
        .explorer-no-match { color: var(--text-dim); font-size: 0.9rem; font-style: italic; padding: 1rem 0; }

        .explorer-grid { display: grid; gap: 0.75rem; grid-template-columns: 1fr; }
        .explorer-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1rem 1.15rem; cursor: pointer; transition: all 0.2s var(--ease);
        }
        .explorer-card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .explorer-card.matched { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
        .explorer-card.dimmed { opacity: 0.35; }
        .explorer-card .ec-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
        .ec-subtitle { font-weight: 400; font-style: italic; opacity: 0.7; }
        .explorer-card .ec-summary {
            color: var(--text-secondary); font-size: 0.82rem; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .explorer-card .ec-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 0.4rem; vertical-align: middle;
        }
        .explorer-grid-label {
            font-size: 0.78rem; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; margin-top: 0.5rem;
        }

        @media (min-width: 580px) { .explorer-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) {
            .dim-row { flex-direction: column; gap: 0.35rem; }
            .dim-label { width: auto; }
        }

        /* ---- Error / Loading ---- */
        .loading, .error-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 60vh; text-align: center;
        }
        .loading { color: var(--text-dim); }
        .error-screen h2 { color: var(--mood-dystopian); margin-bottom: 1rem; }
        .error-screen p { color: var(--text-secondary); max-width: 480px; line-height: 1.7; }
        .error-screen code {
            display: block; margin-top: 1.5rem;
            background: var(--bg-surface); padding: 0.75rem 1rem;
            border-radius: var(--radius-sm); font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* ---- Theme Toggle ---- */
        .theme-toggle {
            position: fixed; top: 1rem; right: 1rem;
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem; z-index: 50;
            transition: all 0.2s var(--ease);
        }
        .theme-toggle:hover {
            border-color: var(--border-hover); color: var(--text);
            background: var(--bg-card-hover);
        }

        /* ---- Toast ---- */
        #toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-card); border: 1px solid var(--accent);
            color: var(--text); padding: 0.65rem 1.25rem;
            border-radius: var(--radius); font-size: 0.88rem;
            transition: transform 0.3s var(--ease);
            z-index: 100; pointer-events: none;
        }
        #toast.visible { transform: translateX(-50%) translateY(0); }

        @media (min-width: 580px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .intro h1 { font-size: 2.2rem; }
            #app { padding: 1.25rem 1rem 3rem; }
            .question-text { font-size: 1.25rem; }
            .answer-card { padding: 1rem 1.15rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">&#9790;</button>
    <div id="app"><div class="loading"><p>Loading futures...</p></div></div>
    <div id="toast"></div>

    <script>
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
        const btn = document.getElementById('theme-toggle');
        function updateIcon() {
            btn.innerHTML = document.documentElement.getAttribute('data-theme') === 'light' ? '&#9728;' : '&#9790;';
        }
        updateIcon();
        btn.addEventListener('click', function() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (isLight) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
            updateIcon();
        });
    })();
    </script>
    <script src="dimensions.js"></script>
    <script src="engine.js"></script>
    <script>
    (function () {
        'use strict';

        const app = document.getElementById('app');
        const toastEl = document.getElementById('toast');

        let questionsMap = {};
        let templatesMap = {};
        let templatesList = [];
        let allVariants = [];
        let stagesMap = {};
        let rootId = null;
        let path = [];
        let discovered = new Set();

        loadDiscovered();
        loadData().then(() => {
            handleInitialRoute();
        }).catch(err => {
            renderError(err);
        });

        // --- Data Loading ---
        async function loadData() {
            const [qRes, oRes] = await Promise.all([
                fetch('data/questions.json'),
                fetch('data/outcomes.json')
            ]);
            if (!qRes.ok || !oRes.ok) {
                throw new Error('Could not load data files. Are you running a local server?');
            }
            const qData = await qRes.json();
            const oData = await oRes.json();
            rootId = qData.root;
            for (const q of qData.questions) questionsMap[q.id] = q;
            if (qData.stages) for (const s of qData.stages) stagesMap[s.id] = s;
            templatesList = oData.templates;
            for (const t of templatesList) templatesMap[t.id] = t;

            allVariants = [];
            for (const t of templatesList) {
                if (t.variants) {
                    for (const [key, v] of Object.entries(t.variants)) {
                        allVariants.push({
                            templateId: t.id,
                            variantKey: key,
                            title: t.title,
                            subtitle: v.subtitle,
                            mood: v.mood || t.mood,
                            summary: v.summary
                        });
                    }
                } else {
                    allVariants.push({
                        templateId: t.id,
                        variantKey: null,
                        title: t.title,
                        subtitle: null,
                        mood: t.mood,
                        summary: t.summary
                    });
                }
            }
        }

        // --- Dimensions ---
        function collectStepDims(question, answer) {
            const dims = {};
            if (answer.value !== undefined && question.dimension) dims[question.dimension] = answer.value;
            if (answer.sets) Object.assign(dims, answer.sets);
            return dims;
        }

        function resolveConditionalNext(nextSpec, dims) {
            if (typeof nextSpec === 'string') return { target: nextSpec };
            for (const route of nextSpec) {
                if (!route.when) return { target: route.target, sets: route.sets };
                const match = Object.entries(route.when).every(([k, allowed]) =>
                    dims[k] && allowed.includes(dims[k]));
                if (match) return { target: route.target, sets: route.sets };
            }
            return null;
        }

        function answerVisible(answer, dims) {
            if (answer.disabledWhen) {
                const dSets = Array.isArray(answer.disabledWhen) ? answer.disabledWhen : [answer.disabledWhen];
                for (const conds of dSets) {
                    if (Object.entries(conds).every(([dim, vals]) => {
                        const allowed = Array.isArray(vals) ? vals : [vals];
                        return dims[dim] && allowed.includes(dims[dim]);
                    })) return false;
                }
            }
            if (!answer.requires) return true;
            const condSets = Array.isArray(answer.requires) ? answer.requires : [answer.requires];
            return condSets.some(conds => {
                for (const [dim, allowed] of Object.entries(conds)) {
                    if (!dims[dim] || !allowed.includes(dims[dim])) return false;
                }
                return true;
            });
        }

        function dimensionsFromPath(p) {
            const d = {};
            for (const s of p) {
                if (s.dims) Object.assign(d, s.dims);
            }
            return d;
        }

        const _timelineStart = new Date();
        const _monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function formatMonths(m) {
            const d = new Date(_timelineStart.getFullYear(), _timelineStart.getMonth() + m);
            return { year: d.getFullYear(), month: _monthNames[d.getMonth()] };
        }

        function formatRange(startMonths, endMonths) {
            const s = formatMonths(startMonths);
            const e = formatMonths(endMonths);
            if (startMonths === endMonths || s.year === e.year && s.month === e.month) {
                return s.year + ' ' + s.month;
            }
            if (s.year === e.year) {
                return s.year + ' ' + s.month + ' – ' + e.month;
            }
            return s.year + ' ' + s.month + ' – ' + e.year + ' ' + e.month;
        }

        function formatDuration(m) {
            if (m < 0.25) { const d = Math.max(1, Math.round(m * 30)); return d + (d === 1 ? ' day' : ' days'); }
            if (m < 1) { const w = Math.max(1, Math.round(m * 4.33)); return w + (w === 1 ? ' week' : ' weeks'); }
            if (m < 12) { const mo = Math.round(m); return mo + (mo === 1 ? ' month' : ' months'); }
            const years = Math.floor(m / 12);
            const months = Math.round(m - years * 12);
            if (months === 0) return years + (years === 1 ? ' year' : ' years');
            return years + (years === 1 ? ' year, ' : ' years, ') + months + (months === 1 ? ' month' : ' months');
        }

        function resolveTimeline(rawTimeline, dims) {
            if (Array.isArray(rawTimeline)) return rawTimeline;
            if (!rawTimeline || typeof rawTimeline !== 'object') return [];
            const method = dims.escape_method;
            if (!method || !rawTimeline[method]) {
                const firstMethod = Object.keys(rawTimeline)[0];
                if (!firstMethod) return [];
                const methodObj = rawTimeline[firstMethod];
                if (Array.isArray(methodObj)) return methodObj;
                const firstTimeline = Object.keys(methodObj)[0];
                return firstTimeline ? methodObj[firstTimeline] : [];
            }
            const methodObj = rawTimeline[method];
            if (Array.isArray(methodObj)) return methodObj;
            const timeline = dims.escape_timeline;
            if (timeline && methodObj[timeline]) return methodObj[timeline];
            const firstKey = Object.keys(methodObj)[0];
            return firstKey ? methodObj[firstKey] : [];
        }

        // --- Template Resolution ---
        function resolveTemplate(templateId, dims) {
            const t = templatesMap[templateId];
            if (!t) return null;

            let subtitle = null, mood, summary;
            let variantKey = null;

            if (t.variants && t.primaryDimension) {
                variantKey = dims[t.primaryDimension];
                const variant = variantKey ? t.variants[variantKey] : null;
                if (variant) {
                    subtitle = variant.subtitle;
                    mood = variant.mood || t.mood;
                    summary = variant.summary;
                } else {
                    const first = Object.entries(t.variants)[0];
                    variantKey = first[0];
                    subtitle = first[1].subtitle;
                    mood = first[1].mood || t.mood;
                    summary = first[1].summary;
                }
            } else {
                mood = t.mood;
                summary = t.summary;
            }

            return {
                variantKey,
                title: t.title,
                subtitle,
                mood,
                summary,
                story: t.story,
                timeline: resolveTimeline(t.timeline, dims),
                flavors: resolveFlavors(t.flavors, dims)
            };
        }

        function resolveVariantDirect(templateId, variantKey) {
            const t = templatesMap[templateId];
            if (!t) return null;
            if (t.variants && variantKey && t.variants[variantKey]) {
                const v = t.variants[variantKey];
                return {
                    variantKey,
                    title: t.title,
                    subtitle: v.subtitle,
                    mood: v.mood || t.mood,
                    summary: v.summary,
                    story: t.story,
                    timeline: resolveTimeline(t.timeline, {}),
                    flavors: []
                };
            }
            if (!t.variants) {
                return {
                    variantKey: null,
                    title: t.title,
                    subtitle: null,
                    mood: t.mood,
                    summary: t.summary,
                    story: t.story,
                    timeline: resolveTimeline(t.timeline, {}),
                    flavors: []
                };
            }
            return resolveTemplate(templateId, {});
        }

        function resolveFlavors(flavors, dims) {
            if (!flavors) return [];
            const texts = [];
            for (const [dim, options] of Object.entries(flavors)) {
                if (dims[dim] && options[dims[dim]]) {
                    texts.push(options[dims[dim]]);
                }
            }
            return texts;
        }

        const { SCENARIO, DIMENSIONS, DIM_MAP } = window.Dimensions;

        // --- Persistence ---
        const STORAGE_KEY = SCENARIO.storageKey;
        function loadDiscovered() {
            try {
                discovered = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
            } catch { discovered = new Set(); }
        }
        function saveDiscovered() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...discovered])); } catch {}
        }
        function markDiscovered(key) {
            if (!discovered.has(key)) {
                discovered.add(key);
                saveDiscovered();
            }
        }
        function outcomeKey(templateId, variantKey) {
            return variantKey ? templateId + '/' + variantKey : templateId;
        }

        // --- Routing ---
        function handleInitialRoute() {
            const state = routeFromHash();
            history.replaceState(state, '', location.href);
            renderState(state, false);
        }

        function routeFromHash() {
            const hash = location.hash.slice(1);
            if (hash.startsWith('/outcome/')) {
                let rest = hash.slice('/outcome/'.length);
                const dims = {};
                const qIdx = rest.indexOf('?');
                if (qIdx >= 0) {
                    rest.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (k && v) dims[decodeURIComponent(k)] = decodeURIComponent(v);
                    });
                    rest = rest.slice(0, qIdx);
                }
                const slashIdx = rest.indexOf('/');
                let tid, vk;
                if (slashIdx >= 0) {
                    tid = rest.slice(0, slashIdx);
                    vk = rest.slice(slashIdx + 1);
                } else {
                    tid = rest;
                    vk = null;
                }
                if (templatesMap[tid]) {
                    return { screen: 'outcome', templateId: tid, variantKey: vk, path: [], showPath: false, dims: Object.keys(dims).length ? dims : undefined };
                }
            }
            if (hash.startsWith('/story/')) {
                let rest = hash.slice('/story/'.length);
                const qIdx = rest.indexOf('?');
                let questionId, pathStr;
                if (qIdx >= 0) {
                    questionId = rest.slice(0, qIdx);
                    pathStr = rest.slice(qIdx + 1);
                } else {
                    questionId = rest;
                    pathStr = '';
                }
                const restoredPath = [];
                if (pathStr) {
                    for (const pair of pathStr.split(',')) {
                        const [qid, aidx] = pair.split(':');
                        const decodedQid = decodeURIComponent(qid);
                        const idx = parseInt(aidx, 10);
                        const q = questionsMap[decodedQid];
                        if (q && q.answers[idx]) {
                            const answer = q.answers[idx];
                            const stepDims = collectStepDims(q, answer);
                            const allDims = { ...dimensionsFromPath(restoredPath), ...stepDims };
                            const resolved = resolveConditionalNext(answer.next, allDims);
                            if (resolved && resolved.sets) Object.assign(stepDims, resolved.sets);
                            restoredPath.push({
                                questionId: decodedQid,
                                answerIndex: idx,
                                answerLabel: answer.label,
                                questionText: q.text,
                                dims: stepDims
                            });
                        }
                    }
                }
                if (questionsMap[questionId]) {
                    return { screen: 'question', questionId, path: restoredPath };
                }
            }
            if (hash === '/gallery') return { screen: 'gallery' };
            if (hash === '/tree') return { screen: 'tree' };
            if (hash.startsWith('/explore')) {
                const dims = {};
                const qIdx = hash.indexOf('?');
                if (qIdx >= 0) {
                    hash.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (k && v) dims[decodeURIComponent(k)] = decodeURIComponent(v);
                    });
                }
                return { screen: 'explore', dims };
            }
            return { screen: 'intro' };
        }

        function navigate(state, animated) {
            let hash = '';
            if (state.screen === 'outcome') {
                hash = '/outcome/' + state.templateId + (state.variantKey ? '/' + state.variantKey : '');
                if (state.dims && Object.keys(state.dims).length > 0) {
                    hash += '?' + Object.entries(state.dims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
            } else if (state.screen === 'gallery') {
                hash = '/gallery';
            } else if (state.screen === 'tree') {
                hash = '/tree';
            } else if (state.screen === 'explore') {
                hash = '/explore';
                if (state.dims && Object.keys(state.dims).length > 0) {
                    hash += '?' + Object.entries(state.dims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
            } else if (state.screen === 'question') {
                hash = '/story/' + state.questionId;
                if (state.path && state.path.length > 0) {
                    hash += '?' + state.path.map(s => encodeURIComponent(s.questionId) + ':' + s.answerIndex).join(',');
                }
            }
            history.pushState(state, '', hash ? '#' + hash : location.pathname);
            renderState(state, animated !== false);
        }

        function renderState(state, animated) {
            const render = () => {
                if (state.screen === 'outcome') {
                    if (state.path) path = state.path;
                    renderOutcome(state.templateId, state.variantKey, state.showPath, state.dims);
                } else if (state.screen === 'gallery') {
                    path = [];
                    renderGallery();
                } else if (state.screen === 'tree') {
                    renderTree();
                } else if (state.screen === 'explore') {
                    renderExplorer(state.dims);
                } else if (state.screen === 'question') {
                    if (state.path) path = state.path;
                    renderQuestion(state.questionId);
                } else {
                    path = [];
                    renderIntro();
                }
            };
            if (animated) { transition(render); } else { render(); }
        }

        window.addEventListener('popstate', (e) => {
            if (e.state) {
                renderState(e.state, false);
            } else {
                renderState(routeFromHash(), false);
            }
        });

        // --- Transitions ---
        function transition(renderFn) {
            app.classList.remove('fade-in');
            app.classList.add('fade-out');
            setTimeout(() => {
                renderFn();
                app.classList.remove('fade-out');
                app.classList.add('fade-in');
                window.scrollTo({ top: 0, behavior: 'instant' });
            }, 260);
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('visible');
            setTimeout(() => toastEl.classList.remove('visible'), 2200);
        }

        // --- Render: Intro ---
        function renderIntro() {
            const count = allVariants.filter(v => discovered.has(outcomeKey(v.templateId, v.variantKey))).length;
            const total = allVariants.length;
            app.innerHTML = `
                <div class="intro">
                    <h1>Singularity Map</h1>
                    <p class="subtitle">Navigate the branching futures of artificial intelligence. Your beliefs shape the path. Where do you end up?</p>
                    <div class="actions">
                        <button class="btn btn-primary" data-action="start">Story Mode</button>
                        <button class="btn btn-secondary" data-action="explore">Explore Futures</button>
                    </div>
                    ${count > 0 ? `<p class="discovery">${count} of ${total} future${total !== 1 ? 's' : ''} discovered</p>` : ''}
                </div>`;
            listen('[data-action="start"]', 'click', () => {
                path = [];
                navigate({ screen: 'question', questionId: rootId, path: [] });
            });
            listen('[data-action="explore"]', 'click', () => navigate({ screen: 'explore' }));
        }

        // --- Render: Question ---
        function renderQuestion(questionId) {
            const q = questionsMap[questionId];
            if (!q) { renderIntro(); return; }

            let crumbs = '';
            if (path.length > 0) {
                const parts = path.map((p, i) => `<span class="crumb" data-step="${i}" title="${esc(p.questionText)}">${esc(p.answerLabel)}</span>`);
                crumbs = `<div class="breadcrumbs">${parts.join('<span class="sep">\u2192</span>')}</div>`;
            }

            let source = '';
            if (q.source) {
                source = `<div class="question-source"><a href="${esc(q.source.url)}" target="_blank" rel="noopener">${esc(q.source.label)} \u2197</a></div>`;
            }

            const dims = dimensionsFromPath(path);
            const visibleAnswers = q.answers
                .map((a, i) => ({ ...a, originalIndex: i }))
                .filter(a => answerVisible(a, dims));

            const answers = visibleAnswers.map(a => `
                <div class="answer-card" data-idx="${a.originalIndex}">
                    <div class="label">${esc(a.label)}</div>
                    ${a.description ? `<div class="desc">${esc(a.description)}</div>` : ''}
                </div>`).join('');

            app.innerHTML = `
                <div class="question-screen">
                    ${crumbs}
                    <div class="question-text">${esc(q.text)}</div>
                    ${q.context ? `<div class="question-context">${esc(q.context)}</div>` : ''}
                    ${source}
                    <div class="answers">${answers}</div>
                    <div class="question-nav">
                        ${path.length > 0
                            ? '<button class="btn btn-ghost" data-action="back">\u2190 Back</button>'
                            : '<button class="btn btn-ghost" data-action="home">\u2190 Home</button>'}
                    </div>
                </div>`;

            app.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    const idx = parseInt(card.dataset.idx, 10);
                    const answer = q.answers[idx];
                    const stepDims = collectStepDims(q, answer);
                    const allDims = { ...dimensionsFromPath(path), ...stepDims };
                    const resolved = resolveConditionalNext(answer.next, allDims);
                    if (resolved && resolved.sets) Object.assign(stepDims, resolved.sets);
                    path.push({
                        questionId: q.id,
                        answerIndex: idx,
                        answerLabel: answer.label,
                        questionText: q.text,
                        dims: stepDims
                    });
                    const next = resolved ? resolved.target : answer.next;
                    if (questionsMap[next]) {
                        navigate({ screen: 'question', questionId: next, path: [...path] });
                    } else if (templatesMap[next]) {
                        const dims = dimensionsFromPath(path);
                        const resolved = resolveTemplate(next, dims);
                        const key = outcomeKey(next, resolved.variantKey);
                        markDiscovered(key);
                        navigate({
                            screen: 'outcome',
                            templateId: next,
                            variantKey: resolved.variantKey,
                            path: [...path],
                            showPath: true,
                            dims: dims
                        });
                    } else if (next === '__resolve__') {
                        const dims = dimensionsFromPath(path);
                        const { templateMatches } = window.Engine;
                        const matched = templatesList.filter(t => templateMatches(t, dims));
                        if (matched.length === 1) {
                            const tid = matched[0].id;
                            const resolved = resolveTemplate(tid, dims);
                            const key = outcomeKey(tid, resolved.variantKey);
                            markDiscovered(key);
                            navigate({
                                screen: 'outcome',
                                templateId: tid,
                                variantKey: resolved.variantKey,
                                path: [...path],
                                showPath: true,
                                dims: dims
                            });
                        } else {
                            console.error('__resolve__: expected 1 match, got', matched.length, matched.map(t => t.id));
                        }
                    } else {
                        console.error('Unknown next node:', next);
                    }
                });
            });

            app.querySelectorAll('.breadcrumbs .crumb[data-step]').forEach(crumb => {
                crumb.addEventListener('click', () => {
                    const step = parseInt(crumb.dataset.step, 10);
                    const target = path[step];
                    path = path.slice(0, step);
                    navigate({ screen: 'question', questionId: target.questionId, path: [...path] });
                });
            });

            listen('[data-action="back"]', 'click', () => {
                const prev = path.pop();
                if (prev) navigate({ screen: 'question', questionId: prev.questionId, path: [...path] });
            });
            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
        }

        // --- Render: Outcome ---
        function renderOutcome(templateId, variantKey, showPath, passedDims) {
            const t = templatesMap[templateId];
            if (!t) { renderIntro(); return; }

            const pathDims = dimensionsFromPath(path);
            const localDims = { ...pathDims, ...(passedDims || {}) };
            if (variantKey && t.primaryDimension && !localDims[t.primaryDimension]) {
                localDims[t.primaryDimension] = variantKey;
            }

            const adjustableIds = new Set();
            if (t.primaryDimension) adjustableIds.add(t.primaryDimension);
            if (t.flavors) for (const k of Object.keys(t.flavors)) adjustableIds.add(k);
            if (t.reachable) {
                for (const cond of t.reachable) {
                    for (const dimId of Object.keys(cond)) adjustableIds.add(dimId);
                }
            }
            for (const dim of DIMENSIONS) {
                if (adjustableIds.has(dim.id) || !dim.activateWhen) continue;
                if (dim.activateWhen.some(cond =>
                    Object.keys(cond).some(k => !k.startsWith('_') && adjustableIds.has(k))
                )) adjustableIds.add(dim.id);
            }
            const relevantDims = DIMENSIONS.filter(d => adjustableIds.has(d.id));

            const validValues = {};
            for (const dimId of adjustableIds) {
                const s = new Set();
                if (dimId === t.primaryDimension && t.variants) {
                    for (const k of Object.keys(t.variants)) s.add(k);
                }
                if (t.flavors && t.flavors[dimId]) {
                    for (const k of Object.keys(t.flavors[dimId])) s.add(k);
                }
                if (t.reachable) {
                    for (const cond of t.reachable) {
                        if (cond[dimId]) for (const v of cond[dimId]) s.add(v);
                    }
                }
                const meta = DIM_MAP[dimId];
                if (meta && s.size === 0) meta.values.forEach(v => s.add(v.id));
                validValues[dimId] = s;
            }

            const lockedValues = {};
            if (t.reachable) {
                for (const cond of t.reachable) {
                    for (const [dimId, vals] of Object.entries(cond)) {
                        if (adjustableIds.has(dimId)) continue;
                        if (!lockedValues[dimId]) lockedValues[dimId] = new Set();
                        for (const v of vals) lockedValues[dimId].add(v);
                    }
                }
            }
            const lockedDims = DIMENSIONS.filter(d => lockedValues[d.id]);
            for (const dim of lockedDims) {
                const allowed = lockedValues[dim.id];
                if (allowed.size === 1 && !localDims[dim.id]) {
                    localDims[dim.id] = [...allowed][0];
                }
            }

            if (t.reachable) {
                for (const dimId of adjustableIds) {
                    if (localDims[dimId]) continue;
                    for (const cond of t.reachable) {
                        if (cond[dimId]) { localDims[dimId] = cond[dimId][0]; break; }
                    }
                }
            }

            function isOutcomeDimActive(dim) {
                if (dim.suppressWhen && dim.suppressWhen.some(c => {
                    if (c._raw) {
                        for (const [k, vals] of Object.entries(c._raw)) {
                            if (!localDims[k] || !vals.includes(localDims[k])) return false;
                        }
                    }
                    for (const [k, v] of Object.entries(c)) {
                        if (k.startsWith('_')) continue;
                        if (!localDims[k] || !v.includes(localDims[k])) return false;
                    }
                    return true;
                })) return false;
                if (!dim.activateWhen) return true;
                return dim.activateWhen.some(cond => {
                    for (const [k, allowed] of Object.entries(cond)) {
                        if (k.startsWith('_')) continue;
                        const v = Engine.effectiveVal(localDims, k) || localDims[k];
                        if (!v || !allowed.includes(v)) return false;
                    }
                    return true;
                });
            }

            function isPillDisabled(dim, valObj) {
                const valid = validValues[dim.id] || new Set();
                if (!valid.has(valObj.id)) return true;
                if (valObj.requires) {
                    for (const [k, allowed] of Object.entries(valObj.requires)) {
                        if (localDims[k] && !allowed.includes(localDims[k])) return true;
                    }
                }
                return false;
            }

            function updateContent() {
                const resolved = resolveTemplate(templateId, localDims);
                if (!resolved) return;

                const header = app.querySelector('.outcome-header');
                if (header) {
                    header.querySelector('h1').textContent = resolved.title;
                    const subtitleEl = header.querySelector('.outcome-subtitle');
                    if (subtitleEl) {
                        subtitleEl.textContent = resolved.subtitle || '';
                        subtitleEl.style.display = resolved.subtitle ? '' : 'none';
                    }
                    const badge = header.querySelector('.mood-badge');
                    badge.className = 'mood-badge mood-' + resolved.mood;
                    badge.textContent = resolved.mood;
                }
                const summaryEl = app.querySelector('.outcome-summary');
                if (summaryEl) summaryEl.textContent = resolved.summary;

                const flavorsEl = app.querySelector('.outcome-flavors');
                if (flavorsEl) {
                    if (resolved.flavors && resolved.flavors.length > 0) {
                        flavorsEl.innerHTML = resolved.flavors.map(f => `<p>${esc(f)}</p>`).join('');
                        flavorsEl.style.display = '';
                    } else {
                        flavorsEl.innerHTML = '';
                        flavorsEl.style.display = 'none';
                    }
                }

                const timelineEl = app.querySelector('.timeline');
                if (timelineEl) {
                    fullTimeline = composeTimeline(resolved.timeline);
                    timelineEl.innerHTML = buildTimelineHtml(fullTimeline);
                    wireTimelineSliders();
                }

                for (const dim of relevantDims) {
                    const active = isOutcomeDimActive(dim);
                    if (!active) {
                        delete localDims[dim.id];
                    } else if (!localDims[dim.id]) {
                        const valid = validValues[dim.id];
                        if (valid && valid.size > 0) localDims[dim.id] = [...valid][0];
                    }
                }

                relevantDims.forEach(dim => {
                    const row = app.querySelector('[data-odim="' + dim.id + '"]');
                    if (!row) return;
                    const active = isOutcomeDimActive(dim);
                    row.classList.toggle('hidden', !active);
                    if (!active) return;
                    const enabledCount = dim.values.filter(v => !isPillDisabled(dim, v)).length;
                    const forceLocked = enabledCount <= 1;
                    row.querySelectorAll('.dim-pill').forEach(pill => {
                        const vid = pill.dataset.val;
                        const valObj = dim.values.find(v => v.id === vid);
                        const disabled = valObj ? isPillDisabled(dim, valObj) : false;
                        const isActive = localDims[dim.id] === vid;
                        pill.classList.toggle('active', isActive);
                        pill.classList.toggle('disabled', (disabled && !isActive) || (forceLocked && !isActive));
                        pill.classList.toggle('locked', forceLocked);
                    });
                });

                const newKey = outcomeKey(templateId, resolved.variantKey);
                markDiscovered(newKey);
                let hashStr = '/outcome/' + templateId + (resolved.variantKey ? '/' + resolved.variantKey : '');
                if (Object.keys(localDims).length > 0) {
                    hashStr += '?' + Object.entries(localDims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
                history.replaceState(
                    { screen: 'outcome', templateId, variantKey: resolved.variantKey, path: [...path], showPath, dims: { ...localDims } },
                    '', '#' + hashStr
                );
            }

            const initResolved = resolveTemplate(templateId, localDims);
            if (!initResolved) { renderIntro(); return; }

            const storyHtml = (Array.isArray(initResolved.story) ? initResolved.story : [initResolved.story])
                .map(p => `<p>${esc(p)}</p>`).join('');

            function composeTimeline(outcomeTimeline) {
                let pathEvents;
                if (path.length > 0) {
                    pathEvents = path
                        .map(step => {
                            const q = questionsMap[step.questionId];
                            const a = q && q.answers[step.answerIndex];
                            if (!a || !a.timelineEvent) return null;
                            const dim = DIM_MAP[q.dimension];
                            return { ...a.timelineEvent, year: '', paramLabel: a.label, dimLabel: dim ? dim.label : '' };
                        })
                        .filter(Boolean);
                } else {
                    pathEvents = [];
                    let curId = rootId;
                    const visited = new Set();
                    const walkDims = { ...localDims };
                    while (curId && questionsMap[curId] && !visited.has(curId)) {
                        visited.add(curId);
                        const q = questionsMap[curId];
                        let a;
                        if (q.dimension) {
                            const dimVal = walkDims[q.dimension];
                            if (!dimVal) break;
                            a = q.answers.find(ans =>
                                ans.value === dimVal || (ans.sets && ans.sets[q.dimension] === dimVal)
                            );
                        } else {
                            const relevantKeys = new Set();
                            for (const c of q.answers) {
                                if (c.sets) for (const [k, v] of Object.entries(c.sets)) {
                                    if (walkDims[k] === v) relevantKeys.add(k);
                                }
                            }
                            let bestScore = -1;
                            for (const candidate of q.answers) {
                                let score = 0;
                                let disqualified = false;
                                if (candidate.requires) {
                                    for (const [k, vals] of Object.entries(candidate.requires)) {
                                        if (!walkDims[k] || !vals.includes(walkDims[k])) { disqualified = true; break; }
                                        score++;
                                    }
                                }
                                if (disqualified) continue;
                                if (candidate.sets) {
                                    for (const k of relevantKeys) {
                                        if (candidate.sets[k] === walkDims[k]) score += 2;
                                        else if (candidate.sets[k]) score -= 2;
                                    }
                                }
                                if (score > bestScore) { bestScore = score; a = candidate; }
                            }
                        }
                        if (!a) break;
                        if (a.timelineEvent) {
                            const dim = DIM_MAP[q.dimension];
                            pathEvents.push({ ...a.timelineEvent, year: '', paramLabel: a.label, dimLabel: dim ? dim.label : '' });
                        }
                        const stepDims = collectStepDims(q, a);
                        Object.assign(walkDims, stepDims);
                        const res = resolveConditionalNext(a.next, walkDims);
                        if (res && res.sets) Object.assign(walkDims, res.sets);
                        curId = res ? res.target : (typeof a.next === 'string' ? a.next : null);
                    }
                }
                return [...pathEvents, ...(outcomeTimeline || [])];
            }

            let fullTimeline = composeTimeline(initResolved.timeline);
            let timelineDurations = [];
            const isInteractive = fullTimeline.some(e => e.durationMin != null);

            function buildTimelineHtml(events) {
                if (!isInteractive) {
                    return events.map(e => {
                        const pillHtml = e.paramLabel ? `<span class="timeline-param-wrap"><span class="timeline-param-dim">${esc(e.dimLabel)}</span><span class="timeline-param">${esc(e.paramLabel)}</span></span>` : '';
                        return `
                        <div class="timeline-event">
                            <div class="timeline-year">${esc(e.year)}</div>
                            <div class="timeline-headline">${esc(e.headline)}${pillHtml}</div>
                            <div class="timeline-desc">${esc(e.description)}</div>
                        </div>`;
                    }).join('');
                }
                timelineDurations = events.map(e => {
                    const min = e.durationMin || 0;
                    const max = e.durationMax != null ? e.durationMax : min;
                    const step = max <= 1 ? 0.25 : 1;
                    return { min, max, current: Math.round((min + max) / 2 / step) * step };
                });
                const ranges = timelineDurations.filter(d => d.max > d.min).map(d => d.max - d.min);
                const meanRange = ranges.length ? ranges.reduce((a, b) => a + b, 0) / ranges.length : 1;
                let cumulative = 0;
                return events.map((e, i) => {
                    const d = timelineDurations[i];
                    const yearLabel = formatRange(cumulative, cumulative + d.current);
                    cumulative += d.current;
                    const hasRange = d.max > d.min;
                    let sliderHtml = '';
                    if (hasRange) {
                        const ratio = (d.max - d.min) / meanRange;
                        const t = Math.sqrt(ratio);
                        const pct = Math.min(100, Math.max(15, t * 50));
                        sliderHtml = `
                        <div class="timeline-slider">
                            <input type="range" min="${d.min}" max="${d.max}" step="${d.max <= 1 ? 0.25 : 1}" value="${d.current}" data-tsi="${i}" style="width:${pct.toFixed(0)}%">
                            <span class="timeline-slider-label" data-tsl="${i}">${formatDuration(d.current)}</span>
                        </div>`;
                    }
                    const pillHtml = e.paramLabel ? `<span class="timeline-param-wrap"><span class="timeline-param-dim">${esc(e.dimLabel)}</span><span class="timeline-param">${esc(e.paramLabel)}</span></span>` : '';
                    return `
                        <div class="timeline-event">
                            <div class="timeline-year" data-tsy="${i}">${esc(yearLabel)}</div>
                            <div class="timeline-headline">${esc(e.headline)}${pillHtml}</div>
                            <div class="timeline-desc">${esc(e.description)}</div>
                            ${sliderHtml}
                        </div>`;
                }).join('');
            }

            function updateTimelineLabels() {
                let cumulative = 0;
                const events = app.querySelectorAll('.timeline-event');
                timelineDurations.forEach((d, i) => {
                    const yearLabel = formatRange(cumulative, cumulative + d.current);
                    const yearEl = app.querySelector('[data-tsy="' + i + '"]');
                    if (yearEl) yearEl.textContent = yearLabel;
                    const slLabel = app.querySelector('[data-tsl="' + i + '"]');
                    if (slLabel) slLabel.textContent = formatDuration(d.current);
                    cumulative += d.current;
                });
            }

            function wireTimelineSliders() {
                app.querySelectorAll('.timeline-slider input[type="range"]').forEach(slider => {
                    slider.addEventListener('input', () => {
                        const idx = parseInt(slider.dataset.tsi);
                        timelineDurations[idx].current = parseFloat(slider.value);
                        updateTimelineLabels();
                    });
                });
            }

            const timelineHtml = buildTimelineHtml(fullTimeline);

            let initFlavorsHtml = '';
            if (initResolved.flavors && initResolved.flavors.length > 0) {
                initFlavorsHtml = initResolved.flavors.map(f => `<p>${esc(f)}</p>`).join('');
            }

            let pathHtml = '';
            if (showPath && path.length > 0) {
                const steps = path.map(p =>
                    `<div class="path-step">
                        <span class="step-q">${esc(p.questionText)}</span>
                        <span class="step-a">\u2192 ${esc(p.answerLabel)}</span>
                    </div>`).join('');
                pathHtml = `<div class="path-summary"><h3>Your choices</h3>${steps}</div>`;
            }

            const allOutcomeDims = [...lockedDims, ...relevantDims];
            let dimSelectorHtml = '';
            if (allOutcomeDims.length > 0) {
                const stageNames = SCENARIO.stageNames || {};
                const byStage = {};
                allOutcomeDims.forEach(dim => {
                    if (!byStage[dim.stage]) byStage[dim.stage] = [];
                    byStage[dim.stage].push(dim);
                });
                const stagePanels = [1, 2, 3].filter(s => byStage[s]).map(s => {
                    const rows = byStage[s].map(dim => {
                        const isLocked = !!lockedValues[dim.id];
                        const allowed = lockedValues[dim.id];
                        const pills = dim.values.map(v => {
                            if (isLocked) {
                                const isAllowed = allowed.has(v.id);
                                return `<span class="dim-pill locked${isAllowed ? ' active' : ' disabled'}">${esc(v.label)}</span>`;
                            }
                            const disabled = isPillDisabled(dim, v);
                            const isActive = localDims[dim.id] === v.id;
                            return `<span class="dim-pill${isActive ? ' active' : ''}${disabled && !isActive ? ' disabled' : ''}" data-val="${esc(v.id)}">${esc(v.label)}</span>`;
                        }).join('');
                        return `<div class="dim-row${isLocked ? ' locked-row' : ''}" data-odim="${esc(dim.id)}">
                            <span class="dim-label">${esc(dim.label)}</span>
                            <div class="dim-pills">${pills}</div>
                        </div>`;
                    }).join('');
                    return `<div class="dim-stage-panel">
                        <div class="dim-stage-label">${esc(stageNames[s])}</div>
                        ${rows}
                    </div>`;
                }).join('');
                dimSelectorHtml = `
                    <div class="outcome-dims">
                        <div class="outcome-dims-header">
                            <span class="outcome-dims-label">Parameters</span>
                            <button class="outcome-dims-toggle">${allOutcomeDims.length} dimensions &mdash; tap to adjust <span class="chevron">&#9660;</span></button>
                        </div>
                        <div class="dim-stages">${stagePanels}</div>
                    </div>`;
            }

            app.innerHTML = `
                <div class="outcome-screen">
                    <div class="outcome-header">
                        <h1>${esc(initResolved.title)}</h1>
                        ${initResolved.subtitle ? `<div class="outcome-subtitle">${esc(initResolved.subtitle)}</div>` : ''}
                        <span class="mood-badge mood-${initResolved.mood}">${esc(initResolved.mood)}</span>
                    </div>
                    <div class="outcome-summary">${esc(initResolved.summary)}</div>
                    <div class="outcome-flavors"${initFlavorsHtml ? '' : ' style="display:none"'}>${initFlavorsHtml}</div>
                    ${dimSelectorHtml}
                    <div class="outcome-story">${storyHtml}</div>
                    <div class="timeline-section">
                        <h2>Timeline</h2>
                        <div class="timeline">${timelineHtml}</div>
                    </div>
                    ${pathHtml}
                    <div class="outcome-actions">
                        ${showPath && path.length > 0
                            ? '<button class="btn btn-ghost btn-small" data-action="back-to-q">\u2190 Change last answer</button>'
                            : ''}
                        <button class="btn btn-secondary btn-small" data-action="restart">Start Over</button>
                        <button class="btn btn-secondary btn-small" data-action="gallery">Browse All Futures</button>
                        <button class="btn btn-secondary btn-small" data-action="share">Copy Link</button>
                    </div>
                </div>`;

            const dimsHeader = app.querySelector('.outcome-dims-header');
            if (dimsHeader) {
                dimsHeader.addEventListener('click', () => {
                    dimsHeader.closest('.outcome-dims').classList.toggle('expanded');
                });
            }

            relevantDims.forEach(dim => {
                const row = app.querySelector('[data-odim="' + dim.id + '"]');
                if (!row) return;
                row.querySelectorAll('.dim-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        if (pill.classList.contains('disabled') || pill.classList.contains('locked')) return;
                        localDims[dim.id] = pill.dataset.val;
                        updateContent();
                    });
                });
            });

            wireTimelineSliders();

            listen('[data-action="back-to-q"]', 'click', () => {
                const prev = path.pop();
                if (prev) navigate({ screen: 'question', questionId: prev.questionId, path: [...path] });
            });
            listen('[data-action="restart"]', 'click', () => navigate({ screen: 'intro' }));
            listen('[data-action="gallery"]', 'click', () => navigate({ screen: 'explore', dims: { ...localDims } }));
            listen('[data-action="share"]', 'click', () => {
                const currentKey = outcomeKey(templateId, localDims[t.primaryDimension] || variantKey);
                let url = location.origin + location.pathname + '#/outcome/' + currentKey;
                if (localDims && Object.keys(localDims).length > 0) {
                    url += '?' + Object.entries(localDims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
                } else {
                    showToast(url);
                }
            });

            updateContent();
        }

        // --- Render: Gallery ---
        function renderGallery() {
