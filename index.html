                <span class="sep">·</span>
                <a href="https://github.com/es92/Singularity-Map" target="_blank" rel="noopener" aria-label="GitHub">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                </a>
            </div>`;
        }

        // --- Routing ---
        function handleInitialRoute() {
            const state = routeFromHash();
            history.replaceState(state, '', location.href);
            renderState(state, false);
        }

        function routeFromHash() {
            const hash = location.hash.slice(1);
            if (hash.startsWith('/map')) {
                const pairs = [];
                let lockedOutcomeId = '';
                const flags = { fullQuestions: true, expandTimeline: true };
                const qIdx = hash.indexOf('?');
                if (qIdx >= 0) {
                    hash.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (!k || !v) return;
                        const dk = decodeURIComponent(k);
                        const dv = decodeURIComponent(v);
                        if (dk === 'locked') { lockedOutcomeId = dv; }
                        else if (dk === 'fq') { flags.fullQuestions = dv !== '0'; }
                        else if (dk === 'et') { flags.expandTimeline = dv !== '0'; }
                        else if (dk === 'sq') { flags.shortQuestions = dv === '1'; }
                        else if (dk === 'cd') { flags.customDurations = dv === '1'; }
                        else if (dk === 'db') { flags.debugMode = dv === '1'; }
                        else if (dk === 'pp') { flags[dk] = dv; }
                        else { pairs.push({ nodeId: dk, edgeId: dv }); }
                    });
                }
                if (flags.pp) {
                    savePersonalAnswers({ profession: flags.pp });
                }
                // A /map URL with only flags (no answered pairs, no locked
                // outcome) lands on the intro screen with those flags applied,
                // mirroring share links produced from the start screen.
                const isStarted = pairs.length > 0 || !!lockedOutcomeId;
                return { screen: 'map', started: isStarted, pairs, lockedOutcomeId, flags };
            }
            if (hash.startsWith('/about')) {
                const showOutcomes = hash.includes('outcomes=1');
                return { screen: 'about', showOutcomes };
            }
            if (hash.startsWith('/explore')) {
                const initialSel = {};
                const qIdx = hash.indexOf('?');
                if (qIdx >= 0) {
                    hash.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (!k || !v) return;
                        initialSel[decodeURIComponent(k)] = decodeURIComponent(v);
                    });
                }
                return { screen: 'explore', initialSel };
            }
            if (hash.startsWith('/nodes')) {
                return { screen: 'nodes' };
            }
            return { screen: 'map' };
        }

        

        function renderState(state, animated) {
            if (state.screen === 'about') {
                renderAbout(state.showOutcomes);
                return;
            }
            if (state.screen === 'explore') {
                if (window.Explore) window.Explore.render(app, { initialSel: state.initialSel || {} });
                return;
            }
            if (state.screen === 'nodes') {
                if (window.Nodes) window.Nodes.render(app);
                return;
            }
            const render = () => {
                renderMap(state.pairs, state.lockedOutcomeId, state.flags, state.started);
            };
            if (animated) { transition(render); } else { render(); }
        }

        window.addEventListener('popstate', (e) => {
            if (e.state) {
                renderState(e.state, false);
            } else {
                renderState(routeFromHash(), false);
            }
        });

        // Hash-only navigations (e.g. links from /nodes or /explore to a
        // different screen) don't fire popstate. Re-route on screen change.
        let lastScreen = null;
        window.addEventListener('hashchange', () => {
            const next = routeFromHash();
            if (next.screen !== lastScreen) {
                lastScreen = next.screen;
                history.replaceState(next, '', location.href);
                renderState(next, false);
            }
        });

        // --- Transitions ---
        function transition(renderFn) {
            app.classList.remove('fade-in');
            app.classList.add('fade-out');
            setTimeout(() => {
                renderFn();
                app.classList.remove('fade-out');
                app.classList.add('fade-in');
                window.scrollTo({ top: 0, behavior: 'instant' });
                app.addEventListener('animationend', () => {
                    app.classList.remove('fade-in');
                }, { once: true });
            }, 260);
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function md(str) {
            if (!str) return '';
            return marked.parse(str.replace(/~/g, '\\~'));
        }

        function stripMd(str) {
            if (!str) return '';
            return str.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/\n\n/g, ' ');
        }

        function moodColor(mood) {
            const map = { utopian:'var(--mood-utopian)', dystopian:'var(--mood-dystopian)',
                mixed:'var(--mood-mixed)', stagnant:'var(--mood-stagnant)', chaotic:'var(--mood-chaotic)',
                catastrophic:'var(--mood-catastrophic)' };
            return map[mood] || 'var(--text-dim)';
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('visible');
            setTimeout(() => toastEl.classList.remove('visible'), 2200);
        }

        

        // --- Render: Map (unified view) ---
        function renderMap(initialPairs, lockedOutcomeId, initialFlags, initialStarted) {
            let stack = Engine.createStack();
            if (initialPairs && initialPairs.length > 0) {
                for (const { nodeId, edgeId } of initialPairs) {
                    stack = Engine.push(stack, nodeId, edgeId);
                }
            }
            const lockParts = lockedOutcomeId ? lockedOutcomeId.split('--') : [];
            let lockedId = (lockParts[0] && templatesMap[lockParts[0]]) ? lockParts[0] : '';
            let lockedVariantKey = lockParts[1] || '';
            const flags = initialFlags || {};
            let fullQuestions = flags.fullQuestions !== false;
            let shortQuestions = flags.shortQuestions !== undefined
                ? flags.shortQuestions
                : true;
            let expandTimeline = flags.expandTimeline !== false;
            let customDurations = flags.customDurations === true;
            let debugMode = flags.debugMode === true;
            let timelineDurations = [];
            let timelineNodeIds = [];
            let mapAnimator = null;
            let _pushNextSync = false;
            const hasSelections = stack.length > 1;
            let started = hasSelections || initialStarted === true;

            function getLockedTemplate() {
                return lockedId ? templatesMap[lockedId] : null;
            }

            // ─── Precomputed reachability lookup ────────────
            let _reachSet = null;
            let _reachSetId = '';
            let _reachLoading = false;

            function _loadReachMap(templateId) {
                if (_reachSetId === templateId && (_reachSet || _reachLoading)) return;
                _reachSetId = templateId;
                _reachSet = null;
                if (!templateId) return;
                _reachLoading = true;
                // Reach files ship gzipped only — the raw form was
                // ~100× larger and never used at runtime. Modern
                // browsers (Chrome 80+ / Firefox 113+ / Safari 16.4+)
                // support DecompressionStream; older browsers degrade
                // to "no greying" (wouldReachOutcome returns true
                // when _reachSet is null), which is conservative.
                fetch('data/reach/' + encodeURIComponent(templateId) + '.json.gz')
                    .then(r => {
                        if (!r.ok) throw new Error('reach fetch ' + r.status);
                        if (typeof DecompressionStream === 'undefined' || !r.body) {
                            throw new Error('DecompressionStream unavailable');
                        }
                        return new Response(
                            r.body.pipeThrough(new DecompressionStream('gzip'))
                        ).text();
                    })
                    .then(text => JSON.parse(text))
                    .then(arr => {
                        if (_reachSetId === templateId) {
                            _reachSet = new Set(arr);
                            _reachLoading = false;
                            update();
                        }
                    })
                    .catch(e => {
                        console.warn('Failed to load reachability map for', templateId, e);
                        _reachLoading = false;
                    });
            }

            function _lightPush(sel, flavor, nodeId, edgeId) {
                // Mirrors Engine.push without committing to the stack: stamp
                // the edge id into sel and apply only that edge's effects
                // blocks via applyEdgeEffects. Edge-local model — no
                // multi-edge re-walk over already-set nodes.
                const next = Object.assign({}, sel, { [nodeId]: edgeId });
                const nextFlavor = flavor ? Object.assign({}, flavor) : {};
                const node = Engine.NODE_MAP[nodeId];
                const edge = node && node.edges && node.edges.find(e => e.id === edgeId);
                if (edge) Engine.applyEdgeEffects(next, edge, nextFlavor);
                return { sel: next, flavor: nextFlavor };
            }

            // ─── Reach-key helpers (mirror precompute-reachability.js) ──
            // The reach files are keyed by `<slotKey>|out:<projKey>` for
            // post-edge sels at non-module nodes / freshly-exited modules,
            // and `<slotKey>|in:<projKey>` for partial states inside an
            // active module. We compute the same key the precompute
            // emitted so a Set.has() lands on the right entry.
            const _reachIndex = {
                _built: false,
                moduleOfNode: new Map(),
                slotByKey:    new Map(),
                innerDims:    new Map(),
                build() {
                    if (this._built) return;
                    const FLOW_DAG = window.Nodes && window.Nodes.FLOW_DAG;
                    if (!FLOW_DAG || !window.GraphIO) return;
                    for (const m of (Engine.MODULES || [])) {
                        for (const nid of (m.nodeIds || [])) this.moduleOfNode.set(nid, m);
                    }
                    for (const s of FLOW_DAG.nodes) this.slotByKey.set(s.key, s);
                    // Modules can appear under a slot whose .key
                    // differs from mod.id (alignment_loop →
                    // 'alignment') or under multiple slots (escape
                    // → 5 slots). Pick any matching slot — they
                    // share the same mod object so reads/writes
                    // are identical across them. innerDims recipe
                    // (readDims ∪ nodeIds ∪ writeDims minus the
                    // completionMarker) lives in GraphIO so this site,
                    // the precompute writer, and the reach_parity test
                    // cannot drift.
                    for (const m of (Engine.MODULES || [])) {
                        const slot = FLOW_DAG.nodes.find(n =>
                            n && n.kind === 'module' && n.id === m.id);
                        if (!slot) continue;
                        this.innerDims.set(m.id, window.GraphIO.innerDimsForSlot(slot));
                    }
                    this._built = true;
                },
            };

            function wouldReachOutcome(nodeId, edgeId) {
                if (!_reachSet) return true;
                if (!lockedId) return true;
                // Under "outcomes are terminal" (SPEC.md), findNextQuestion
                // never offers an edge from a state where any template
                // already matches, so the reach-set lookup on the post-click
                // state is sufficient — no template-match short-circuit
                // needed.
                _reachIndex.build();
                if (!window.GraphIO) return true;
                const sel = Engine.currentState(stack);
                const flavor = Engine.currentFlavor(stack);
                const { sel: childSel } = _lightPush(sel, flavor, nodeId, edgeId);

                const owningModule = _reachIndex.moduleOfNode.get(nodeId);
                let key;
                if (owningModule) {
                    // Module-internal click — including the
                    // exit-triggering click. The precompute's inner
                    // pass folds OR-of-outer-reach into the inner
                    // mask at exit states, so a single inner-key
                    // lookup covers both "still inside" and "just
                    // exited" cases. (We can't always identify the
                    // FLOW_DAG slot anyway: `escape` appears as 5
                    // slots and the engine doesn't track which one
                    // is active.) compactProjectKey on innerDims =
                    // (mod.reads ∪ mod.nodeIds) captures both the
                    // entry bucket and the answered internals.
                    const innerDims = _reachIndex.innerDims.get(owningModule.id) || [];
                    key = owningModule.id + '|i|' +
                        window.GraphIO.compactProjectKey(childSel, innerDims);
                } else {
                    const slot = _reachIndex.slotByKey.get(nodeId);
                    if (!slot) return true;
                    const writeDims = window.GraphIO.writeDimsForSlot(slot);
                    key = nodeId + '|o|' +
                        window.GraphIO.compactProjectKey(childSel, writeDims);
                }
                return _reachSet.has(key);
            }

            function mutateStack(action, opts) {
                _pushNextSync = true;
                const oldStack = stack;
                if (mapAnimator) {
                    mapAnimator.animateTransition({
                        applyChange: () => { stack = action(oldStack); },
                        onComplete: () => syncHash(),
                        fadeFooterIn: opts && opts.fadeFooterIn,
                    });
                } else {
                    stack = action(stack);
                    update();
                }
            }

            function findNextQuestion() {
                if (lockedId) _loadReachMap(lockedVariantKey ? lockedId + '--' + lockedVariantKey : lockedId);
                const sel = Engine.currentState(stack);
                // Narrative-match view: sel + flavor so edge narrativeVariants
                // can observe flavor-moved dims (e.g., stall_recovery='mild').
                const narrSel = Engine.narrativeState(stack);

                // FLOW_DAG-driven navigation (single source of truth, shared
                // with validate.js / explore / precompute-reachability):
                //
                //   * 'question' — render that node; outcomes deferred.
                //   * 'stuck'    — FLOW_DAG slot owns the sel but nothing's
                //                  askable (validate.js Phase 6 surfaces
                //                  this; treat as no-question and let the
                //                  outcome zone stay empty).
                //   * 'open'     — no slot owns the sel; outcome matching
                //                  is allowed.
                //
                // Derive the parent slot from stack-history so flowNext
                // routes the same way run() does even when a slot moves
                // its own gate dim on exit (e.g. brittle.sufficient
                // leaves sel unchanged but flavor-moves brittle_resolution
                // — sel-only routing would loop on brittle, but stack
                // history shows brittle was answered so its child
                // routing wins).
                const parentSlotKey = window.FlowPropagation.parentSlotKeyFromStack(stack);
                const flow = window.FlowPropagation.flowNext(sel, parentSlotKey);
                if (flow.kind === 'open') {
                    // Outcome matching reads only sel — flavor is for
                    // narrative rendering, not template gating. Any dim
                    // referenced by a `reachable` clause must be in some
                    // mod.writes (e.g., WHO_BENEFITS_WRITES carries
                    // benefit_distribution forward for this reason).
                    for (const t of templatesList) {
                        if (Engine.templateMatches(t, sel)) return null;
                    }
                    return null;
                }
                if (flow.kind === 'stuck') return null;

                const node = flow.node;

                // Forced-pick: every other edge of the next node is currently
                // disabled, so isNodeLocked auto-resolves to a single value.
                // The UI surfaces it as a one-option "Continue" question;
                // the engine commits the locked answer instead of branching.
                const locked = Engine.isNodeLocked(sel, node);
                if (locked !== null && !Engine.stackHas(stack, node.id)) {
                    const options = node.edges.map(v => {
                        const disabled = Engine.isEdgeDisabled(sel, node, v);
                        const reason = Engine.getEdgeDisabledReason(sel, node, v);
                        const variant = v.narrativeVariants ? resolveNarrativeVariant(v.narrativeVariants, narrSel) : null;
                        return {
                            value: v.id, label: v.label, shortLabel: v.shortLabel,
                            answerLabel: (variant && variant.answerLabel) || v.answerLabel || v.label,
                            answerDesc: (variant && variant.answerDesc) || v.answerDesc || '',
                            shortAnswerLabel: (variant && variant.shortAnswerLabel) || v.shortAnswerLabel || null,
                            shortAnswerDesc: (variant && variant.shortAnswerDesc) || v.shortAnswerDesc || null,
                            nodeId: node.id,
                            reachable: !disabled,
                            disabled,
                            disabledReason: reason,
                        };
                    });
                    return { node, options, isForced: true, forcedValue: locked };
                }

                const options = node.edges.map(v => {
                    const disabled = Engine.isEdgeDisabled(sel, node, v);
                    const reason = Engine.getEdgeDisabledReason(sel, node, v);
                    const variant = v.narrativeVariants ? resolveNarrativeVariant(v.narrativeVariants, narrSel) : null;
                    return {
                        value: v.id,
                        label: v.label,
                        shortLabel: v.shortLabel,
                        answerLabel: (variant && variant.answerLabel) || v.answerLabel || v.label,
                        answerDesc: (variant && variant.answerDesc) || v.answerDesc || '',
                        shortAnswerLabel: (variant && variant.shortAnswerLabel) || v.shortAnswerLabel || null,
                        shortAnswerDesc: (variant && variant.shortAnswerDesc) || v.shortAnswerDesc || null,
                        nodeId: node.id,
                        reachable: disabled ? false : wouldReachOutcome(node.id, v.id),
                        disabled,
                        disabledReason: reason,
                    };
                });
                return { node, options };
            }

            function buildTimelineEvents(nextQ) {
                const sel = Engine.currentState(stack);
                const narrSel = Engine.narrativeState(stack);
                const events = [];

                const renderedIds = new Set();

                const pushAnswered = (node, value, isLockedNode) => {
                    const narr = nodeNarrativeFor(node.id, value, narrSel);
                    const nodeEdge = node.edges.find(v => v.id === value);
                    const paramLabel = nodeEdge ? nodeEdge.label : value;
                    const siblings = node.edges
                        .map(v => {
                            const edgeDisabled = Engine.isEdgeDisabled(sel, node, v) && v.id !== value;
                            return { value: v.id, label: v.label, shortLabel: v.shortLabel, nodeId: node.id, reachable: edgeDisabled ? false : true, disabled: edgeDisabled };
                        });
                    events.push({
                        headline: narr.headline || '', description: narr.description || '',
                        durationMin: narr.durationMin != null ? narr.durationMin : null,
                        durationMax: narr.durationMax != null ? narr.durationMax : null,
                        stage: narr.stage || node.stage, year: '', paramLabel,
                        nodeLabel: node.label, nodeId: node.id, selectedValue: value,
                        siblings, isFrontier: false, isLocked: isLockedNode
                    });
                };

                // 1) Stack-order answered events. Prefer the user's raw pick
                //    (stackEntry.edgeId) over sel — sel may have been rewritten
                //    by effects (e.g., capability 'stalls' →
                //    'singularity'). Timeline should show what the user
                //    actually answered.
                for (const entry of stack) {
                    if (!entry.nodeId) continue;
                    const node = Engine.NODE_MAP[entry.nodeId];
                    if (!node || node.derived) continue;
                    if (renderedIds.has(node.id)) continue;
                    const value = entry.edgeId || sel[node.id];
                    if (!value) continue;
                    renderedIds.add(node.id);
                    pushAnswered(node, value, false);
                }

                // 2) Compact mode (!fullQuestions): render the frontier inline
                //    as a final pill-row event. Full mode renders the frontier
                //    separately via the question card.
                //
                // Note: dims set by upstream edge effects (e.g. containment=
                // escaped from brittle_resolution.escape, geo_spread=multiple
                // from the decel reducer, or intent=coexistence from
                // WAR_MODULE's exit plan) are deliberately NOT rendered as
                // timeline events. The timeline shows what the user actually
                // answered — anything else is a downstream consequence of an
                // already-rendered pick. Forced single-option nodes still
                // appear because their auto-resolved answer flows through
                // Engine.push and lands in the stack (rendered by step 1).
                if (!fullQuestions && nextQ) {
                    const node = nextQ.node;
                    const siblings = nextQ.options.map(o => ({
                        value: o.value, label: o.label, shortLabel: o.shortLabel,
                        nodeId: o.nodeId,
                        reachable: nextQ.isForced
                            ? (o.value === nextQ.forcedValue ? true : o.reachable)
                            : o.reachable,
                        disabled: nextQ.isForced
                            ? (o.value === nextQ.forcedValue ? false : o.disabled)
                            : o.disabled,
                    }));
                    events.push({
                        headline: '', description: '', durationMin: 0, durationMax: 0,
                        stage: node.stage, year: '', paramLabel: '', nodeLabel: node.label,
                        nodeId: node.id, selectedValue: null, siblings, isFrontier: true,
                    });
                }

                return events;
            }

            function updateTimelineLabels() {
                let cumulative = 0;
                timelineDurations.forEach((d, i) => {
                    const yearLabel = formatRange(cumulative, cumulative + d.current);
                    const yearEl = app.querySelector('[data-tsy="' + i + '"]');
                    if (yearEl) yearEl.textContent = yearLabel;
                    const slLabel = app.querySelector('[data-tsl="' + i + '"]');
                    if (slLabel) slLabel.textContent = formatDuration(d.current);
                    cumulative += d.current;
                });
            }

            function buildTimelineDateMap() {
                const map = {};
                let cumulative = 0;
                for (let i = 0; i < timelineDurations.length; i++) {
                    const d = timelineDurations[i];
                    const nodeId = timelineNodeIds[i];
                    if (nodeId && !map[nodeId]) {
                        const fm = formatMonths(cumulative + d.current);
                        const entry = { year: fm.year, month: fm.month, label: fm.month + ' ' + fm.year, _months: cumulative + d.current };
                        if (d.min !== d.max) {
                            entry.rangeLabel = formatRange(cumulative + d.min, cumulative + d.max);
                        }
                        map[nodeId] = entry;
                    }
                    cumulative += d.current;
                }
                const totalFm = formatMonths(cumulative);
                map._totalYear = totalFm.year;
                map._totalMonths = cumulative;

                const sel = Engine.currentState(stack);
                const narrSel = Engine.narrativeState(stack);
                const agiVal = narrSel['agi_threshold'];
                const takeoffVal = narrSel['takeoff'];
                if (agiVal && takeoffVal) {
                    const agiDoublings = { twenty_four_hours: 1, one_week: 3.8, few_months: 7.5, one_year: 9.5, ten_plus_years: 9.5 };
                    const takeoffAccel = { none: 0, slow: 0.1, moderate: 0.2, fast: 0.35, explosive: 0.5 };
                    const T = 9.5;
                    const N = agiDoublings[agiVal];
                    const a = takeoffAccel[takeoffVal];
                    if (N != null && a != null) {
                        const fraction = a === 0 ? N / T : (1 - Math.pow(1 - a, N)) / (1 - Math.pow(1 - a, T));
                        let takeoffStart = 0, takeoffDur = 0;
                        for (let i = 0; i < timelineNodeIds.length; i++) {
                            if (timelineNodeIds[i] === 'takeoff') { takeoffDur = timelineDurations[i].current; break; }
                            takeoffStart += timelineDurations[i].current;
                        }
                        if (takeoffDur) {
                            const months = takeoffStart + takeoffDur * fraction;
                            const fm = formatMonths(months);
                            map['agi_threshold'] = { year: fm.year, month: fm.month, label: fm.month + ' ' + fm.year, _months: months };
                        }
                    }
                }

                return map;
            }

            function countTotalOutcomes() {
                let count = 0;
                for (const t of templatesList) {
                    if (t.variants && t.primaryDimension) {
                        count += Object.keys(t.variants).length;
                    } else {
                        count++;
                    }
                }
                return count;
            }

            function getOutcomeShareInfo() {
                // Template matching reads `sel` only; narrative resolution
                // (subtitle, flavor text) reads the fused `sel ∪ flavor`
                // view so module-exported flavor dims remain visible to
                // narrative blocks.
                const sel = Engine.currentState(stack);
                const narrEff = Engine.resolvedStateWithFlavor(sel, Engine.currentFlavor(stack));
                const matched = templatesList.filter(t => Engine.templateMatches(t, sel));
                let url = location.origin + location.pathname + location.hash;
                let title = '';
                if (matched.length > 0) {
                    const resolved = resolveTemplate(matched[0].id, narrEff);
                    if (resolved) {
                        title = resolved.subtitle ? resolved.title + ': ' + resolved.subtitle : resolved.title;
                        const slug = resolved.variantKey ? matched[0].id + '--' + resolved.variantKey : matched[0].id;
                        url = location.origin + location.pathname + 'share/' + slug + '.html';

                        const params = [];
                        if (personalAnswers && personalAnswers.profession) {
                            params.push('pp=' + encodeURIComponent(personalAnswers.profession));
                        }
                        for (const entry of stack) {
                            if (!entry.nodeId) continue;
                            if (entry.state[entry.nodeId] || (entry.flavor && entry.flavor[entry.nodeId])) {
                                params.push(encodeURIComponent(entry.nodeId) + '=' + encodeURIComponent(entry.edgeId));
                            }
                        }
                        if (params.length > 0) url += '?' + params.join('&');
                    }
                }
                const text = title
                    ? 'I got ' + title + ' on AI Singularity Map. What future do your beliefs about AI lead to?'

            function wireRatingSection(root) {
                const section = root.querySelector('.rating-section');

            function wireFormView(section) {
                const slider = section.querySelector('.rating-slider');
                const valueNum = section.querySelector('.rating-value-num');
                const submitBtn = section.querySelector('.rating-submit');
                if (!slider || !valueNum || !submitBtn) return;
                const startsEnabled = submitBtn.dataset.ready === '1';
                let touched = startsEnabled;
                submitBtn.disabled = !startsEnabled;
                const onInput = () => {
                    valueNum.textContent = slider.value;
                    if (!touched) { touched = true; submitBtn.disabled = false; }
                };
                slider.addEventListener('input', onInput);
                slider.addEventListener('change', onInput);
                submitBtn.addEventListener('click', () => {
                    const p = parseInt(slider.value, 10);
                    if (!Number.isFinite(p)) return;
                    submitBtn.disabled = true;
                    logRating(p);
                    setStoredOutcomeRating(section.dataset.outcomeId, section.dataset.variantKey, p);
                    transitionToRatedView(section, p);
                });
            }

            function wireRatedView(section) {
                const userRating = parseInt(section.dataset.userRating, 10);
                if (Number.isFinite(userRating)) populateCrowdTile(section, userRating);
                const changeBtn = section.querySelector('.rating-change');
                if (changeBtn) {
                    changeBtn.addEventListener('click', () => {
                        const cur = parseInt(section.dataset.userRating, 10);
                        morphToFormView(section, Number.isFinite(cur) ? cur : 50);
                    });

            }

            function transitionToRatedView(section, p) {
                section.classList.add('rating-rated');
                section.dataset.userRating = String(p);

            function morphToFormView(section, initialValue) {
                section.classList.remove('rating-rated');

                const inner = section.querySelector('.rating-inner');

                inner.innerHTML =

            async function populateCrowdTile(section, userRating) {
                const outcomeId = section.dataset.outcomeId;
                const variantKey = section.dataset.variantKey || null;
                const crowdEl = section.querySelector('.rating-result-crowd');
                const histEl = section.querySelector('.rating-histogram');
                const footEl = section.querySelector('.rating-result-footnote');
                const stats = await fetchOutcomeStats(outcomeId, variantKey);
                if (!stats || stats.pending || !stats.count || stats.count < 10) {
                    if (crowdEl) crowdEl.textContent = '';
                    if (histEl) histEl.innerHTML = '';
                    if (footEl) {
                        footEl.textContent = 'Not enough data points yet to show crowd results. Check back once more people have rated this future.';
                    }
                    return;
                }
                if (crowdEl) crowdEl.innerHTML = 'Crowd median: <strong>' + Math.round(stats.median) + '%</strong>';
                if (histEl && Array.isArray(stats.histogram)) {
                    const max = Math.max(1, ...stats.histogram);
                    const userBucket = Math.min(9, Math.max(0, Math.floor(userRating / 10)));
                    histEl.innerHTML = stats.histogram.map((n, i) => {
                        const h = Math.max(2, Math.round((n / max) * 100));
                        const active = i === userBucket ? ' active' : '';
                        return '<div class="rating-hist-bar' + active + '" style="height:' + h + '%" title="' + (i * 10) + '–' + (i * 10 + 9) + '%: ' + n + '"></div>';
                    }).join('');
                }
                if (footEl) {
                    const pct = computePercentile(stats.histogram, userRating);
                    const suffix = pct != null ? ' · you\u2019re in the ' + ordinalSuffix(pct) + ' percentile' : '';
                    footEl.textContent = stats.count + ' respondents' + suffix;
                }
            }

            function computePercentile(histogram, val) {
                if (!Array.isArray(histogram)) return null;
                const total = histogram.reduce((a, b) => a + b, 0);
                if (!total) return null;
                const bucket = Math.min(9, Math.max(0, Math.floor(val / 10)));
                let below = 0;
                for (let i = 0; i < bucket; i++) below += histogram[i];
                const pct = Math.round(((below + (histogram[bucket] || 0) / 2) / total) * 100);
                return Math.max(1, Math.min(99, pct));
            }

            function ordinalSuffix(n) {
                const s = ['th', 'st', 'nd', 'rd'];
                const v = n % 100;
                return n + (s[(v - 20) % 10] || s[v] || s[0]);
            }

            function buildRatingSectionHtml(outcomeId, variantKey) {

            function syncHash() {
                const shouldPush = _pushNextSync;
                _pushNextSync = false;
                let hash = '/map';
                const entries = [];
                for (const entry of stack) {
                    if (!entry.nodeId) continue;
                    // Retracted entries are gone from both state and flavor.
                    // Collapsed entries live in flavor. Keep either.
                    if (entry.state[entry.nodeId] || (entry.flavor && entry.flavor[entry.nodeId])) {
                        entries.push(encodeURIComponent(entry.nodeId) + '=' + encodeURIComponent(entry.edgeId));
                    }
                }
                if (lockedId) entries.push('locked=' + encodeURIComponent(lockedId + (lockedVariantKey ? '--' + lockedVariantKey : '')));
                if (!fullQuestions) entries.push('fq=0');
                if (shortQuestions) entries.push('sq=1');
                if (!expandTimeline) entries.push('et=0');
                if (customDurations) entries.push('cd=1');
                if (debugMode) entries.push('db=1');
                if (personalAnswers) {
                    if (personalAnswers.profession) entries.push('pp=' + encodeURIComponent(personalAnswers.profession));
                }
                if (entries.length > 0) hash += '?' + entries.join('&');
                const stateFlags = { fullQuestions, shortQuestions, expandTimeline, customDurations, debugMode };
                const pairs = stack.filter(e => e.nodeId).map(e => ({ nodeId: e.nodeId, edgeId: e.edgeId }));
                const state = { screen: 'map', pairs, lockedOutcomeId: lockedId + (lockedVariantKey ? '--' + lockedVariantKey : ''), flags: stateFlags, started };
                // On the intro screen with no flags toggled, keep the URL clean
                // (just the pathname) rather than changing it to `#/map`.
                const target = !started && entries.length === 0 ? location.pathname : '#' + hash;
                if (shouldPush) {
                    history.pushState(state, '', target);
                } else {
                    history.replaceState(state, '', target);
                }
            }

            function getHiddenState(_s) {
                // Historically returned { nodeId: { derived, raw } } for
                // every node whose `deriveWhen` rules computed an
                // effective value different from the raw `sel[id]`.
                // Now that derivation is gone — every change to sel is
                // committed by the edge that fires (effects.set
                // / setFlavor + module exit plans) — there is no
                // "hidden vs. raw" gap to surface, so the function
                // returns nothing. Kept as a no-op so the debug-panel
                // and answer-summary call sites keep working without a
                // wider refactor; they render an empty hidden-state
                // section, which is the truthful display.
                return {};
            }

            function getVisibleNodes(s) {
                const vis = new Set();
                for (const node of NODES) {
                    if (node.derived || (node.priority || 0) >= 2) continue;
                    if (Engine.isNodeVisible(s, node)) vis.add(node.id);
                }
                return vis;
            }

            function hiddenStateDiff(baseStack, nodeId, edgeId) {
                const baseSel = Engine.currentState(baseStack);
                const testStack = Engine.push(baseStack, nodeId, edgeId);
                const test = Engine.currentState(testStack);

                const changes = [];

                const before = getHiddenState(baseSel);
                const after = getHiddenState(test);
                for (const [k, v] of Object.entries(after)) {
                    const label = v.value || v.derived || '';
                    const bLabel = before[k] ? (before[k].value || before[k].derived || '') : '';
                    if (label !== bLabel) {
                        const nodeObj = NODE_MAP[k];
                        const nodeName = nodeObj ? nodeObj.label : k;
                        if (before[k]) {
                            changes.push({ type: 'lock', text: nodeName + ': ' + bLabel + ' \u2192 ' + label });
                        } else {
                            changes.push({ type: 'lock', text: nodeName + ' = ' + label });
                        }
                    }
                }
                for (const [k, v] of Object.entries(before)) {
                    if (!after[k]) {
                        const nodeObj = NODE_MAP[k];
                        const nodeName = nodeObj ? nodeObj.label : k;
                        changes.push({ type: 'lock', text: nodeName + ': removed' });
                    }
                }

                const visBefore = getVisibleNodes(baseSel);
                const visAfter = getVisibleNodes(test);
                for (const id of visAfter) {
                    if (!visBefore.has(id) && id !== nodeId) {
                        const nodeObj = NODE_MAP[id];
                        changes.push({ type: 'activate', text: '+ ' + (nodeObj ? nodeObj.label : id) });
                    }
                }
                for (const id of visBefore) {
                    if (!visAfter.has(id) && id !== nodeId) {
                        const nodeObj = NODE_MAP[id];
                        changes.push({ type: 'deactivate', text: '\u2212 ' + (nodeObj ? nodeObj.label : id) });
                    }
                }

                return changes;
            }

            function update() {
                const sel = Engine.currentState(stack);
                updateIntroBg(!started);

                const debugPanel = app.querySelector('.debug-panel');
                if (debugPanel) {
                    if (debugMode) {
                        const eff = Engine.resolvedState(sel);
                        const hidden = getHiddenState(sel);
                        const keys = Object.keys(hidden);

                        console.group('%c[Debug] State after update', 'color: #8b5cf6; font-weight: bold');
                        const answered = [];
                        for (const node of NODES) {
                            if (node.derived || (node.priority || 0) >= 2) continue;
                            if (!sel[node.id]) continue;
                            const effVal = eff[node.id];
                            let line = node.label + ' (' + node.id + ') = ' + sel[node.id];
                            if (effVal && effVal !== sel[node.id]) line += ' → eff=' + effVal;
                            answered.push(line);
                        }
                        if (answered.length) {
                            console.log('%cAnswered:', 'font-weight:bold');
                            answered.forEach(l => console.log('  ' + l));
                        }
                        const upcoming = [];
                        for (const node of NODES) {
                            if (node.derived || (node.priority || 0) >= 2) continue;
                            if (!Engine.isNodeVisible(sel, node)) continue;
                            if (sel[node.id]) continue;
                            const locked = Engine.isNodeLocked(sel, node);
                            if (locked !== null) {
                                upcoming.push(node.label + ' (' + node.id + ') = ' + locked + ' [will auto-lock]');
                            } else {
                                upcoming.push(node.label + ' (' + node.id + ') [pending]');
                            }
                        }
                        if (upcoming.length) {
                            console.log('%cUpcoming:', 'font-weight:bold');
                            upcoming.forEach(l => console.log('  ' + l));
                        }
                        console.groupEnd();

                        let panelHtml = '';

                        if (keys.length > 0) {
                            const rows = keys.map(k => {
                                const v = hidden[k];
                                const nodeObj = NODE_MAP[k];
                                const name = nodeObj ? nodeObj.label : k;
                                const parts = [];
                                if (v.value) parts.push('locked=' + v.value);
                                if (v.derived) parts.push('derived=' + v.derived);
                                if (v.raw) parts.push('raw=' + v.raw);
                                if (v.eff && v.eff !== v.value) parts.push('eff=' + v.eff);
                                return '<span class="debug-key">' + esc(name) + '</span> <span class="debug-val">' + esc(parts.join(', ')) + '</span>';
                            });
                            panelHtml += '<div class="debug-title">Auto-locked / Derived</div>' + rows.join('<br>');
                        }

                        const visNodes = [];
                        for (const node of NODES) {
                            if (node.derived || (node.priority || 0) >= 2) continue;
                            if (!Engine.isNodeVisible(sel, node)) continue;
                            const locked = Engine.isNodeLocked(sel, node);
                            const isAnswered = !!sel[node.id];
                            if (locked !== null && !isAnswered) {
                                visNodes.push('<span class="debug-val">' + esc(node.label) + ' = ' + esc(locked) + ' (auto)</span>');
                            } else if (!isAnswered) {
                                visNodes.push('<span class="debug-activate">' + esc(node.label) + '</span>');
                            }
                        }
                        if (visNodes.length > 0) {
                            panelHtml += (panelHtml ? '<div style="margin-top:0.4rem">' : '<div>') +
                                '<div class="debug-title">Upcoming</div>' +
                                visNodes.join(' &middot; ') + '</div>';
                        }

                        debugPanel.innerHTML = panelHtml || '<span class="debug-val">no hidden state</span>';
                        debugPanel.style.display = '';
                    } else {
                        debugPanel.innerHTML = '';
                        debugPanel.style.display = 'none';
                    }
                }

                const nextQ = started ? findNextQuestion() : null;
                const events = started ? buildTimelineEvents(nextQ) : [];
                const timelineEl = app.querySelector('.map-timeline');
                if (timelineEl && !started) {
                    timelineEl.innerHTML = '';
                }
                if (timelineEl && started) {
                    timelineEl.classList.toggle('timeline-light', !expandTimeline);
                    timelineEl.classList.toggle('hide-sliders', !customDurations);
                    const tlResult = mapAnimator.renderTimeline(events, {
                        expanded: expandTimeline,
                        formatRange,
                        formatDuration,
                        nextQuestion: nextQ ? { stage: nextQ.node.stage } : null,
                        fullQuestions,
                    });
                    timelineDurations = tlResult.durations;
                    timelineNodeIds = events.map(e => e.nodeId);
                    timelineEl.innerHTML = tlResult.html;
                    timelineEl.querySelectorAll('.timeline-slider input[type="range"]').forEach(slider => {
                        slider.addEventListener('input', () => {
                            const idx = parseInt(slider.dataset.tsi);
                            timelineDurations[idx].current = parseFloat(slider.value);
                            updateTimelineLabels();
                        });
                    });
                    timelineEl.querySelectorAll('.tl-pill, .tl-undo').forEach(pill => {
                        pill.addEventListener('click', () => {
                            const action = pill.dataset.pathaction;
                            if (!action) return;
                            const nodeId = pill.dataset.dim;
                            const val = pill.dataset.val;

                            if (action === 'frontier') {
                                mutateStack(s => Engine.push(s, nodeId, val));
                            } else if (action === 'change') {
                                mutateStack(s => Engine.push(Engine.popTo(s, nodeId), nodeId, val));
                            } else if (action === 'unclick') {
                                mutateStack(s => Engine.popTo(s, nodeId));
                            }
                        });
                    });
                    if (!expandTimeline) {
                        timelineEl.querySelectorAll('.tl-pills').forEach(group => {
                            const pills = group.querySelectorAll('.tl-pill');
                            if (pills.length < 2) return;
                            pills.forEach(p => { p.style.minWidth = ''; });

                            mood: v.mood || t.mood || 'mixed',

                        slug: t.id,
                        title: t.title,
                        subtitle: t.subtitle || null,
                        mood: t.mood || 'mixed',

                        if (existing) existing.remove();
                        outcomesWrap.querySelectorAll('.explorer-card.active').forEach(c => c.classList.remove('active'));

                        if (slug === openSlug) { openSlug = null; return; }
                        openSlug = slug;

                        const parts = slug.split('--');
                        const t = templatesMap[parts[0]];
                        if (!t) return;
                        const vKey = parts[1] || null;
                        let title = t.title, subtitle = null, mood, summary;
                        if (vKey && t.variants && t.variants[vKey]) {
                            const v = t.variants[vKey];
                            subtitle = v.subtitle; mood = v.mood || t.mood || 'mixed'; summary = v.summary || '';
                        } else if (t.variants) {
                            const first = Object.entries(t.variants)[0];
                            subtitle = first[1].subtitle; mood = first[1].mood || t.mood || 'mixed'; summary = first[1].summary || '';
                        } else {
                            mood = t.mood || 'mixed'; summary = t.summary || '';
                        }

                        const previewHtml = `<div class="about-outcome-preview outcome-hero mood-bg-${mood}">
                            <div class="outcome-hero-inner">
                                <div class="outcome-title" style="font-size:1.8rem">${esc(title)}</div>
                                ${subtitle ? `<div class="outcome-subtitle">${esc(subtitle)}</div>` : ''}
                                <span class="mood-badge" style="background:${moodColor(mood)}22;color:${moodColor(mood)};border:1px solid ${moodColor(mood)}44">${esc(mood)}</span>
                                <div class="outcome-summary" style="margin-top:0.75rem;font-size:0.95rem">${md(summary)}</div>
                                <button class="btn btn-primary about-explore-link" data-explore="${esc(slug)}" style="margin-top:1.25rem">Explore paths that lead to this outcome<span class="beta-badge">Beta</span></button>
                            </div>
                        </div>`;

                        card.classList.add('active');
                        const grid = card.closest('.explorer-grid');
                        grid.insertAdjacentHTML('beforebegin', previewHtml);
                        const preview = outcomesWrap.querySelector('.about-outcome-preview');
                        preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        const exploreLink = preview.querySelector('.about-explore-link');
                        if (exploreLink) {
                            exploreLink.addEventListener('click', () => {
                                location.hash = '/map?locked=' + encodeURIComponent(exploreLink.dataset.explore);
                            });
                        }
                    });
                });
            }
        }

        // --- Render: Error ---
        function renderError(err) {
            app.innerHTML = `
                <div class="error-screen">
                    <h2>Failed to Load</h2>
                    <p>AI Singularity Map needs to be served over HTTP to load its data files. If you opened this file directly, try running a local server:</p>
                    <code>node serve.js</code>
                    <p style="margin-top:1rem;font-size:0.85rem;">Then visit <strong>http://localhost:3000</strong></p>
                </div>`;
            console.error(err);
        }

        // --- Helpers ---
        function listen(selector, event, fn) {
            const el = app.querySelector(selector);
            if (el) el.addEventListener(event, fn);
        }

    })();
    </script>
