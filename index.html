                </a>
            </div>`;
        }

        // --- Routing ---
        function handleInitialRoute() {
            const state = routeFromHash();
            history.replaceState(state, '', location.href);
            renderState(state, false);
        }

        function routeFromHash() {
            const hash = location.hash.slice(1);
            if (hash.startsWith('/map')) {
                const pairs = [];
                let lockedOutcomeId = '';
                const flags = { fullQuestions: true, expandTimeline: true };
                const qIdx = hash.indexOf('?');
                if (qIdx >= 0) {
                    hash.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (!k || !v) return;
                        const dk = decodeURIComponent(k);
                        const dv = decodeURIComponent(v);
                        if (dk === 'locked') { lockedOutcomeId = dv; }
                        else if (dk === 'fq') { flags.fullQuestions = dv !== '0'; }
                        else if (dk === 'et') { flags.expandTimeline = dv !== '0'; }
                        else if (dk === 'so') { flags.showOutcomes = dv === '1'; }
                        else if (dk === 'db') { flags.debugMode = dv === '1'; }
                        else if (dk === 'pc' || dk === 'pp' || dk === 'pos') { flags[dk] = dv; }
                        else { pairs.push({ nodeId: dk, edgeId: dv }); }
                    });
                }
                if (flags.pc || flags.pp) {
                    const urlPersonal = {};
                    if (flags.pc) urlPersonal.country = flags.pc;
                    if (flags.pp) urlPersonal.profession = flags.pp;
                    if (flags.pos) urlPersonal.position = flags.pos;
                    savePersonalAnswers(urlPersonal);
                }
                return { screen: 'map', started: true, pairs, lockedOutcomeId, flags };
            }
            return { screen: 'map' };
        }

        

        function renderState(state, animated) {
            const render = () => {
                renderMap(state.pairs, state.lockedOutcomeId, state.flags, state.started);
            };
            if (animated) { transition(render); } else { render(); }
        }

        window.addEventListener('popstate', (e) => {
            if (e.state) {
                renderState(e.state, false);
            } else {
                renderState(routeFromHash(), false);
            }
        });

        // --- Transitions ---
        function transition(renderFn) {
            app.classList.remove('fade-in');
            app.classList.add('fade-out');
            setTimeout(() => {
                renderFn();
                app.classList.remove('fade-out');
                app.classList.add('fade-in');
                window.scrollTo({ top: 0, behavior: 'instant' });
                app.addEventListener('animationend', () => {
                    app.classList.remove('fade-in');
                }, { once: true });
            }, 260);
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function md(str) {
            if (!str) return '';
            return marked.parse(str.replace(/~/g, '\\~'));
        }

        function stripMd(str) {
            if (!str) return '';
            return str.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/\n\n/g, ' ');
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('visible');
            setTimeout(() => toastEl.classList.remove('visible'), 2200);
        }

        

        // --- Render: Map (unified view) ---
        function renderMap(initialPairs, lockedOutcomeId, initialFlags, initialStarted) {
            let stack = Engine.createStack();
            if (initialPairs && initialPairs.length > 0) {
                for (const { nodeId, edgeId } of initialPairs) {
                    stack = Engine.push(stack, nodeId, edgeId);
                }
            }
            let lockedId = (lockedOutcomeId && templatesMap[lockedOutcomeId]) ? lockedOutcomeId : '';
            const flags = initialFlags || {};
            let fullQuestions = flags.fullQuestions !== false;
            let expandTimeline = flags.expandTimeline !== false;
            let showOutcomes = flags.showOutcomes === true;
            let debugMode = flags.debugMode === true;
            let timelineDurations = [];
            let timelineNodeIds = [];
            let mapAnimator = null;
            let _pushNextSync = false;
            const hasSelections = stack.length > 1;
            let started = hasSelections || initialStarted === true;

            function moodColor(mood) {
                const map = { utopian:'var(--mood-utopian)', dystopian:'var(--mood-dystopian)',
                    mixed:'var(--mood-mixed)', stagnant:'var(--mood-stagnant)', chaotic:'var(--mood-chaotic)' };
                return map[mood] || 'var(--text-dim)';
            }

            function getLockedTemplate() {
                return lockedId ? templatesMap[lockedId] : null;
            }

            function wouldReachOutcome(nodeId, edgeId) {
                const t = getLockedTemplate();
                if (!t) return true;
                const testStack = Engine.push(stack, nodeId, edgeId);
                const eff = Engine.resolvedState(Engine.currentState(testStack));
                return Engine.templatePartialMatch(t, eff);
            }

            function mutateStack(action, opts) {
                _pushNextSync = true;
                const oldStack = stack;
                if (mapAnimator) {
                    mapAnimator.animateTransition({
                        applyChange: () => { stack = action(oldStack); },
                        onComplete: () => syncHash(),
                        fadeFooterIn: opts && opts.fadeFooterIn,
                    });
                } else {
                    stack = action(stack);
                    update();
                }
            }

            function findNextQuestion() {
                const sel = Engine.currentState(stack);
                for (const node of Engine.displayOrder(stack)) {
                    const locked = Engine.isNodeLocked(sel, node);
                    if (locked !== null) {
                        if (!Engine.stackHas(stack, node.id)) {
                            const hasReasons = node.edges.some(v =>
                                Engine.getEdgeDisabledReason(sel, node, v) !== null
                            );
                            if (hasReasons) {
                                const options = node.edges.map(v => {
                                    const disabled = Engine.isEdgeDisabled(sel, node, v);
                                    const reason = Engine.getEdgeDisabledReason(sel, node, v);
                                    const variant = v.narrativeVariants ? resolveNarrativeVariant(v.narrativeVariants, sel) : null;
                                    return {
                                        value: v.id, label: v.label,
                                        answerLabel: (variant && variant.answerLabel) || v.answerLabel || v.label,
                                        answerDesc: (variant && variant.answerDesc) || v.answerDesc || '',
                                        nodeId: node.id,
                                        reachable: !disabled,
                                        disabled,
                                        disabledReason: reason,
                                    };
                                });
                                return { node, options, isForced: true, forcedValue: locked };
                            }
                        }
                        continue;
                    }
                    if (Engine.stackHas(stack, node.id)) continue;
                    if (sel[node.id]) continue;
                    const options = node.edges
                        .map(v => {
                            const disabled = Engine.isEdgeDisabled(sel, node, v);
                            const reason = Engine.getEdgeDisabledReason(sel, node, v);
                            const variant = v.narrativeVariants ? resolveNarrativeVariant(v.narrativeVariants, sel) : null;
                            return {
                                value: v.id,
                                label: v.label,
                                answerLabel: (variant && variant.answerLabel) || v.answerLabel || v.label,
                                answerDesc: (variant && variant.answerDesc) || v.answerDesc || '',
                                nodeId: node.id,
                                reachable: disabled ? false : wouldReachOutcome(node.id, v.id),
                                disabled,
                                disabledReason: reason,
                            };
                        });
                    if (options.some(o => !o.disabled)) return { node, options };
                }
                return null;
            }

            function buildTimelineEvents(nextQ) {
                const sel = Engine.currentState(stack);
                const events = [];
                let foundFrontier = false;

                for (const node of Engine.displayOrder(stack)) {
                    const locked = Engine.isNodeLocked(sel, node);
                    const value = sel[node.id] || locked;
                    const isLockedNode = locked !== null;

                    if (nextQ && nextQ.isForced && node.id === nextQ.node.id) continue;

                    if (!value) {
                        if (!foundFrontier && !fullQuestions && nextQ && nextQ.node.id === node.id) {
                            foundFrontier = true;
                            const siblings = nextQ.options.map(o => ({
                                value: o.value, label: o.label,
                                nodeId: o.nodeId, reachable: o.reachable,
                                disabled: o.disabled,
                            }));
                            events.push({ headline: '', description: '', durationMin: 0, durationMax: 0, stage: node.stage, year: '', paramLabel: '', nodeLabel: node.label, nodeId: node.id, selectedValue: null, siblings, isFrontier: true });
                        }
                        continue;
                    }

                    const narr = nodeNarrativeFor(node.id, value, sel);
                    const nodeEdge = node.edges.find(v => v.id === value);
                    const paramLabel = nodeEdge ? nodeEdge.label : value;
                    const siblings = node.edges
                        .map(v => {
                            const edgeDisabled = Engine.isEdgeDisabled(sel, node, v) && v.id !== value;
                            return { value: v.id, label: v.label, nodeId: node.id, reachable: edgeDisabled ? false : (v.id === value || wouldReachOutcome(node.id, v.id)), disabled: edgeDisabled };
                        });
                    events.push({
                        headline: narr.headline || '', description: narr.description || '',
                        durationMin: narr.durationMin != null ? narr.durationMin : null,
                        durationMax: narr.durationMax != null ? narr.durationMax : null,
                        stage: narr.stage || node.stage, year: '', paramLabel,
                        nodeLabel: node.label, nodeId: node.id, selectedValue: value,
                        siblings, isFrontier: false, isLocked: isLockedNode
                    });
                }
                return events;
            }

            function updateTimelineLabels() {
                let cumulative = 0;
                timelineDurations.forEach((d, i) => {
                    const yearLabel = formatRange(cumulative, cumulative + d.current);
                    const yearEl = app.querySelector('[data-tsy="' + i + '"]');
                    if (yearEl) yearEl.textContent = yearLabel;
                    const slLabel = app.querySelector('[data-tsl="' + i + '"]');
                    if (slLabel) slLabel.textContent = formatDuration(d.current);
                    cumulative += d.current;
                });
            }

            function buildTimelineDateMap() {
                const map = {};
                let cumulative = 0;
                for (let i = 0; i < timelineDurations.length; i++) {
                    const d = timelineDurations[i];
                    const nodeId = timelineNodeIds[i];
                    if (nodeId && !map[nodeId]) {
                        map[nodeId] = formatMonths(cumulative + d.current).year;
                    }
                    cumulative += d.current;
                }
                map._totalYear = formatMonths(cumulative).year;
                return map;
            }

            function countTotalOutcomes() {
                let count = 0;
                for (const t of templatesList) {
                    if (t.variants && t.primaryDimension) {
                        count += Object.keys(t.variants).length;
                    } else {
                        count++;
                    }
                }
                return count;
            }

            function buildPathRecapHtml() {
                const sel = Engine.currentState(stack);
                const answered = [];
                for (const entry of stack) {
                    if (!entry.nodeId) continue;
                    const node = NODE_MAP[entry.nodeId];
                    if (!node) continue;
                    answered.push(entry);
                }

                let shown;
                if (answered.length <= 6) {
                    shown = answered;
                } else {
                    shown = [];
                    for (const dim of PATH_RECAP_PRIORITY) {
                        if (shown.length >= 6) break;
                        const entry = answered.find(e => e.nodeId === dim);
                        if (entry) shown.push(entry);
                    }
                    for (const entry of answered) {
                        if (shown.length >= 6) break;
                        if (!shown.includes(entry)) shown.push(entry);
                    }
                }

                if (shown.length === 0) return '';

                const rows = shown.map(entry => {
                    const node = NODE_MAP[entry.nodeId];
                    const edge = node.edges && node.edges.find(e => e.id === entry.edgeId);
                    if (!edge) return '';
                    const label = node.label || entry.nodeId;
                    const variant = edge.narrativeVariants ? resolveNarrativeVariant(edge.narrativeVariants, sel) : null;
                    const value = (variant && variant.answerLabel) || edge.answerLabel || edge.label;
                    return `<div class="path-step">
                        <span class="path-label">${esc(label)}</span>
                        <span class="path-dots"></span>
                        <span class="path-value">${esc(value)}</span>
                    </div>`;
                }).filter(Boolean).join('');

                return `<div class="outcome-path scroll-reveal">
                    <h2 class="outcome-section-heading">Your Path</h2>
                    <div class="path-steps">${rows}</div>
                </div>`;
            }


            function buildOutcomeSectionHtml() {
                const eff = Engine.resolvedState(Engine.currentState(stack));
                const matched = templatesList.filter(t => Engine.templateMatches(t, eff));
                if (matched.length === 0) return '';

                const t = matched[0];
                const resolved = resolveTemplate(t.id, eff);
                if (!resolved) return '';

                const key = outcomeKey(t.id, resolved.variantKey);
                track('outcome_reached', { outcome_id: t.id, variant_id: resolved.variantKey || null });
                logJourney(t.id, resolved.variantKey, stack);
                markDiscovered(key);

                const dateMap = buildTimelineDateMap();
                const circaYear = dateMap._totalYear;

                const badgeDelay = resolved.subtitle ? '0.3' : '0.15';
                const circaDelay = resolved.subtitle ? '0.45' : '0.3';
                const summaryDelay = resolved.subtitle ? '0.6' : '0.45';

                let heroHtml = `<div class="outcome-hero mood-bg-${resolved.mood}">
                    <div class="outcome-hero-inner">
                        <h1 class="outcome-title reveal-item">${esc(resolved.title)}</h1>
                        ${resolved.subtitle ? `<div class="outcome-subtitle reveal-item" style="--delay:0.15s">${esc(resolved.subtitle)}</div>` : ''}
                        <span class="mood-badge mood-${resolved.mood} reveal-item" style="--delay:${badgeDelay}s">${esc(resolved.mood)}</span>
                        <div class="outcome-circa reveal-item" style="--delay:${circaDelay}s">circa ${esc(String(circaYear))}</div>
                        <div class="outcome-summary reveal-item" style="--delay:${summaryDelay}s">${md(resolved.summary)}</div>
                    </div>
                </div>`;

                const pathHtml = buildPathRecapHtml();

                const vignettes = resolved.flavors;

                let vignettesHtml = '';
                if (vignettes.length > 0) {
                    vignettesHtml = '<div class="outcome-vignettes">';
                    for (const v of vignettes) {
                        const year = dateMap[v.nodeId];
                        const yearHtml = year ? `<span class="vignette-year">${esc(String(year))}</span>` : '';
                        vignettesHtml += `<div class="outcome-vignette scroll-reveal">
                            <div class="vignette-title">${esc(v.heading)}${yearHtml}</div>
                            <div class="vignette-text">${md(v.text)}</div>
                        </div>`;
                    }
                    vignettesHtml += '</div>';
                }

                let narrativeHtml = '';
                if (vignettesHtml) {
                    narrativeHtml = `<div class="outcome-narrative">${vignettesHtml}</div>`;
                }

                const cumulativeMonths = timelineDurations.reduce((sum, d) => sum + d.current, 0);
                const personalHtml = buildPersonalSectionHtml(t, eff, 0, cumulativeMonths);

                const ctaHtml = `<div class="outcome-cta scroll-reveal" style="text-align:center;margin:2rem 0;">
                    <button class="btn btn-primary" data-action="outcome-share">Share This Future</button>
                    <button class="btn btn-ghost" data-action="outcome-explore">Explore Another Path</button>
                </div>`;

                const totalOutcomes = countTotalOutcomes();
                const footerHtml = `<div class="outcome-footer scroll-reveal">
                    <div class="discovery-counter">You've discovered <strong>${discovered.size}</strong> of <strong>${totalOutcomes}</strong> possible futures</div>
                    <div class="outcome-cta">
                        <button class="btn btn-ghost" data-action="outcome-explore">Explore Another Path</button>
                    </div>
                    ${siteFooterHtml()}
                </div>`;

                return heroHtml + pathHtml + narrativeHtml + ctaHtml + personalHtml + footerHtml;
            }

            

            function syncHash() {
                const shouldPush = _pushNextSync;
                _pushNextSync = false;
                if (!started) {
                    history.replaceState({ screen: 'map' }, '', location.pathname);
                    return;
                }
                let hash = '/map';
                const entries = [];
                for (const entry of stack) {
                    if (!entry.nodeId) continue;
                    if (entry.state[entry.nodeId]) {
                        entries.push(encodeURIComponent(entry.nodeId) + '=' + encodeURIComponent(entry.edgeId));
                    }
                }
                if (lockedId) entries.push('locked=' + encodeURIComponent(lockedId));
                if (!fullQuestions) entries.push('fq=0');
                if (!expandTimeline) entries.push('et=0');
                if (showOutcomes) entries.push('so=1');
                if (debugMode) entries.push('db=1');
                if (personalAnswers) {
                    if (personalAnswers.country) entries.push('pc=' + encodeURIComponent(personalAnswers.country));
                    if (personalAnswers.profession) entries.push('pp=' + encodeURIComponent(personalAnswers.profession));
                    if (personalAnswers.position) entries.push('pos=' + encodeURIComponent(personalAnswers.position));
                }
                if (entries.length > 0) hash += '?' + entries.join('&');
                const stateFlags = { fullQuestions, expandTimeline, showOutcomes, debugMode };
                const pairs = stack.filter(e => e.nodeId).map(e => ({ nodeId: e.nodeId, edgeId: e.edgeId }));
                const state = { screen: 'map', pairs, lockedOutcomeId: lockedId, flags: stateFlags, started };
                if (shouldPush) {
                    history.pushState(state, '', '#' + hash);
                } else {
                    history.replaceState(state, '', '#' + hash);
                }
            }

            function getHiddenState(s) {
                const locked = (s && s._locked) || {};
                const eff = Engine.resolvedState(s);
                const hidden = {};
                for (const [k, v] of Object.entries(locked)) {
                    if (v && s[k]) hidden[k] = { value: s[k], eff: eff[k] || s[k] };
                }
                for (const node of NODES) {
                    if (!node.derivedFrom) continue;
                    const raw = s[node.id];
                    const effVal = eff[node.id];
                    if (effVal && raw !== effVal) {
                        hidden[node.id] = hidden[node.id] || {};
                        hidden[node.id].derived = effVal;
                        if (raw) hidden[node.id].raw = raw;
                    }
                }
                return hidden;
            }

            function getVisibleNodes(s) {
                const vis = new Set();
                for (const node of NODES) {
                    if (node.terminal || node.derived) continue;
                    if (Engine.isNodeVisible(s, node)) vis.add(node.id);
                }
                return vis;
            }

            function hiddenStateDiff(baseStack, nodeId, edgeId) {
                const baseSel = Engine.currentState(baseStack);
                const testStack = Engine.push(baseStack, nodeId, edgeId);
                const test = Engine.currentState(testStack);

                const changes = [];

                const before = getHiddenState(baseSel);
                const after = getHiddenState(test);
                for (const [k, v] of Object.entries(after)) {
                    const label = v.value || v.derived || '';
                    const bLabel = before[k] ? (before[k].value || before[k].derived || '') : '';
                    if (label !== bLabel) {
                        const nodeObj = NODE_MAP[k];
                        const nodeName = nodeObj ? nodeObj.label : k;
                        if (before[k]) {
                            changes.push({ type: 'lock', text: nodeName + ': ' + bLabel + ' \u2192 ' + label });
                        } else {
                            changes.push({ type: 'lock', text: nodeName + ' = ' + label });
                        }
                    }
                }
                for (const [k, v] of Object.entries(before)) {
                    if (!after[k]) {
                        const nodeObj = NODE_MAP[k];
                        const nodeName = nodeObj ? nodeObj.label : k;
                        changes.push({ type: 'lock', text: nodeName + ': removed' });
                    }
                }

                const visBefore = getVisibleNodes(baseSel);
                const visAfter = getVisibleNodes(test);
                for (const id of visAfter) {
                    if (!visBefore.has(id) && id !== nodeId) {
                        const nodeObj = NODE_MAP[id];
                        changes.push({ type: 'activate', text: '+ ' + (nodeObj ? nodeObj.label : id) });
                    }
                }
                for (const id of visBefore) {
                    if (!visAfter.has(id) && id !== nodeId) {
                        const nodeObj = NODE_MAP[id];
                        changes.push({ type: 'deactivate', text: '\u2212 ' + (nodeObj ? nodeObj.label : id) });
                    }
                }

                return changes;
            }

            function update() {
                const sel = Engine.currentState(stack);

                const debugPanel = app.querySelector('.debug-panel');
                if (debugPanel) {
                    if (debugMode) {
                        const eff = Engine.resolvedState(sel);
                        const hidden = getHiddenState(sel);
                        const keys = Object.keys(hidden);

                        console.group('%c[Debug] State after update', 'color: #8b5cf6; font-weight: bold');
                        const answered = [];
                        for (const node of NODES) {
                            if (node.terminal || node.derived) continue;
                            if (!sel[node.id]) continue;
                            const effVal = eff[node.id];
                            const isLocked = sel._locked && sel._locked[node.id];
                            let line = node.label + ' (' + node.id + ') = ' + sel[node.id];
                            if (effVal && effVal !== sel[node.id]) line += ' → eff=' + effVal;
                            if (isLocked) line += ' [auto]';
                            answered.push(line);
                        }
                        if (answered.length) {
                            console.log('%cAnswered:', 'font-weight:bold');
                            answered.forEach(l => console.log('  ' + l));
                        }
                        const upcoming = [];
                        for (const node of NODES) {
                            if (node.terminal || node.derived) continue;
                            if (!Engine.isNodeVisible(sel, node)) continue;
                            if (sel[node.id]) continue;
                            const locked = Engine.isNodeLocked(sel, node);
                            if (locked !== null) {
                                upcoming.push(node.label + ' (' + node.id + ') = ' + locked + ' [will auto-lock]');
                            } else {
                                upcoming.push(node.label + ' (' + node.id + ') [pending]');
                            }
                        }
                        if (upcoming.length) {
                            console.log('%cUpcoming:', 'font-weight:bold');
                            upcoming.forEach(l => console.log('  ' + l));
                        }
                        console.groupEnd();

                        let panelHtml = '';

                        if (keys.length > 0) {
                            const rows = keys.map(k => {
                                const v = hidden[k];
                                const nodeObj = NODE_MAP[k];
                                const name = nodeObj ? nodeObj.label : k;
                                const parts = [];
                                if (v.value) parts.push('locked=' + v.value);
                                if (v.derived) parts.push('derived=' + v.derived);
                                if (v.raw) parts.push('raw=' + v.raw);
                                if (v.eff && v.eff !== v.value) parts.push('eff=' + v.eff);
                                return '<span class="debug-key">' + esc(name) + '</span> <span class="debug-val">' + esc(parts.join(', ')) + '</span>';
                            });
                            panelHtml += '<div class="debug-title">Auto-locked / Derived</div>' + rows.join('<br>');
                        }

                        const visNodes = [];
                        for (const node of NODES) {
                            if (node.terminal || node.derived) continue;
                            if (!Engine.isNodeVisible(sel, node)) continue;
                            const locked = Engine.isNodeLocked(sel, node);
                            const isAnswered = !!sel[node.id];
                            if (locked !== null && !isAnswered) {
                                visNodes.push('<span class="debug-val">' + esc(node.label) + ' = ' + esc(locked) + ' (auto)</span>');
                            } else if (!isAnswered) {
                                visNodes.push('<span class="debug-activate">' + esc(node.label) + '</span>');
                            }
                        }
                        if (visNodes.length > 0) {
                            panelHtml += (panelHtml ? '<div style="margin-top:0.4rem">' : '<div>') +
                                '<div class="debug-title">Upcoming</div>' +
                                visNodes.join(' &middot; ') + '</div>';
                        }

                        debugPanel.innerHTML = panelHtml || '<span class="debug-val">no hidden state</span>';
                        debugPanel.style.display = '';
                    } else {
                        debugPanel.innerHTML = '';
                        debugPanel.style.display = 'none';
                    }
                }

                const nextQ = started ? findNextQuestion() : null;
                const events = started ? buildTimelineEvents(nextQ) : [];
                const timelineEl = app.querySelector('.map-timeline');
                if (timelineEl && !started) {
                    timelineEl.innerHTML = '';
                }
                if (timelineEl && started) {
                    timelineEl.classList.toggle('timeline-light', !expandTimeline);
                    const tlResult = mapAnimator.renderTimeline(events, {
                        expanded: expandTimeline,
                        formatRange,
                        formatDuration,
                        nextQuestion: nextQ ? { stage: nextQ.node.stage } : null,
                        fullQuestions,
                    });
                    timelineDurations = tlResult.durations;
                    timelineNodeIds = events.map(e => e.nodeId);
                    timelineEl.innerHTML = tlResult.html;
                    timelineEl.querySelectorAll('.timeline-slider input[type="range"]').forEach(slider => {
                        slider.addEventListener('input', () => {
                            const idx = parseInt(slider.dataset.tsi);
                            timelineDurations[idx].current = parseFloat(slider.value);
                            updateTimelineLabels();
                        });
                    });
                    timelineEl.querySelectorAll('.tl-pill').forEach(pill => {
                        pill.addEventListener('click', () => {
                            const action = pill.dataset.pathaction;
                            if (!action) return;
                            const nodeId = pill.dataset.dim;
                            const val = pill.dataset.val;

                            if (action === 'frontier' || action === 'change') {
                                mutateStack(s => Engine.push(Engine.popTo(s, nodeId), nodeId, val));
                            } else if (action === 'unclick') {
                                mutateStack(s => Engine.popTo(s, nodeId));
                            }
                        });
                    });
                }

                const questionZone = app.querySelector('.question-zone');
                if (questionZone) {
                    if (!started) {
                        questionZone.innerHTML = `
                            <div class="question-card intro-card">
                                <div class="intro-body">
                                    <p class="subtitle">What do you think happens with AI? Walk through the key questions — from how fast it advances to whether we can control it — and see the future your beliefs imply.</p>
                                    <p class="subtitle" style="color:var(--text-dim); font-size:0.9rem; margin-bottom:1.5rem;">~5 minutes · 28 possible outcomes</p>
                                    <div class="actions">
                                        <button class="btn btn-primary" data-action="begin">Start</button>
                                    </div>
                                </div>
                            </div>`;
                        questionZone.style.display = 'flex';
                        questionZone.style.flex = '1';
                        questionZone.querySelector('[data-action="begin"]').addEventListener('click', () => {
                            track('journey_start');
                            started = true;
                            mutateStack(s => s, { fadeFooterIn: true });
                        });
                    } else if (fullQuestions && nextQ) {
                        questionZone.style.flex = '';
                        const questionData = {
                            nodeLabel: nextQ.node.label,
                            questionText: nextQ.node.questionText || nextQ.node.label,
                            questionContext: Engine.resolveContextWhen(Engine.currentState(stack), nextQ.node),
                            source: nextQ.node.source,
                            isForced: nextQ.isForced || false,
                            forcedValue: nextQ.forcedValue || null,
                            answers: nextQ.options.map(o => ({
                                label: o.answerLabel,
                                desc: o.answerDesc,
                                nodeId: o.nodeId,
                                value: o.value,
                                reachable: o.reachable,
                                disabled: o.disabled,
                                disabledReason: o.disabledReason || null,
                            })),
                        };
                        const qResult = mapAnimator.renderQuestionCard(questionData, {
                            compact: !fullQuestions,
                            showContext: fullQuestions,
                            showSource: fullQuestions,
                            showDesc: fullQuestions,
                        });
                        questionZone.innerHTML = qResult.html;
                        questionZone.style.display = '';
                        if (debugMode) {
                            questionZone.querySelectorAll('.answer-card').forEach(cardEl => {
                                const idx = parseInt(cardEl.dataset.aidx, 10);
                                const answer = qResult.answerCards[idx];
                                if (!answer) return;
                                const changes = hiddenStateDiff(stack, answer.nodeId, answer.value);
                                if (changes.length > 0) {
                                    const debugEl = document.createElement('div');
                                    debugEl.className = 'debug-diff';
                                    debugEl.innerHTML = changes.map(c => {
                                        const cls = c.type === 'activate' ? 'debug-activate'
                                            : c.type === 'deactivate' ? 'debug-deactivate'
                                            : 'debug-lock';
                                        return '<span class="' + cls + '">' + esc(c.text) + '</span>';
                                    }).join('<br>');
                                    cardEl.appendChild(debugEl);
                                }
                            });
                        }
                        if (qResult.isForced) {
                            const continueBtn = questionZone.querySelector('.forced-continue-btn');
                            if (continueBtn) {
                                continueBtn.addEventListener('click', () => {
                                    if (mapAnimator && mapAnimator.isAnimating()) return;
                                    const lockedValue = nextQ.forcedValue;
                                    track('question_answered', { question_id: nextQ.node.id, answer: lockedValue, forced: true });
                                    mutateStack(s => Engine.push(s, nextQ.node.id, lockedValue));
                                });
                            }
                        } else {
                            questionZone.querySelectorAll('.answer-card').forEach(cardEl => {
                                cardEl.addEventListener('click', () => {
                                    if (cardEl.classList.contains('disabled')) return;
                                    if (cardEl.classList.contains('forced-selected')) return;
                                    if (mapAnimator && mapAnimator.isAnimating()) return;
                                    const idx = parseInt(cardEl.dataset.aidx, 10);
                                    const answer = qResult.answerCards[idx];
                                    if (!answer || answer.disabled) return;
                                    track('question_answered', { question_id: answer.nodeId, answer: answer.value });
                                    mutateStack(s => Engine.push(s, answer.nodeId, answer.value));
                                });
                            });
                        }
                    } else {
                        questionZone.innerHTML = '';
                        questionZone.style.display = 'none';
                        questionZone.style.flex = '';
                    }
                }

                const outcomesGrid = app.querySelector('.map-outcomes-zone');
                if (outcomesGrid) {
                    if (showOutcomes) {
                        const eff = Engine.resolvedState(Engine.currentState(stack));
                        const matched = [], partial = [];
                        for (const t of templatesList) {
                            if (Engine.templateMatches(t, eff)) matched.push(t);
                            else if (Engine.templatePartialMatch(t, eff)) partial.push(t);
                        }

                        const cardsHtml = templatesList.map(t => {
                            const resolved = resolveTemplate(t.id, eff);
                            const title = resolved ? resolved.title : t.title || t.id;
                            const subtitle = resolved ? resolved.subtitle : null;
                            const mood = resolved ? resolved.mood : t.mood || 'mixed';
                            const summary = resolved ? resolved.summary : t.summary || '';
                            const isMatch = matched.includes(t);
                            const isPartial = partial.includes(t);
                            const isLocked = lockedId && t.id === lockedId;
                            const isUnlocked = lockedId && t.id !== lockedId;
                            let cls = isMatch ? ' matched' : (!isMatch && !isPartial ? ' dimmed' : '');
                            if (isLocked) cls += ' locked';
                            else if (isUnlocked) cls += ' not-locked';
                            return `<div class="explorer-card${cls}" data-tid="${esc(t.id)}">
                                <div class="ec-title"><span class="ec-dot" style="background:${moodColor(mood)}"></span>${esc(title)}${subtitle ? ` <span class="ec-subtitle">\u2014 ${esc(subtitle)}</span>` : ''}</div>
                                <div class="ec-summary">${esc(stripMd(summary))}</div></div>`;
                        }).join('');

                        const matchLabel = matched.length === 1 ? '1 outcome matches' :
                            matched.length > 1 ? matched.length + ' outcomes match' : '';

                        outcomesGrid.innerHTML = `
                            <div class="map-outcomes-label">Possible Outcomes${matchLabel ? ` <span class="map-outcomes-count">(${matchLabel})</span>` : ''}</div>
                            <div class="explorer-grid">${cardsHtml}</div>`;
                        outcomesGrid.style.display = '';

                        outcomesGrid.querySelectorAll('.explorer-card').forEach(card => {
                            card.addEventListener('click', () => {
                                if (card.classList.contains('dimmed')) return;
                                const tid = card.dataset.tid;
                                if (tid) {
                                    lockedId = (tid === lockedId) ? '' : tid;
                                    update();
                                }
                            });
                        });
                    } else {
                        outcomesGrid.innerHTML = '';
                        outcomesGrid.style.display = 'none';
                    }
                }

                const outcomeZone = app.querySelector('.map-outcome-zone');
                if (outcomeZone) {
                    if (!nextQ) {
                        outcomeZone.innerHTML = buildOutcomeSectionHtml();
                        outcomeZone.style.display = '';
                        setupOutcomeReveals(outcomeZone);
                        const shareBtn = outcomeZone.querySelector('[data-action="outcome-share"]');
                        if (shareBtn) {
                            shareBtn.addEventListener('click', () => {
                                track('outcome_shared');
                                const eff2 = Engine.resolvedState(Engine.currentState(stack));
                                const matched2 = templatesList.filter(t => Engine.templateMatches(t, eff2));
                                let shareUrl = location.origin + location.pathname + location.hash;
                                if (matched2.length > 0) {
                                    const resolved2 = resolveTemplate(matched2[0].id, eff2);
                                    if (resolved2) {
                                        const slug = resolved2.variantKey ? matched2[0].id + '--' + resolved2.variantKey : matched2[0].id;
                                        shareUrl = location.origin + location.pathname + 'share/' + slug + '.html';
                                    }
                                }
                                if (navigator.clipboard) {
                                    navigator.clipboard.writeText(shareUrl).then(() => showToast('Link copied!'));
                                } else {
                                    showToast(shareUrl);
                                }
                            });
                        }
                        const exploreBtn = outcomeZone.querySelector('[data-action="outcome-explore"]');
                        if (exploreBtn) {
                            exploreBtn.addEventListener('click', () => {
                                track('explore_another');
                                resetSelections();
                            });
                        }
                        const eff = Engine.resolvedState(Engine.currentState(stack));
                        const matchedT = templatesList.filter(t => Engine.templateMatches(t, eff));
                        if (matchedT.length > 0) {
                            const cumMonths = timelineDurations.reduce((sum, d) => sum + d.current, 0);
                            wirePersonalSection(outcomeZone, matchedT[0], eff, 0, cumMonths);
                        }
                    } else {
                        outcomeZone.innerHTML = '';
                        outcomeZone.style.display = 'none';
                    }
                }

                const animating = mapAnimator && mapAnimator.isAnimating();
                if (mapAnimator && !animating) mapAnimator._adjustVlines();
                if (!animating) syncHash();
            }

            app.innerHTML = `
                <div class="map-screen">
                    <div class="map-toolbar">
                        <span class="map-title" data-action="home" style="cursor:pointer">AI Singularity Map</span>
                        <div class="map-settings-wrap">
                            <button class="map-view-btn" aria-label="View options"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/><circle cx="12" cy="4" r="2"/><circle cx="10" cy="12" r="2"/><circle cx="14" cy="20" r="2"/></svg></button>
                            <div class="map-settings-dropdown" style="display:none">
                                <label class="map-toggle"><input type="checkbox" data-flag="fq"${fullQuestions ? ' checked' : ''}><span>Full Questions</span></label>
                                <label class="map-toggle"><input type="checkbox" data-flag="et"${expandTimeline ? ' checked' : ''}><span>Expand Timeline</span></label>
                                <label class="map-toggle"><input type="checkbox" data-flag="so"${showOutcomes ? ' checked' : ''}><span>Show Outcomes</span></label>
                            </div>
                        </div>
                        <div class="debug-panel" style="display:none"></div>
                    </div>
                    <div class="map-timeline timeline"></div>
                    <div class="question-zone"></div>
                    <div class="map-outcome-zone" style="display:none"></div>
                    <div class="map-outcomes-zone" style="display:none"></div>
                    <div class="map-actions">
                        <button class="btn btn-ghost" data-action="home">Back to Start</button>
                        <button class="btn btn-ghost" data-action="reset">Reset</button>
                        <button class="btn btn-ghost" data-action="share">Copy Link</button>
                        ${siteFooterHtml()}
                    </div>
                </div>`;

            

            const viewBtn = app.querySelector('.map-view-btn');
            const viewDropdown = app.querySelector('.map-settings-dropdown');
            viewBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const open = viewDropdown.style.display !== 'none';
                viewDropdown.style.display = open ? 'none' : '';
            });
            document.addEventListener('click', (e) => {
                if (!viewDropdown.contains(e.target) && e.target !== viewBtn) {
                    viewDropdown.style.display = 'none';
                }
            });

            app.querySelectorAll('.map-toggle input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.dataset.flag === 'fq') fullQuestions = cb.checked;
                    if (cb.dataset.flag === 'et') expandTimeline = cb.checked;
                    if (cb.dataset.flag === 'so') showOutcomes = cb.checked;
                    
                    update();
                });
            });

            function resetSelections() {
                stack = Engine.createStack();
                started = true;
                update();
            }

            function backToStart() {
                track('back_to_start');
                stack = Engine.createStack();
                started = false;
                history.replaceState({ screen: 'map' }, '', location.pathname);
                update();
            }

            app.addEventListener('click', e => {
                const btn = e.target.closest('[data-action="reset-sel"]');
                if (btn) resetSelections();
            });
            app.addEventListener('click', e => {
                if (e.target.closest('[data-action="home"]')) backToStart();
                if (e.target.closest('[data-action="reset"]')) resetSelections();
            });

            window.toggleDebug = () => { debugMode = !debugMode; update(); return debugMode ? 'Debug ON' : 'Debug OFF'; };
            listen('[data-action="share"]', 'click', () => {
                const url = location.origin + location.pathname + location.hash;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
                } else {
                    showToast(url);
                }
            });

            mapAnimator = new TimelineAnimator({
                containerEl: app,
                timelineEl: app.querySelector('.map-timeline'),
                questionZoneEl: app.querySelector('.question-zone'),
                outcomeEl: app.querySelector('.map-outcome-zone'),
                headerEl: app.querySelector('.map-toolbar'),
                stages: SCENARIO.stages,
                contentSelector: '.question-text, .question-context, .question-source, .answers',
                morphDuration: 1500,
                stripFromAnimation: '.timeline-param-dim',
                render: () => update(),
                wireAnswerButtons: () => {},
            });

            update();

            requestAnimationFrame(() => {
                const questionCard = app.querySelector('.question-card');
                if (!questionCard) return;
                const toolbar = app.querySelector('.map-toolbar');
                const toolbarHeight = toolbar ? toolbar.offsetHeight : 0;
                const cardTop = questionCard.getBoundingClientRect().top + window.scrollY;
                const scrollTarget = cardTop - toolbarHeight - 12;
                if (scrollTarget > 0) {
                    window.scrollTo({ top: scrollTarget, behavior: 'instant' });
                }
            });
        }

        // --- Render: Error ---
        function renderError(err) {
            app.innerHTML = `
                <div class="error-screen">
                    <h2>Failed to Load</h2>
                    <p>AI Singularity Map needs to be served over HTTP to load its data files. If you opened this file directly, try running a local server:</p>
                    <code>python3 -m http.server 8000</code>
                    <p style="margin-top:1rem;font-size:0.85rem;">Then visit <strong>http://localhost:8000</strong></p>
                </div>`;
            console.error(err);
        }

        // --- Helpers ---
        function listen(selector, event, fn) {
            const el = app.querySelector(selector);
            if (el) el.addEventListener(event, fn);
        }

    })();
    </script>
</body>
</html>
