            { id: 'sovereignty', label: 'Power Holder', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], distribution: ['monopoly', 'concentrated', 'lagging'], geo_spread: ['one'] }, values: [
                { id: 'lab', label: 'The labs' }, { id: 'state', label: 'The state' } ] },
            { id: 'gov_action', label: 'State Policy', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], geo_spread: ['one'] },
              lockedWhen: { takeoff: { equals: 'hard', value: 'accelerate' }, sovereignty: { equals: 'lab', value: 'accelerate' } }, values: [
                { id: 'decelerate', label: 'Decelerate' }, { id: 'accelerate', label: 'Accelerate' } ] },
            { id: 'decel_2mo', label: '2 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], gov_action: ['decelerate'] }, values: [
                { id: 'solved', label: 'Solved' }, { id: 'escapes', label: 'AI Escapes' },
                { id: 'abandon', label: 'Abandon & Accelerate' }, { id: 'rival', label: 'Rival Reaches Parity' },
                { id: 'continue', label: 'Continue' } ] },
            { id: 'decel_4mo', label: '4 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], decel_2mo: ['continue'] }, values: [
                { id: 'solved', label: 'Solved' }, { id: 'escapes', label: 'AI Escapes' },
                { id: 'abandon', label: 'Abandon & Accelerate' }, { id: 'rival', label: 'Rival Reaches Parity' },
                { id: 'continue', label: 'Continue' } ] },
            { id: 'decel_6mo', label: '6 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], decel_4mo: ['continue'] }, values: [
                { id: 'parity_solved', label: 'Parity — Solved', requires: { open_source: ['six_months'] } },
                { id: 'parity_failed', label: 'Parity — Failed', requires: { open_source: ['six_months'] } },
                { id: 'solved', label: 'Solved', requires: { open_source: ['twelve_months', 'twenty_four_months'] } },
                { id: 'escapes', label: 'AI Escapes', requires: { open_source: ['twelve_months', 'twenty_four_months'] } },
                { id: 'abandon', label: 'Abandon & Accelerate', requires: { open_source: ['twelve_months', 'twenty_four_months'] } },
                { id: 'rival', label: 'Rival Reaches Parity', requires: { open_source: ['twelve_months', 'twenty_four_months'] } },
                { id: 'continue', label: 'Continue', requires: { open_source: ['twelve_months', 'twenty_four_months'] } } ] },
            { id: 'decel_9mo', label: '9 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], decel_6mo: ['continue'] }, values: [
                { id: 'solved', label: 'Solved' }, { id: 'escapes', label: 'AI Escapes' },
                { id: 'abandon', label: 'Abandon & Accelerate' }, { id: 'rival', label: 'Rival Reaches Parity' },
                { id: 'continue', label: 'Continue' } ] },
            { id: 'decel_12mo', label: '12 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], decel_9mo: ['continue'] }, values: [
                { id: 'parity_solved', label: 'Parity — Solved', requires: { open_source: ['twelve_months'] } },
                { id: 'parity_failed', label: 'Parity — Failed', requires: { open_source: ['twelve_months'] } },
                { id: 'solved', label: 'Solved', requires: { open_source: ['twenty_four_months'] } },
                { id: 'escapes', label: 'AI Escapes', requires: { open_source: ['twenty_four_months'] } },
                { id: 'abandon', label: 'Abandon & Accelerate', requires: { open_source: ['twenty_four_months'] } },
                { id: 'rival', label: 'Rival Reaches Parity', requires: { open_source: ['twenty_four_months'] } },
                { id: 'continue', label: 'Continue', requires: { open_source: ['twenty_four_months'] } } ] },
            { id: 'decel_18mo', label: '18 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], decel_12mo: ['continue'] }, values: [
                { id: 'solved', label: 'Solved' }, { id: 'escapes', label: 'AI Escapes' },
                { id: 'abandon', label: 'Abandon & Accelerate' }, { id: 'rival', label: 'Rival Reaches Parity' },
                { id: 'continue', label: 'Continue' } ] },
            { id: 'decel_24mo', label: '24 Months', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], decel_18mo: ['continue'] }, values: [
                { id: 'parity_solved', label: 'Parity — Solved' },
                { id: 'parity_failed', label: 'Parity — Failed' } ] },
            { id: 'alignment', label: 'Alignment', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'] }, values: [
                { id: 'solved', label: 'Solved' }, { id: 'failed', label: 'Failed' } ] },
            { id: 'proliferation_control', label: 'Proliferation Control', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['solved', 'failed'] }, values: [
                { id: 'active', label: 'Attempt strict control' },
                { id: 'none', label: 'No durable control' } ] },
            { id: 'enabled_aims', label: 'Enabled Aims', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['solved'], proliferation_control: ['active', 'none'] }, values: [
                { id: 'human_centered', label: 'Human-centered' },
                { id: 'proxy', label: 'Proxy / institutional' },
                { id: 'arbitrary', label: 'Arbitrary / unconstrained', requires: { proliferation_control: ['none'] } } ] },
            { id: 'containment', label: 'Containment', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['failed'] }, values: [
                { id: 'contained', label: 'Contained', requires: { distribution: ['lagging', 'concentrated', 'monopoly'] } },
                { id: 'escaped', label: 'Escapes' } ] },
            { id: 'intent', label: 'Intent', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['solved'], enabled_aims: ['human_centered', 'proxy'] }, values: [
                { id: 'self_interest', label: 'Self-interest', requires: [{ distribution: ['monopoly'], geo_spread: ['one'], proliferation_control: ['active'] }, { distribution: ['concentrated', 'lagging'], geo_spread: ['one'], sovereignty: ['state'], proliferation_control: ['active'] }] },
                { id: 'coexistence', label: 'Coexistence', requires: [{ distribution: ['open', 'lagging', 'concentrated'], open_source: ['near_parity', 'twelve_months', 'twenty_four_months'] }, { geo_spread: ['two'] }, { proliferation_control: ['none'] }] },
                { id: 'rivalry', label: 'Rivalry', requires: [{ distribution: ['open', 'lagging', 'concentrated'], open_source: ['near_parity', 'twelve_months', 'twenty_four_months'] }, { geo_spread: ['two'] }, { proliferation_control: ['none'] }] },
                { id: 'escalation', label: 'Escalation', requires: [{ distribution: ['open', 'lagging', 'concentrated'], open_source: ['near_parity', 'twelve_months', 'twenty_four_months'] }, { geo_spread: ['two'] }, { proliferation_control: ['none'] }] },
                { id: 'international', label: 'International' } ] },
            { id: 'ai_goals', label: 'AI Converges On', stage: 2,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['failed'], containment: ['escaped'] }, values: [
                { id: 'benevolent', label: 'Benefit humanity' }, { id: 'alien_coexistence', label: 'Alien (tolerant)' },
                { id: 'alien_extinction', label: 'Alien (total)' }, { id: 'paperclip', label: 'Arbitrary' },
                { id: 'swarm', label: 'No convergence' } ] },
            { id: 'failure_mode', label: 'Implementation', stage: 3,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['solved'] }, values: [
                { id: 'none', label: 'Succeeds' }, { id: 'whimper', label: 'Wrong metrics' },
                { id: 'disempowerment', label: 'Human irrelevance' } ] },
            { id: 'economic_speed', label: 'Speed', stage: 3,
              visibleWhen: { capability: ['singularity'], automation: ['deep'], alignment: ['solved'], intent: ['international'], failure_mode: ['none'] }, values: [
                { id: 'rapid', label: 'Rapid' }, { id: 'steady', label: 'Steady' }, { id: 'uneven', label: 'Uneven' } ] }
        ];
        const DIM_MAP = {};
        for (const d of DIM_META) DIM_MAP[d.id] = d;

        // --- Persistence ---
        const STORAGE_KEY = 'singularity-map-discovered';
        function loadDiscovered() {
            try {
                discovered = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
            } catch { discovered = new Set(); }
        }
        function saveDiscovered() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...discovered])); } catch {}
        }
        function markDiscovered(key) {
            if (!discovered.has(key)) {
                discovered.add(key);
                saveDiscovered();
            }
        }
        function outcomeKey(templateId, variantKey) {
            return variantKey ? templateId + '/' + variantKey : templateId;
        }

        // --- Routing ---
        function handleInitialRoute() {
            const state = routeFromHash();
            history.replaceState(state, '', location.href);
            renderState(state, false);
        }

        function routeFromHash() {
            const hash = location.hash.slice(1);
            if (hash.startsWith('/outcome/')) {
                let rest = hash.slice('/outcome/'.length);
                const dims = {};
                const qIdx = rest.indexOf('?');
                if (qIdx >= 0) {
                    rest.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (k && v) dims[decodeURIComponent(k)] = decodeURIComponent(v);
                    });
                    rest = rest.slice(0, qIdx);
                }
                const slashIdx = rest.indexOf('/');
                let tid, vk;
                if (slashIdx >= 0) {
                    tid = rest.slice(0, slashIdx);
                    vk = rest.slice(slashIdx + 1);
                } else {
                    tid = rest;
                    vk = null;
                }
                if (templatesMap[tid]) {
                    return { screen: 'outcome', templateId: tid, variantKey: vk, path: [], showPath: false, dims: Object.keys(dims).length ? dims : undefined };
                }
            }
            if (hash === '/gallery') return { screen: 'gallery' };
            if (hash === '/tree') return { screen: 'tree' };
            if (hash.startsWith('/explore')) {
                const dims = {};
                const qIdx = hash.indexOf('?');
                if (qIdx >= 0) {
                    hash.slice(qIdx + 1).split('&').forEach(pair => {
                        const [k, v] = pair.split('=');
                        if (k && v) dims[decodeURIComponent(k)] = decodeURIComponent(v);
                    });
                }
                return { screen: 'explore', dims };
            }
            return { screen: 'intro' };
        }

        function navigate(state, animated) {
            let hash = '';
            if (state.screen === 'outcome') {
                hash = '/outcome/' + state.templateId + (state.variantKey ? '/' + state.variantKey : '');
                if (state.dims && Object.keys(state.dims).length > 0) {
                    hash += '?' + Object.entries(state.dims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
            } else if (state.screen === 'gallery') {
                hash = '/gallery';
            } else if (state.screen === 'tree') {
                hash = '/tree';
            } else if (state.screen === 'explore') {
                hash = '/explore';
                if (state.dims && Object.keys(state.dims).length > 0) {
                    hash += '?' + Object.entries(state.dims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
            }
            history.pushState(state, '', hash ? '#' + hash : location.pathname);
            renderState(state, animated !== false);
        }

        function renderState(state, animated) {
            const render = () => {
                if (state.screen === 'outcome') {
                    if (state.path) path = state.path;
                    renderOutcome(state.templateId, state.variantKey, state.showPath, state.dims);
                } else if (state.screen === 'gallery') {
                    path = [];
                    renderGallery();
                } else if (state.screen === 'tree') {
                    renderTree();
                } else if (state.screen === 'explore') {
                    renderExplorer(state.dims);
                } else if (state.screen === 'question') {
                    if (state.path) path = state.path;
                    renderQuestion(state.questionId);
                } else {
                    path = [];
                    renderIntro();
                }
            };
            if (animated) { transition(render); } else { render(); }
        }

        window.addEventListener('popstate', (e) => {
            if (e.state) {
                renderState(e.state, false);
            } else {
                renderState(routeFromHash(), false);
            }
        });

        // --- Transitions ---
        function transition(renderFn) {
            app.classList.remove('fade-in');
            app.classList.add('fade-out');
            setTimeout(() => {
                renderFn();
                app.classList.remove('fade-out');
                app.classList.add('fade-in');
                window.scrollTo({ top: 0, behavior: 'instant' });
            }, 260);
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('visible');
            setTimeout(() => toastEl.classList.remove('visible'), 2200);
        }

        // --- Render: Intro ---
        function renderIntro() {
            const count = allVariants.filter(v => discovered.has(outcomeKey(v.templateId, v.variantKey))).length;
            const total = allVariants.length;
            app.innerHTML = `
                <div class="intro">
                    <h1>Singularity Map</h1>
                    <p class="subtitle">Navigate the branching futures of artificial intelligence. Your beliefs shape the path. Where do you end up?</p>
                    <div class="actions">
                        <button class="btn btn-primary" data-action="start">Story Mode</button>
                        <button class="btn btn-secondary" data-action="explore">Explore Futures</button>
                    </div>
                    ${count > 0 ? `<p class="discovery">${count} of ${total} future${total !== 1 ? 's' : ''} discovered</p>` : ''}
                </div>`;
            listen('[data-action="start"]', 'click', () => {
                path = [];
                navigate({ screen: 'question', questionId: rootId, path: [] });
            });
            listen('[data-action="explore"]', 'click', () => navigate({ screen: 'explore' }));
        }

        // --- Render: Question ---
        function renderQuestion(questionId) {
            const q = questionsMap[questionId];
            if (!q) { renderIntro(); return; }

            let crumbs = '';
            if (path.length > 0) {
                const parts = path.map(p => `<span class="crumb">${esc(p.answerLabel)}</span>`);
                crumbs = `<div class="breadcrumbs">${parts.join('<span class="sep">\u2192</span>')}</div>`;
            }

            let source = '';
            if (q.source) {
                source = `<div class="question-source"><a href="${esc(q.source.url)}" target="_blank" rel="noopener">${esc(q.source.label)} \u2197</a></div>`;
            }

            const dims = dimensionsFromPath(path);
            const visibleAnswers = q.answers
                .map((a, i) => ({ ...a, originalIndex: i }))
                .filter(a => answerVisible(a, dims));

            const answers = visibleAnswers.map(a => `
                <div class="answer-card" data-idx="${a.originalIndex}">
                    <div class="label">${esc(a.label)}</div>
                    ${a.description ? `<div class="desc">${esc(a.description)}</div>` : ''}
                </div>`).join('');

            app.innerHTML = `
                <div class="question-screen">
                    ${crumbs}
                    <div class="question-text">${esc(q.text)}</div>
                    ${q.context ? `<div class="question-context">${esc(q.context)}</div>` : ''}
                    ${source}
                    <div class="answers">${answers}</div>
                    <div class="question-nav">
                        ${path.length > 0
                            ? '<button class="btn btn-ghost" data-action="back">\u2190 Back</button>'
                            : '<button class="btn btn-ghost" data-action="home">\u2190 Home</button>'}
                    </div>
                </div>`;

            app.querySelectorAll('.answer-card').forEach(card => {
                card.addEventListener('click', () => {
                    const idx = parseInt(card.dataset.idx, 10);
                    const answer = q.answers[idx];
                    const stepDims = collectStepDims(q, answer);
                    path.push({
                        questionId: q.id,
                        answerIndex: idx,
                        answerLabel: answer.label,
                        questionText: q.text,
                        dims: stepDims
                    });
                    const next = answer.next;
                    if (questionsMap[next]) {
                        navigate({ screen: 'question', questionId: next, path: [...path] });
                    } else if (templatesMap[next]) {
                        const dims = dimensionsFromPath(path);
                        const resolved = resolveTemplate(next, dims);
                        const key = outcomeKey(next, resolved.variantKey);
                        markDiscovered(key);
                        navigate({
                            screen: 'outcome',
                            templateId: next,
                            variantKey: resolved.variantKey,
                            path: [...path],
                            showPath: true,
                            dims: dims
                        });
                    } else {
                        console.error('Unknown next node:', next);
                    }
                });
            });

            listen('[data-action="back"]', 'click', () => {
                const prev = path.pop();
                if (prev) navigate({ screen: 'question', questionId: prev.questionId, path: [...path] });
            });
            listen('[data-action="home"]', 'click', () => history.back());
        }

        // --- Render: Outcome ---
        function renderOutcome(templateId, variantKey, showPath, passedDims) {
            const t = templatesMap[templateId];
            if (!t) { renderIntro(); return; }

            const pathDims = dimensionsFromPath(path);
            const localDims = { ...pathDims, ...(passedDims || {}) };
            if (variantKey && t.primaryDimension && !localDims[t.primaryDimension]) {
                localDims[t.primaryDimension] = variantKey;
            }

            const isSingularityOutcome = t.reachable && t.reachable.some(c => c.capability && c.capability.includes('singularity'));

            const adjustableIds = new Set();
            if (t.primaryDimension) adjustableIds.add(t.primaryDimension);
            if (t.flavors) for (const k of Object.keys(t.flavors)) adjustableIds.add(k);
            adjustableIds.add('capability');
            if (isSingularityOutcome) { adjustableIds.add('automation'); adjustableIds.add('automation_recovery'); }
            if (t.flavors && t.flavors.stall_recovery) adjustableIds.add('stall_recovery');
            if (t.flavors && t.flavors.automation_recovery) adjustableIds.add('automation_recovery');
            const relevantDims = DIM_META.filter(d => adjustableIds.has(d.id));

            const validValues = {};
            for (const dimId of adjustableIds) {
                const s = new Set();
                if (dimId === t.primaryDimension && t.variants) {
                    for (const k of Object.keys(t.variants)) s.add(k);
                }
                if (t.flavors && t.flavors[dimId]) {
                    for (const k of Object.keys(t.flavors[dimId])) s.add(k);
                }
                const meta = DIM_MAP[dimId];
                if (dimId === 'capability' && meta && isSingularityOutcome) {
                    meta.values.forEach(v => s.add(v.id));
                }
                validValues[dimId] = s;
            }

            const lockedValues = {};
            if (t.reachable) {
                for (const cond of t.reachable) {
                    for (const [dimId, vals] of Object.entries(cond)) {
                        if (adjustableIds.has(dimId)) continue;
                        if (!lockedValues[dimId]) lockedValues[dimId] = new Set();
                        for (const v of vals) lockedValues[dimId].add(v);
                    }
                }
            }
            const lockedDims = DIM_META.filter(d => lockedValues[d.id]);
            for (const dim of lockedDims) {
                const allowed = lockedValues[dim.id];
                if (allowed.size === 1 && !localDims[dim.id]) {
                    localDims[dim.id] = [...allowed][0];
                }
            }

            if (!localDims.capability && t.reachable) {
                for (const cond of t.reachable) {
                    if (cond.capability) { localDims.capability = cond.capability[0]; break; }
                }
            }

            function isPillDisabled(dim, valObj) {
                const valid = validValues[dim.id] || new Set();
                if (!valid.has(valObj.id)) return true;
                if (valObj.requires) {
                    for (const [k, allowed] of Object.entries(valObj.requires)) {
                        if (localDims[k] && !allowed.includes(localDims[k])) return true;
                    }
                }
                return false;
            }

            function updateContent() {
                const resolved = resolveTemplate(templateId, localDims);
                if (!resolved) return;

                const header = app.querySelector('.outcome-header');
                if (header) {
                    header.querySelector('h1').textContent = resolved.title;
                    const subtitleEl = header.querySelector('.outcome-subtitle');
                    if (subtitleEl) {
                        subtitleEl.textContent = resolved.subtitle || '';
                        subtitleEl.style.display = resolved.subtitle ? '' : 'none';
                    }
                    const badge = header.querySelector('.mood-badge');
                    badge.className = 'mood-badge mood-' + resolved.mood;
                    badge.textContent = resolved.mood;
                }
                const summaryEl = app.querySelector('.outcome-summary');
                if (summaryEl) summaryEl.textContent = resolved.summary;

                const flavorsEl = app.querySelector('.outcome-flavors');
                if (flavorsEl) {
                    if (resolved.flavors && resolved.flavors.length > 0) {
                        flavorsEl.innerHTML = resolved.flavors.map(f => `<p>${esc(f)}</p>`).join('');
                        flavorsEl.style.display = '';
                    } else {
                        flavorsEl.innerHTML = '';
                        flavorsEl.style.display = 'none';
                    }
                }

                const isStallCap = ['hours', 'days', 'weeks', 'months'].includes(localDims.capability);
                if (!isStallCap) {
                    delete localDims.stall_recovery;
                } else if (isSingularityOutcome) {
                    localDims.stall_recovery = 'mild';
                }

                const isShallowAuto = localDims.automation === 'shallow';
                const isDeepOutcome = t.reachable && t.reachable.some(c => c.automation && c.automation.includes('deep'));
                if (!isShallowAuto) {
                    delete localDims.automation_recovery;
                } else if (isDeepOutcome) {
                    localDims.automation_recovery = 'mild';
                }

                relevantDims.forEach(dim => {
                    const row = app.querySelector('[data-odim="' + dim.id + '"]');
                    if (!row) return;
                    if (dim.id === 'stall_recovery') {
                        row.classList.toggle('hidden', !isStallCap);
                        if (!isStallCap) return;
                    }
                    if (dim.id === 'automation_recovery') {
                        row.classList.toggle('hidden', !isShallowAuto);
                        if (!isShallowAuto) return;
                    }
                    const forceLockedRecovery = (dim.id === 'stall_recovery' && isSingularityOutcome) || (dim.id === 'automation_recovery' && isDeepOutcome);
                    row.querySelectorAll('.dim-pill').forEach(pill => {
                        const vid = pill.dataset.val;
                        const valObj = dim.values.find(v => v.id === vid);
                        const disabled = valObj ? isPillDisabled(dim, valObj) : false;
                        const isActive = localDims[dim.id] === vid;
                        pill.classList.toggle('active', isActive);
                        pill.classList.toggle('disabled', (disabled && !isActive) || (forceLockedRecovery && !isActive));
                        pill.classList.toggle('locked', forceLockedRecovery);
                    });
                });

                const newKey = outcomeKey(templateId, resolved.variantKey);
                markDiscovered(newKey);
                let hashStr = '/outcome/' + templateId + (resolved.variantKey ? '/' + resolved.variantKey : '');
                if (Object.keys(localDims).length > 0) {
                    hashStr += '?' + Object.entries(localDims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
                history.replaceState(
                    { screen: 'outcome', templateId, variantKey: resolved.variantKey, path: [...path], showPath, dims: { ...localDims } },
                    '', '#' + hashStr
                );
            }

            const initResolved = resolveTemplate(templateId, localDims);
            if (!initResolved) { renderIntro(); return; }

            const storyHtml = (Array.isArray(initResolved.story) ? initResolved.story : [initResolved.story])
                .map(p => `<p>${esc(p)}</p>`).join('');

            const timelineHtml = initResolved.timeline.map(e => `
                <div class="timeline-event">
                    <div class="timeline-year">${esc(e.year)}</div>
                    <div class="timeline-headline">${esc(e.headline)}</div>
                    <div class="timeline-desc">${esc(e.description)}</div>
                </div>`).join('');

            let initFlavorsHtml = '';
            if (initResolved.flavors && initResolved.flavors.length > 0) {
                initFlavorsHtml = initResolved.flavors.map(f => `<p>${esc(f)}</p>`).join('');
            }

            let pathHtml = '';
            if (showPath && path.length > 0) {
                const steps = path.map(p =>
                    `<div class="path-step">
                        <span class="step-q">${esc(p.questionText)}</span>
                        <span class="step-a">\u2192 ${esc(p.answerLabel)}</span>
                    </div>`).join('');
                pathHtml = `<div class="path-summary"><h3>Your choices</h3>${steps}</div>`;
            }

            const allOutcomeDims = [...lockedDims, ...relevantDims];
            let dimSelectorHtml = '';
            if (allOutcomeDims.length > 0) {
                const stageNames = { 1: 'Dynamics of Singularity', 2: 'Dynamics of Control', 3: 'Rate of Impact' };
                const byStage = {};
                allOutcomeDims.forEach(dim => {
                    if (!byStage[dim.stage]) byStage[dim.stage] = [];
                    byStage[dim.stage].push(dim);
                });
                const stagePanels = [1, 2, 3].filter(s => byStage[s]).map(s => {
                    const rows = byStage[s].map(dim => {
                        const isLocked = !!lockedValues[dim.id];
                        const allowed = lockedValues[dim.id];
                        const pills = dim.values.map(v => {
                            if (isLocked) {
                                const isAllowed = allowed.has(v.id);
                                return `<span class="dim-pill locked${isAllowed ? ' active' : ' disabled'}">${esc(v.label)}</span>`;
                            }
                            const disabled = isPillDisabled(dim, v);
                            const isActive = localDims[dim.id] === v.id;
                            return `<span class="dim-pill${isActive ? ' active' : ''}${disabled && !isActive ? ' disabled' : ''}" data-val="${esc(v.id)}">${esc(v.label)}</span>`;
                        }).join('');
                        return `<div class="dim-row${isLocked ? ' locked-row' : ''}" data-odim="${esc(dim.id)}">
                            <span class="dim-label">${esc(dim.label)}</span>
                            <div class="dim-pills">${pills}</div>
                        </div>`;
                    }).join('');
                    return `<div class="dim-stage-panel">
                        <div class="dim-stage-label">${esc(stageNames[s])}</div>
                        ${rows}
                    </div>`;
                }).join('');
                dimSelectorHtml = `
                    <div class="outcome-dims">
                        <div class="outcome-dims-label">Parameters</div>
                        <div class="dim-stages">${stagePanels}</div>
                    </div>`;
            }

            app.innerHTML = `
                <div class="outcome-screen">
                    <div class="outcome-header">
                        <h1>${esc(initResolved.title)}</h1>
                        ${initResolved.subtitle ? `<div class="outcome-subtitle">${esc(initResolved.subtitle)}</div>` : ''}
                        <span class="mood-badge mood-${initResolved.mood}">${esc(initResolved.mood)}</span>
                    </div>
                    <div class="outcome-summary">${esc(initResolved.summary)}</div>
                    <div class="outcome-flavors"${initFlavorsHtml ? '' : ' style="display:none"'}>${initFlavorsHtml}</div>
                    ${dimSelectorHtml}
                    <div class="outcome-story">${storyHtml}</div>
                    <div class="timeline-section">
                        <h2>Timeline</h2>
                        <div class="timeline">${timelineHtml}</div>
                    </div>
                    ${pathHtml}
                    <div class="outcome-actions">
                        ${showPath && path.length > 0
                            ? '<button class="btn btn-ghost btn-small" data-action="back-to-q">\u2190 Change last answer</button>'
                            : ''}
                        <button class="btn btn-secondary btn-small" data-action="restart">Start Over</button>
                        <button class="btn btn-secondary btn-small" data-action="gallery">Browse All Futures</button>
                        <button class="btn btn-secondary btn-small" data-action="share">Copy Link</button>
                    </div>
                </div>`;

            relevantDims.forEach(dim => {
                const row = app.querySelector('[data-odim="' + dim.id + '"]');
                if (!row) return;
                row.querySelectorAll('.dim-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        if (pill.classList.contains('disabled') || pill.classList.contains('locked')) return;
                        localDims[dim.id] = pill.dataset.val;
                        updateContent();
                    });
                });
            });

            listen('[data-action="back-to-q"]', 'click', () => {
                const prev = path.pop();
                if (prev) navigate({ screen: 'question', questionId: prev.questionId, path: [...path] });
            });
            listen('[data-action="restart"]', 'click', () => navigate({ screen: 'intro' }));
            listen('[data-action="gallery"]', 'click', () => navigate({ screen: 'gallery' }));
            listen('[data-action="share"]', 'click', () => {
                const currentKey = outcomeKey(templateId, localDims[t.primaryDimension] || variantKey);
                let url = location.origin + location.pathname + '#/outcome/' + currentKey;
                if (localDims && Object.keys(localDims).length > 0) {
                    url += '?' + Object.entries(localDims).map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
                } else {
                    showToast(url);
                }
            });

            updateContent();
        }

        // --- Render: Gallery ---
        function renderGallery() {
            const total = allVariants.length;
            const count = allVariants.filter(v => discovered.has(outcomeKey(v.templateId, v.variantKey))).length;

            const cards = allVariants.map(v => {
                const key = outcomeKey(v.templateId, v.variantKey);
                const isDiscovered = discovered.has(key);
                return `
                    <div class="gallery-card" data-tid="${esc(v.templateId)}" data-vk="${esc(v.variantKey || '')}">
                        <div class="card-top">
                            <span class="card-title">${esc(v.title)}${v.subtitle ? ` <span class="card-subtitle">— ${esc(v.subtitle)}</span>` : ''}</span>
                            <span class="mood-badge mood-${v.mood}" style="font-size:0.68rem;">${esc(v.mood)}</span>
                        </div>
                        <div class="card-summary">${esc(v.summary)}</div>
                        ${isDiscovered ? '<div class="discovered-tag">\u2713 Discovered</div>' : ''}
                    </div>`;
            }).join('');

            app.innerHTML = `
                <div class="gallery-screen">
                    <div class="gallery-header">
                        <h1>All Futures</h1>
                        <p class="gallery-counter">${count} of ${total} discovered through the questionnaire</p>
                    </div>
                    <div class="gallery-grid">${cards}</div>
                    <div>
                        <button class="btn btn-ghost" data-action="home">\u2190 Back to Start</button>
                    </div>
                </div>`;

            app.querySelectorAll('.gallery-card').forEach(card => {
                card.addEventListener('click', () => {
                    const tid = card.dataset.tid;
                    const vk = card.dataset.vk || null;
                    navigate({ screen: 'outcome', templateId: tid, variantKey: vk, path: [], showPath: false });
                });
            });

            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
        }

        // --- Render: Tree ---
        function renderTree() {
            function moodColor(mood) {
                const map = { utopian:'var(--mood-utopian)', dystopian:'var(--mood-dystopian)',
                    mixed:'var(--mood-mixed)', stagnant:'var(--mood-stagnant)', chaotic:'var(--mood-chaotic)' };
                return map[mood] || 'var(--text-dim)';
            }

            const treePaths = {};
            let tpId = 0;

            function checkCondSet(conds, dims) {
                const notes = [];
                for (const [dim, allowed] of Object.entries(conds)) {
                    if (dim in dims) {
                        if (!allowed.includes(dims[dim])) return { match: false, possible: false, notes: [] };
                    } else {
                        notes.push('if ' + dim.replace(/_/g, ' ') + ': ' + allowed.join(' / '));
                    }
                }
                return { match: notes.length === 0, possible: true, notes };
            }
            function overviewVisible(answer, dims) {
                if (!answer.requires) return { show: true, note: '' };
                const condSets = Array.isArray(answer.requires) ? answer.requires : [answer.requires];
                let allNotes = [];
                for (const conds of condSets) {
                    const r = checkCondSet(conds, dims);
                    if (r.match) return { show: true, note: '' };
                    if (r.possible) allNotes.push(r.notes.join('; '));
                }
                if (allNotes.length > 0) return { show: true, note: allNotes.join(' or ') };
                return { show: false, note: '' };
            }

            function buildStageTree(nodeId, stageNum, pathSoFar, dimsSoFar) {
                if (templatesMap[nodeId]) {
                    const resolved = resolveTemplate(nodeId, dimsSoFar);
                    if (!resolved) return `<span style="color:var(--mood-dystopian)">[error: ${esc(nodeId)}]</span>`;
                    return `<span class="tree-outcome" data-tid="${esc(nodeId)}" data-vk="${esc(resolved.variantKey || '')}">`
                        + `<span class="tree-dot" style="background:${moodColor(resolved.mood)}"></span>`
                        + `${esc(resolved.title)}${resolved.subtitle ? ` <span class="tree-subtitle">— ${esc(resolved.subtitle)}</span>` : ''}</span>`;
                }

                const q = questionsMap[nodeId];
                if (!q) return `<span style="color:var(--mood-dystopian)">[missing: ${esc(nodeId)}]</span>`;

                if (q.stage > stageNum) {
                    const info = stagesMap[q.stage];
                    return `<span class="tree-stage-link" data-stage="${q.stage}">\u2192 Round ${q.stage}${info ? ': ' + esc(info.label) : ''}</span>`;
                }

                const pid = tpId++;
                treePaths[pid] = pathSoFar;

                const answersHtml = q.answers
                    .map((a, i) => {
                        const { show, note } = overviewVisible(a, dimsSoFar);
                        if (!show) return '';

                        const stepDims = {};
                        if (a.sets) Object.assign(stepDims, a.sets);
                        else if (a.value !== undefined && q.dimension) stepDims[q.dimension] = a.value;

                        const childPath = [...pathSoFar, {
                            questionId: q.id, answerIndex: i,
                            answerLabel: a.label, questionText: q.text,
                            dims: stepDims
                        }];
                        const childDims = { ...dimsSoFar, ...stepDims };

                        const noteHtml = note ? ` <span class="tree-condition">(${esc(note)})</span>` : '';

                        return `<li><span class="tree-answer">${esc(a.label)}</span>${noteHtml}<ul><li>${buildStageTree(a.next, stageNum, childPath, childDims)}</li></ul></li>`;
                    })
                    .filter(Boolean)
                    .join('');

                return `<span class="tree-question" data-qid="${esc(q.id)}" data-pid="${pid}">${esc(q.text)}</span><ul>${answersHtml}</ul>`;
            }

            const stage1Html = buildStageTree(rootId, 1, [], {});
            const stage2Html = buildStageTree('open-source-parity', 2, [], {});
            const stage3Html = buildStageTree('economic-speed', 3, [], {});

            function stagePanel(id, body) {
                const info = stagesMap[id];
                if (!info) return '';
                return `<div class="tree-stage" data-stage="${id}">
                    <div class="tree-stage-header">
                        <span class="stage-toggle">\u25BC</span>
                        <span class="stage-num">Round ${id}</span>
                        <span class="stage-label">${esc(info.label)}</span>
                        <span class="stage-desc">${esc(info.description)}</span>
                    </div>
                    <div class="tree-stage-body">
                        <div class="tree"><ul><li>${body}</li></ul></div>
                    </div>
                </div>`;
            }

            const variantCount = allVariants.length;

            app.innerHTML = `
                <div class="tree-screen">
                    <h1>Question Tree</h1>
                    <p class="tree-subtitle">${Object.keys(questionsMap).length} questions \u2022 ${variantCount} outcomes (${templatesList.length} templates)</p>
                    ${stagePanel(1, stage1Html)}
                    ${stagePanel(2, stage2Html)}
                    ${stagePanel(3, stage3Html)}
                    <div class="tree-nav">
                        <button class="btn btn-ghost" data-action="home">\u2190 Back to Start</button>
                    </div>
                </div>`;

            app.querySelectorAll('.tree-outcome').forEach(el => {
                el.addEventListener('click', () => {
                    navigate({ screen: 'outcome', templateId: el.dataset.tid, variantKey: el.dataset.vk || null, path: [], showPath: false });
                });
            });

            app.querySelectorAll('.tree-question').forEach(el => {
                el.addEventListener('click', () => {
                    const p = treePaths[parseInt(el.dataset.pid)] || [];
                    navigate({ screen: 'question', questionId: el.dataset.qid, path: p });
                });
            });

            app.querySelectorAll('.tree-stage-header').forEach(el => {
                el.addEventListener('click', () => {
                    el.parentElement.classList.toggle('collapsed');
                });
            });

            app.querySelectorAll('.tree-stage-link').forEach(el => {
                el.addEventListener('click', () => {
                    const stageId = el.dataset.stage;
                    const target = app.querySelector('.tree-stage[data-stage="' + stageId + '"]');
                    if (target) {
                        target.classList.remove('collapsed');
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });

            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
        }

        // --- Render: Explorer ---
        function renderExplorer(initialDims) {
            let sel = initialDims ? { ...initialDims } : {};

            function decelOutcome() {
                if (sel.gov_action !== 'decelerate') return null;
                for (const cp of ['decel_2mo', 'decel_4mo', 'decel_6mo', 'decel_9mo', 'decel_12mo', 'decel_18mo', 'decel_24mo']) {
                    const v = sel[cp];
                    if (v && v !== 'continue') return v;
                }
                return null;
            }
            function effectiveVal(k) {
                if (k === 'capability' && sel.stall_recovery === 'mild') return 'singularity';
                if (k === 'automation' && sel.automation_recovery === 'mild') return 'deep';
                const out = decelOutcome();
                if (k === 'governance') {
                    if (sel.gov_action === 'accelerate') return 'race';
                    if (out === 'abandon') return 'race';
                    if (sel.gov_action === 'decelerate') return 'slowdown';
                }
                if (k === 'alignment') {
                    if (['solved', 'parity_solved'].includes(out)) return 'solved';
                    if (['escapes', 'abandon', 'rival', 'parity_failed'].includes(out)) return 'failed';
                    if (sel.enabled_aims === 'arbitrary') return 'failed';
                }
                if (k === 'containment' && ['escapes', 'parity_failed'].includes(out)) return 'escaped';
                if (k === 'containment' && sel.proliferation_control === 'none' && effectiveVal('alignment') === 'failed') return 'escaped';
                if (k === 'containment' && sel.enabled_aims === 'arbitrary') return 'escaped';
                if (k === 'failure_mode' && sel.enabled_aims === 'proxy') return 'whimper';
                if (k === 'geo_spread') {
                    if (['parity_solved', 'parity_failed', 'rival'].includes(out)) return 'two';
                }
                return sel[k];
            }
            function isDimVisible(dim) {
                if (!dim.visibleWhen) return true;
                const out = decelOutcome();
                if (dim.id === 'alignment' && ['solved', 'parity_solved', 'escapes', 'abandon', 'rival', 'parity_failed'].includes(out)) return false;
                if (dim.id === 'proliferation_control') {
                    if (['escapes', 'parity_failed'].includes(out)) return false;
                }
                if (dim.id === 'containment' && ['solved', 'parity_solved'].includes(out)) return false;
                if (dim.id === 'containment' && effectiveVal('alignment') !== 'failed') return false;
                if (dim.id === 'containment' && !['escapes', 'parity_failed'].includes(out) && !sel.proliferation_control) return false;
                if (dim.id === 'failure_mode' && sel.enabled_aims !== 'proxy' && sel.intent !== 'international') return false;
                const failedContained = effectiveVal('alignment') === 'failed' && sel.containment === 'contained';
                if (dim.id === 'intent' && failedContained) return true;
                if (dim.id === 'failure_mode' && failedContained && sel.intent === 'international') return true;
                for (const [k, allowed] of Object.entries(dim.visibleWhen)) {
                    const useRaw = (dim.id === 'stall_recovery' && k === 'capability')
                        || (dim.id === 'automation_recovery' && k === 'automation')
                        || (dim.id === 'sovereignty' && k === 'geo_spread')
                        || (dim.id === 'gov_action' && k === 'geo_spread')
                        || (dim.id === 'enabled_aims' && k === 'alignment');
                    const v = useRaw ? sel[k] : effectiveVal(k);
                    if (!v || !allowed.includes(v)) return false;
                }
                return true;
            }
            function isDimLocked(dim) {
                if (dim.id === 'containment') {
                    const out = decelOutcome();
                    if (['escapes', 'parity_failed'].includes(out)) return 'escaped';
                    if (sel.proliferation_control === 'none' && effectiveVal('alignment') === 'failed') return 'escaped';
                    if (sel.enabled_aims === 'arbitrary') return 'escaped';
                }
                if (dim.id === 'failure_mode' && sel.enabled_aims === 'proxy') return 'whimper';
                if (!dim.lockedWhen) return null;
                for (const [triggerDim, rule] of Object.entries(dim.lockedWhen)) {
                    if (effectiveVal(triggerDim) === rule.equals) return rule.value;
                }
                return null;
            }
            function isValueDisabled(dim, val) {
                if (!val.requires) return false;
                const condSets = Array.isArray(val.requires) ? val.requires : [val.requires];
                return condSets.every(conds => {
                    for (const [k, allowed] of Object.entries(conds)) {
                        const v = effectiveVal(k);
                        if (v && !allowed.includes(v)) return true;
                    }
                    return false;
                });
            }
            function cleanSelection() {
                for (const dim of DIM_META) {
                    if (!isDimVisible(dim)) { delete sel[dim.id]; continue; }
                    const locked = isDimLocked(dim);
                    if (locked !== null) { sel[dim.id] = locked; continue; }
                    if (sel[dim.id]) {
                        const val = dim.values.find(v => v.id === sel[dim.id]);
                        if (val && isValueDisabled(dim, val)) delete sel[dim.id];
                    }
                }
            }
            function effectiveDims() {
                const d = {};
                for (const dim of DIM_META) {
                    if (!isDimVisible(dim)) continue;
                    const locked = isDimLocked(dim);
                    if (locked !== null) { d[dim.id] = locked; continue; }
                    const v = effectiveVal(dim.id);
                    if (v) d[dim.id] = v;
                }
                const out = decelOutcome();
                if (sel.gov_action === 'accelerate') d.governance = 'race';
                else if (out === 'abandon') d.governance = 'race';
                else if (sel.gov_action === 'decelerate') d.governance = 'slowdown';
                if (['solved', 'parity_solved'].includes(out)) d.alignment = 'solved';
                if (['escapes', 'abandon', 'rival', 'parity_failed'].includes(out)) d.alignment = 'failed';
                if (d.enabled_aims === 'arbitrary') d.alignment = 'failed';
                if (['escapes', 'parity_failed'].includes(out)) d.containment = 'escaped';
                if (d.proliferation_control === 'none' && d.alignment === 'failed') d.containment = 'escaped';
                if (d.enabled_aims === 'arbitrary') d.containment = 'escaped';
                if (d.enabled_aims === 'proxy') d.failure_mode = 'whimper';
                if (['parity_solved', 'parity_failed', 'rival'].includes(out)) {
                    d.geo_spread = 'two';
                    d.rival_emerges = 'yes';
                }
                return d;
            }
            function templateMatches(t, dims) {
                if (!t.reachable) return true;
                return t.reachable.some(cond => {
                    for (const [k, allowed] of Object.entries(cond)) {
                        if (!dims[k] || !allowed.includes(dims[k])) return false;
                    }
                    return true;
                });
            }
            function templatePartialMatch(t, dims) {
                if (!t.reachable) return true;
                return t.reachable.some(cond => {
                    for (const [k, allowed] of Object.entries(cond)) {
                        if (dims[k] && !allowed.includes(dims[k])) return false;
                    }
                    return true;
                });
            }
            function moodColor(mood) {
                const map = { utopian:'var(--mood-utopian)', dystopian:'var(--mood-dystopian)',
                    mixed:'var(--mood-mixed)', stagnant:'var(--mood-stagnant)', chaotic:'var(--mood-chaotic)' };
                return map[mood] || 'var(--text-dim)';
            }

            function syncHash() {
                let hash = '/explore';
                const entries = Object.entries(sel).filter(([, v]) => v != null);
                if (entries.length > 0) {
                    hash += '?' + entries.map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
                history.replaceState({ screen: 'explore', dims: { ...sel } }, '', '#' + hash);
            }

            function update() {
                cleanSelection();
                syncHash();
                const dims = effectiveDims();
                DIM_META.forEach(dim => {
                    const row = app.querySelector('[data-dim-row="' + dim.id + '"]');
                    if (!row) return;
                    const visible = isDimVisible(dim);
                    row.classList.toggle('hidden', !visible);
                    if (!visible) return;
                    const locked = isDimLocked(dim);
                    row.querySelectorAll('.dim-pill').forEach(pill => {
                        const vid = pill.dataset.val;
                        const val = dim.values.find(v => v.id === vid);
                        const disabled = val && isValueDisabled(dim, val);
                        const isLocked = locked !== null;
                        const isActive = isLocked ? vid === locked : sel[dim.id] === vid;
                        pill.classList.toggle('active', isActive);
                        pill.classList.toggle('locked', isLocked);
                        pill.classList.toggle('disabled', disabled && !isActive);
                    });
                });

                const matched = [], partial = [], dimmed = [];
                for (const t of templatesList) {
                    if (templateMatches(t, dims)) matched.push(t);
                    else if (templatePartialMatch(t, dims)) partial.push(t);
                    else dimmed.push(t);
                }

                const matchDiv = app.querySelector('.explorer-match-zone');
                if (matched.length === 1) {
                    const t = matched[0];
                    const resolved = resolveTemplate(t.id, dims);
                    matchDiv.innerHTML = `
                        <div class="explorer-match">
                            <div class="explorer-match-label">Your future</div>
                            <div class="explorer-match-title">
                                <span class="ec-dot" style="background:${moodColor(resolved.mood)}"></span>
                                ${esc(resolved.title)}${resolved.subtitle ? ` <span class="explorer-match-subtitle">— ${esc(resolved.subtitle)}</span>` : ''}
                                <span class="mood-badge mood-${resolved.mood}" style="font-size:0.68rem;">${esc(resolved.mood)}</span>
                            </div>
                            <div class="explorer-match-summary">${esc(resolved.summary)}</div>
                            <div class="explorer-match-action">
                                <button class="btn btn-small btn-primary" data-action="view-match"
                                    data-tid="${esc(t.id)}" data-vk="${esc(resolved.variantKey || '')}">View Full Story</button>
                            </div>
                        </div>`;
                    matchDiv.querySelector('[data-action="view-match"]').addEventListener('click', (e) => {
                        const tid = e.currentTarget.dataset.tid;
                        const vk = e.currentTarget.dataset.vk || null;
                        const key = outcomeKey(tid, vk);
                        markDiscovered(key);
                        navigate({ screen: 'outcome', templateId: tid, variantKey: vk, path: [], showPath: false, dims: effectiveDims() });
                    });
                } else if (matched.length > 1) {
                    matchDiv.innerHTML = `<div class="explorer-no-match">${matched.length} outcomes match. Keep choosing to narrow it down.</div>`;
                } else {
                    const setCount = Object.keys(dims).length;
                    matchDiv.innerHTML = setCount > 0 ? '<div class="explorer-no-match">No single outcome matches yet. Keep choosing.</div>' : '';
                }

                const grid = app.querySelector('.explorer-grid');
                grid.querySelectorAll('.explorer-card').forEach(card => {
                    const tid = card.dataset.tid;
                    const t = templatesMap[tid];
                    const isMatch = matched.includes(t);
                    const isPartial = partial.includes(t);
                    card.classList.toggle('matched', isMatch);
                    card.classList.toggle('dimmed', !isMatch && !isPartial);
                    const resolved = resolveTemplate(tid, dims);
                    if (resolved) {
                        card.querySelector('.ec-title').innerHTML =
                            `<span class="ec-dot" style="background:${moodColor(resolved.mood)}"></span>${esc(resolved.title)}${resolved.subtitle ? ` <span class="ec-subtitle">— ${esc(resolved.subtitle)}</span>` : ''}`;
                        card.querySelector('.ec-summary').textContent = resolved.summary;
                    }
                });
            }

            cleanSelection();
            const stageGroups = { 1: [], 2: [], 3: [] };
            DIM_META.forEach(d => { if (!stageGroups[d.stage]) stageGroups[d.stage] = []; stageGroups[d.stage].push(d); });
            const stageNames = { 1: 'Dynamics of Singularity', 2: 'Dynamics of Control', 3: 'Rate of Impact' };

            let dimsHtml = '';
            for (const [stageId, dims] of Object.entries(stageGroups)) {
                if (dims.length === 0) continue;
                const rows = dims.map(dim => {
                    const visible = isDimVisible(dim);
                    const locked = isDimLocked(dim);
                    const pills = dim.values.map(v => {
                        const disabled = isValueDisabled(dim, v);
                        const isLocked = locked !== null;
                        const isActive = isLocked ? v.id === locked : sel[dim.id] === v.id;
                        return `<span class="dim-pill${isActive?' active':''}${isLocked?' locked':''}${disabled&&!isActive?' disabled':''}" data-val="${esc(v.id)}">${esc(v.label)}</span>`;
                    }).join('');
                    return `<div class="dim-row${visible?'':' hidden'}" data-dim-row="${esc(dim.id)}">
                        <span class="dim-label">${esc(dim.label)}</span><div class="dim-pills">${pills}</div></div>`;
                }).join('');
                dimsHtml += `<div class="dim-stage-panel"><div class="dim-stage-label">Round ${stageId}: ${esc(stageNames[stageId]||'')}</div>${rows}</div>`;
            }

            const cards = templatesList.map(t => {
                const resolved = resolveTemplate(t.id, effectiveDims());
                const title = resolved ? resolved.title : t.title || t.id;
                const subtitle = resolved ? resolved.subtitle : null;
                const mood = resolved ? resolved.mood : t.mood || 'mixed';
                const summary = resolved ? resolved.summary : t.summary || '';
                return `<div class="explorer-card" data-tid="${esc(t.id)}">
                    <div class="ec-title"><span class="ec-dot" style="background:${moodColor(mood)}"></span>${esc(title)}${subtitle ? ` <span class="ec-subtitle">— ${esc(subtitle)}</span>` : ''}</div>
                    <div class="ec-summary">${esc(summary)}</div></div>`;
            }).join('');

            app.innerHTML = `
                <div class="explorer-screen">
                    <h1>Explore AI Futures</h1>
                    <p class="explorer-subtitle">Set your beliefs about each dimension. The matching outcome updates as you choose.</p>
                    <div class="dim-stages">${dimsHtml}</div>
                    <div class="explorer-match-zone"></div>
                    <hr class="explorer-divider">
                    <div class="explorer-grid-label">All Outcomes</div>
                    <div class="explorer-grid">${cards}</div>
                    <div style="margin-top:2rem;">
                        <button class="btn btn-ghost" data-action="home">\u2190 Back to Start</button>
                        <button class="btn btn-ghost" data-action="reset-dims">Reset</button>
                    </div>
                </div>`;

            DIM_META.forEach(dim => {
                const row = app.querySelector('[data-dim-row="' + dim.id + '"]');
                if (!row) return;
                row.querySelectorAll('.dim-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        if (pill.classList.contains('locked') || pill.classList.contains('disabled')) return;
                        const vid = pill.dataset.val;
                        sel[dim.id] = sel[dim.id] === vid ? undefined : vid;
                        if (!sel[dim.id]) delete sel[dim.id];
                        update();
                    });
                });
            });

            app.querySelectorAll('.explorer-card').forEach(card => {
                card.addEventListener('click', () => {
                    const tid = card.dataset.tid;
                    const dims = effectiveDims();
                    const resolved = resolveTemplate(tid, dims);
                    const vk = resolved ? resolved.variantKey : null;
                    navigate({ screen: 'outcome', templateId: tid, variantKey: vk, path: [], showPath: false, dims: dims });
                });
            });

            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
            listen('[data-action="reset-dims"]', 'click', () => { sel = {}; update(); });
            update();
        }

        // --- Render: Error ---
        function renderError(err) {
            app.innerHTML = `
                <div class="error-screen">
                    <h2>Failed to Load</h2>
                    <p>Singularity Map needs to be served over HTTP to load its data files. If you opened this file directly, try running a local server:</p>
                    <code>python3 -m http.server 8000</code>
                    <p style="margin-top:1rem;font-size:0.85rem;">Then visit <strong>http://localhost:8000</strong></p>
                </div>`;
            console.error(err);
        }

        // --- Helpers ---
        function listen(selector, event, fn) {
            const el = app.querySelector(selector);
            if (el) el.addEventListener(event, fn);
        }

    })();
    </script>
</body>
</html>
