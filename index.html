        // --- Render: Tree (DIMENSIONS-based) ---
        function renderTree() {
            function moodColor(mood) {
                const map = { utopian:'var(--mood-utopian)', dystopian:'var(--mood-dystopian)',
                    mixed:'var(--mood-mixed)', stagnant:'var(--mood-stagnant)', chaotic:'var(--mood-chaotic)' };
                return map[mood] || 'var(--text-dim)';
            }

            const treeSels = {};
            let tsId = 0;

            function valueVisible(dim, val, dimsSoFar) {
                if (Engine.isValueDisabled(dimsSoFar, dim, val)) return { show: false, note: '' };
                if (!val.requires) return { show: true, note: '' };
                const condSets = Array.isArray(val.requires) ? val.requires : [val.requires];
                let allNotes = [];
                for (const conds of condSets) {
                const notes = [];
                    let possible = true;
                    for (const [dk, allowed] of Object.entries(conds)) {
                        const arr = Array.isArray(allowed) ? allowed : [allowed];
                        if (dk in dimsSoFar) {
                            if (!arr.includes(dimsSoFar[dk])) { possible = false; break; }
                    } else {
                            notes.push('if ' + dk.replace(/_/g, ' ') + ': ' + arr.join(' / '));
                        }
                    }
                    if (!possible) continue;
                    if (notes.length === 0) return { show: true, note: '' };
                    allNotes.push(notes.join('; '));
                }
                if (allNotes.length > 0) return { show: true, note: allNotes.join(' or ') };
                return { show: false, note: '' };
            }

            function buildDimTree(dimsSoFar, stageNum, depth) {
                if (depth > 60) return '<span class="tree-condition">[depth limit]</span>';

                let nextDim = null;
                for (const d of DIMENSIONS) {
                    if (d.virtual || d.terminal) continue;
                    if (dimsSoFar[d.id]) continue;
                    if (!Engine.isDimVisible(dimsSoFar, d)) continue;
                    if (Engine.isDimLocked(dimsSoFar, d)) continue;
                    nextDim = d;
                    break;
                }

                if (!nextDim) {
                    const eff = Engine.effectiveDims(dimsSoFar);
                    const matched = templatesList.filter(t => Engine.templateMatches(t, eff));
                    if (matched.length >= 1) {
                        const tid = matched[0].id;
                        const resolved = resolveTemplate(tid, eff);
                        if (!resolved) return '';
                        return `<span class="tree-outcome" data-tid="${esc(tid)}" data-vk="${esc(resolved.variantKey || '')}">`
                        + `<span class="tree-dot" style="background:${moodColor(resolved.mood)}"></span>`
                        + `${esc(resolved.title)}${resolved.subtitle ? ` <span class="tree-subtitle">— ${esc(resolved.subtitle)}</span>` : ''}</span>`;
                    }
                    return '<span class="tree-condition">[no matching outcome]</span>';
                }

                if (nextDim.stage > stageNum) {
                    const info = SCENARIO.stages[nextDim.stage];
                    return `<span class="tree-stage-link" data-stage="${nextDim.stage}">\u2192 Round ${nextDim.stage}${info ? ': ' + esc(info.label) : ''}</span>`;
                }

                const sid = tsId++;
                treeSels[sid] = { ...dimsSoFar };

                const step0 = nextDim.narrativeSteps && nextDim.narrativeSteps[0];
                const hasGroups = step0 && step0.groups;
                const questionText = (hasGroups ? step0.text : nextDim.questionText) || nextDim.label;

                let answersHtml;
                if (hasGroups) {
                    const laterStep = nextDim.narrativeSteps.find(s => !s.groups);
                    answersHtml = step0.groups.map(g => {
                        const enabledVals = g.values.filter(vid => {
                            const dv = nextDim.values.find(v => v.id === vid);
                            return dv && !Engine.isValueDisabled(dimsSoFar, nextDim, dv);
                        });
                        if (enabledVals.length === 0) return '';
                        if (enabledVals.length === 1) {
                            const vid = enabledVals[0];
                            const dv = nextDim.values.find(v => v.id === vid);
                            const childDims = { ...dimsSoFar, [nextDim.id]: vid };
                            Engine.cleanSelection(childDims);
                            const label = g.label || (dv && dv.answerLabel) || (dv && dv.label) || vid;
                            return `<li><span class="tree-answer">${esc(label)}</span><ul><li>${buildDimTree(childDims, stageNum, depth + 1)}</li></ul></li>`;
                        }
                        const subText = (laterStep && laterStep.text) || nextDim.questionText || nextDim.label;
                        const subAnswers = enabledVals.map(vid => {
                            const dv = nextDim.values.find(v => v.id === vid);
                            if (!dv) return '';
                            const { show, note } = valueVisible(nextDim, dv, dimsSoFar);
                            if (!show) return '';
                            const childDims = { ...dimsSoFar, [nextDim.id]: vid };
                            Engine.cleanSelection(childDims);
                        const noteHtml = note ? ` <span class="tree-condition">(${esc(note)})</span>` : '';
                            const label = dv.answerLabel || dv.label;
                            return `<li><span class="tree-answer">${esc(label)}</span>${noteHtml}<ul><li>${buildDimTree(childDims, stageNum, depth + 1)}</li></ul></li>`;
                        }).filter(Boolean).join('');
                        return `<li><span class="tree-answer">${esc(g.label)}</span>`
                            + `<ul><li><span class="tree-question" data-sid="${sid}">${esc(subText)}</span>`
                            + `<ul>${subAnswers}</ul></li></ul></li>`;
                    }).filter(Boolean).join('');
                } else {
                    answersHtml = nextDim.values
                        .map(v => {
                            const { show, note } = valueVisible(nextDim, v, dimsSoFar);
                            if (!show) return '';
                            const childDims = { ...dimsSoFar, [nextDim.id]: v.id };
                            Engine.cleanSelection(childDims);
                            const noteHtml = note ? ` <span class="tree-condition">(${esc(note)})</span>` : '';
                            const label = v.answerLabel || v.label;
                            return `<li><span class="tree-answer">${esc(label)}</span>${noteHtml}<ul><li>${buildDimTree(childDims, stageNum, depth + 1)}</li></ul></li>`;
                    })
                    .filter(Boolean)
                    .join('');
                }

                return `<span class="tree-question" data-did="${esc(nextDim.id)}" data-sid="${sid}">${esc(questionText)}</span><ul>${answersHtml}</ul>`;
            }

            const stage1Html = buildDimTree({}, 1, 0);
            const stage2Html = buildDimTree({}, 2, 0);
            const stage3Html = buildDimTree({}, 3, 0);

            function stagePanel(id, body) {
                const info = SCENARIO.stages[id];
                if (!info) return '';
                return `<div class="tree-stage" data-stage="${id}">
                    <div class="tree-stage-header">
                        <span class="stage-toggle">\u25BC</span>
                        <span class="stage-num">Round ${id}</span>
                        <span class="stage-label">${esc(info.label)}</span>
                        <span class="stage-desc">${esc(info.description)}</span>
                    </div>
                    <div class="tree-stage-body">
                        <div class="tree"><ul><li>${body}</li></ul></div>
                    </div>
                </div>`;
            }

            const dimCount = DIMENSIONS.filter(d => !d.virtual && !d.terminal).length;
            const variantCount = allVariants.length;

            app.innerHTML = `
                <div class="tree-screen">
                    <h1>Dimension Tree</h1>
                    <p class="tree-subtitle">${dimCount} dimensions \u2022 ${variantCount} outcomes (${templatesList.length} templates)</p>
                    ${stagePanel(1, stage1Html)}
                    ${stagePanel(2, stage2Html)}
                    ${stagePanel(3, stage3Html)}
                    <div class="tree-nav">
                        <button class="btn btn-ghost" data-action="home">\u2190 Back to Start</button>
                    </div>
                </div>`;

            app.querySelectorAll('.tree-outcome').forEach(el => {
                el.addEventListener('click', () => {
                    navigate({ screen: 'outcome', templateId: el.dataset.tid, variantKey: el.dataset.vk || null, showPath: false });
                });
            });

            app.querySelectorAll('.tree-question').forEach(el => {
                el.addEventListener('click', () => {
                    const s = treeSels[parseInt(el.dataset.sid)] || {};
                    navigate({ screen: 'question', dims: s });
                });
            });

            app.querySelectorAll('.tree-stage-header').forEach(el => {
                el.addEventListener('click', () => {
                    el.parentElement.classList.toggle('collapsed');
                });
            });

            app.querySelectorAll('.tree-stage-link').forEach(el => {
                el.addEventListener('click', () => {
                    const stageId = el.dataset.stage;
                    const target = app.querySelector('.tree-stage[data-stage="' + stageId + '"]');
                    if (target) {
                        target.classList.remove('collapsed');
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });

            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
        }

        // --- Render: Explorer ---
        function renderExplorer(initialDims) {
            let sel = initialDims ? { ...initialDims } : {};

            const {
                effectiveVal: _effectiveVal, isDimVisible: _isDimVisible, isDimLocked: _isDimLocked,
                isValueDisabled: _isValueDisabled, cleanSelection: _cleanSelection,
                applySelection: _applySelection, effectiveDims: _effectiveDims,
                templateMatches, templatePartialMatch, getRenderAfter: _getRenderAfter } = window.Engine;
            function effectiveVal(k) { return _effectiveVal(sel, k); }
            function isDimVisible(dim) { return _isDimVisible(sel, dim); }
            function isDimLocked(dim) { return _isDimLocked(sel, dim); }
            function isValueDisabled(dim, val) { return _isValueDisabled(sel, dim, val); }
            function cleanSelection() { _cleanSelection(sel); }
            function getRenderAfter(dim) { return _getRenderAfter(sel, dim); }
            function effectiveDims() { return _effectiveDims(sel); }
            function moodColor(mood) {
                const map = { utopian:'var(--mood-utopian)', dystopian:'var(--mood-dystopian)',
                    mixed:'var(--mood-mixed)', stagnant:'var(--mood-stagnant)', chaotic:'var(--mood-chaotic)' };
                return map[mood] || 'var(--text-dim)';
            }

            function syncHash() {
                let hash = '/explore';
                const entries = Object.entries(sel).filter(([k, v]) => v != null && !k.startsWith('_'));
                if (entries.length > 0) {
                    hash += '?' + entries.map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
                }
                history.replaceState({ screen: 'explore', dims: { ...sel } }, '', '#' + hash);
            }

            function update() {
                cleanSelection();
                syncHash();
                const dims = effectiveDims();
                let shownNextQuestion = false;
                DIMENSIONS.forEach(dim => {
                    const row = app.querySelector('[data-dim-row="' + dim.id + '"]');
                    if (!row) return;
                    const visible = isDimVisible(dim);
                    const locked = isDimLocked(dim);
                    const answered = !!sel[dim.id];
                    const userAnswered = answered && locked === null;
                    const isLocked = locked !== null;
                    const isNextQuestion = visible && !isLocked && !answered;
                    const shouldHide = !visible || (shownNextQuestion && !userAnswered && !isLocked);
                    row.classList.toggle('hidden', shouldHide);
                    if (shouldHide) {
                        const subRow = app.querySelector('[data-dim-sub="' + dim.id + '"]');
                        if (subRow) subRow.classList.add('hidden');
                        return;
                    }
                    if (isNextQuestion) shownNextQuestion = true;

                    if (steppedDims.has(dim.id)) {
                        const step0 = dim.narrativeSteps[0];
                        const subRow = app.querySelector('[data-dim-sub="' + dim.id + '"]');
                        let multiGroupActive = false;
                        row.querySelectorAll('.dim-pill[data-group-vals]').forEach(pill => {
                            const gVals = pill.dataset.groupVals.split(',');
                            const isActive = gVals.includes(sel[dim.id]);
                            const isExpanded = gVals.length > 1 && sel._expandedGroup === dim.id;
                            pill.classList.toggle('active', isActive || isExpanded);
                            if ((isActive && gVals.length > 1) || isExpanded) multiGroupActive = true;
                        });
                        if (subRow) {
                            subRow.classList.toggle('hidden', !multiGroupActive);
                            subRow.querySelectorAll('.dim-pill[data-val]').forEach(pill => {
                                const vid = pill.dataset.val;
                                const val = dim.values.find(v => v.id === vid);
                                const disabled = val && isValueDisabled(dim, val);
                                pill.classList.toggle('active', sel[dim.id] === vid);
                                pill.classList.toggle('disabled', disabled && sel[dim.id] !== vid);
                            });
                        }
                    } else {
                    row.querySelectorAll('.dim-pill').forEach(pill => {
                        const vid = pill.dataset.val;
                        const val = dim.values.find(v => v.id === vid);
                        const disabled = val && isValueDisabled(dim, val);
                        const isLocked = locked !== null;
                        const isActive = isLocked ? vid === locked : sel[dim.id] === vid;
                        pill.classList.toggle('active', isActive);
                        pill.classList.toggle('locked', isLocked);
                        pill.classList.toggle('disabled', disabled && !isActive);
                    });
                    }
                });

                for (const dim of DIMENSIONS) {
                    const afterId = getRenderAfter(dim);
                    if (!afterId) continue;
                    const row = app.querySelector(`[data-dim-row="${dim.id}"]`);
                    const anchorRow = app.querySelector(`[data-dim-row="${afterId}"]`);
                    if (row && anchorRow && !row.classList.contains('hidden')) {
                        anchorRow.parentNode.insertBefore(row, anchorRow.nextSibling);
                    }
                }

                const matched = [], partial = [], dimmed = [];
                for (const t of templatesList) {
                    if (templateMatches(t, dims)) matched.push(t);
                    else if (templatePartialMatch(t, dims)) partial.push(t);
                    else dimmed.push(t);
                }

                const hasUnsetVisibleDims = DIMENSIONS.some(dim => {
                    if (dim.terminal || dim.virtual) return false;
                    if (!isDimVisible(dim)) return false;
                    if (isDimLocked(dim) !== null) return false;
                    return !dims[dim.id];
                });

                const matchDiv = app.querySelector('.explorer-match-zone');
                if (matched.length === 1 && !hasUnsetVisibleDims) {
                    const t = matched[0];
                    const resolved = resolveTemplate(t.id, dims);
                    matchDiv.innerHTML = `
                        <div class="explorer-match">
                            <div class="explorer-match-label">Your future</div>
                            <div class="explorer-match-title">
                                <span class="ec-dot" style="background:${moodColor(resolved.mood)}"></span>
                                ${esc(resolved.title)}${resolved.subtitle ? ` <span class="explorer-match-subtitle">— ${esc(resolved.subtitle)}</span>` : ''}
                                <span class="mood-badge mood-${resolved.mood}" style="font-size:0.68rem;">${esc(resolved.mood)}</span>
                            </div>
                            <div class="explorer-match-summary">${esc(resolved.summary)}</div>
                            <div class="explorer-match-action">
                                <button class="btn btn-small btn-primary" data-action="view-match"
                                    data-tid="${esc(t.id)}" data-vk="${esc(resolved.variantKey || '')}">View Full Story</button>
                            </div>
                        </div>`;
                    matchDiv.querySelector('[data-action="view-match"]').addEventListener('click', (e) => {
                        const tid = e.currentTarget.dataset.tid;
                        const vk = e.currentTarget.dataset.vk || null;
                        const key = outcomeKey(tid, vk);
                        markDiscovered(key);
                        navigate({ screen: 'outcome', templateId: tid, variantKey: vk, showPath: false, dims: { ...sel } });
                    });
                } else if (matched.length === 1 && hasUnsetVisibleDims) {
                    matchDiv.innerHTML = `<div class="explorer-no-match">1 outcome matches so far. Keep choosing to lock it in.</div>`;
                } else if (matched.length > 1 && hasUnsetVisibleDims) {
                    matchDiv.innerHTML = `<div class="explorer-no-match">${matched.length} outcomes match so far. Keep choosing to narrow it down.</div>`;
                } else if (matched.length > 1) {
                    matchDiv.innerHTML = `<div class="explorer-no-match">${matched.length} outcomes match. Keep choosing to narrow it down.</div>`;
                } else {
                    const setCount = Object.keys(dims).length;
                    matchDiv.innerHTML = setCount > 0 ? '<div class="explorer-no-match">No single outcome matches yet. Keep choosing.</div>' : '';
                }

                const grid = app.querySelector('.explorer-grid');
                grid.querySelectorAll('.explorer-card').forEach(card => {
                    const tid = card.dataset.tid;
                    const t = templatesMap[tid];
                    const isMatch = matched.includes(t);
                    const isPartial = partial.includes(t);
                    card.classList.toggle('matched', isMatch && matched.length === 1 && !hasUnsetVisibleDims);
                    card.classList.toggle('dimmed', !isMatch && !isPartial);
                    const resolved = resolveTemplate(tid, dims);
                    if (resolved) {
                        card.querySelector('.ec-title').innerHTML =
                            `<span class="ec-dot" style="background:${moodColor(resolved.mood)}"></span>${esc(resolved.title)}${resolved.subtitle ? ` <span class="ec-subtitle">— ${esc(resolved.subtitle)}</span>` : ''}`;
                        card.querySelector('.ec-summary').textContent = resolved.summary;
                    }
                });
            }

            cleanSelection();
            const stageGroups = { 1: [], 2: [], 3: [] };
            DIMENSIONS.filter(d => !d.virtual).forEach(d => { if (!stageGroups[d.stage]) stageGroups[d.stage] = []; stageGroups[d.stage].push(d); });
            const steppedDims = new Set();
            let dimsHtml = '';
            for (const [stageId, dims] of Object.entries(stageGroups)) {
                if (dims.length === 0) continue;
                const stageInfo = SCENARIO.stages[stageId] || {};
                const rows = dims.map(dim => {
                    const visible = isDimVisible(dim);
                    const locked = isDimLocked(dim);
                    const step0 = dim.narrativeSteps && dim.narrativeSteps[0];
                    if (step0 && step0.groups) {
                        steppedDims.add(dim.id);
                        const laterStep = dim.narrativeSteps.find(s => !s.groups);
                        const groupPills = step0.groups.map(g => {
                            const gVals = g.values;
                            const isActive = gVals.includes(sel[dim.id]);
                            return `<span class="dim-pill${isActive?' active':''}" data-group-vals="${esc(gVals.join(','))}">${esc(g.label)}</span>`;
                        }).join('');
                        const subPills = dim.values.filter(v => {
                            const singleGroup = step0.groups.find(g => g.values.length === 1 && g.values[0] === v.id);
                            return !singleGroup;
                        }).map(v => {
                            const disabled = isValueDisabled(dim, v);
                            const isActive = sel[dim.id] === v.id;
                            return `<span class="dim-pill${isActive?' active':''}${disabled&&!isActive?' disabled':''}" data-val="${esc(v.id)}">${esc(v.label)}</span>`;
                        }).join('');
                        const subLabel = dim.label + ' Level';
                        return `<div class="dim-row${visible?'':' hidden'}" data-dim-row="${esc(dim.id)}">
                            <span class="dim-label">${esc(dim.label)}</span><div class="dim-pills">${groupPills}</div></div>`
                            + `<div class="dim-row hidden" data-dim-sub="${esc(dim.id)}">
                            <span class="dim-label">${esc(subLabel)}</span><div class="dim-pills">${subPills}</div></div>`;
                    }
                    const pills = dim.values.map(v => {
                        const disabled = isValueDisabled(dim, v);
                        const isLocked = locked !== null;
                        const isActive = isLocked ? v.id === locked : sel[dim.id] === v.id;
                        return `<span class="dim-pill${isActive?' active':''}${isLocked?' locked':''}${disabled&&!isActive?' disabled':''}" data-val="${esc(v.id)}">${esc(v.label)}</span>`;
                    }).join('');
                    return `<div class="dim-row${visible?'':' hidden'}" data-dim-row="${esc(dim.id)}">
                        <span class="dim-label">${esc(dim.label)}</span><div class="dim-pills">${pills}</div></div>`;
                }).join('');
                dimsHtml += `<div class="dim-stage-panel"><div class="dim-stage-label">Round ${stageId}: ${esc(stageInfo.label||'')}</div>${rows}</div>`;
            }

            const cards = templatesList.map(t => {
                const resolved = resolveTemplate(t.id, effectiveDims());
                const title = resolved ? resolved.title : t.title || t.id;
                const subtitle = resolved ? resolved.subtitle : null;
                const mood = resolved ? resolved.mood : t.mood || 'mixed';
                const summary = resolved ? resolved.summary : t.summary || '';
                return `<div class="explorer-card" data-tid="${esc(t.id)}">
                    <div class="ec-title"><span class="ec-dot" style="background:${moodColor(mood)}"></span>${esc(title)}${subtitle ? ` <span class="ec-subtitle">— ${esc(subtitle)}</span>` : ''}</div>
                    <div class="ec-summary">${esc(summary)}</div></div>`;
            }).join('');

            app.innerHTML = `
                <div class="explorer-screen">
                    <h1>Explore AI Futures</h1>
                    <p class="explorer-subtitle">Set your beliefs about each dimension. The matching outcome updates as you choose.</p>
                    <div class="dim-stages">${dimsHtml}</div>
                    <div class="explorer-match-zone"></div>
                    <hr class="explorer-divider">
                    <div class="explorer-grid-label">All Outcomes</div>
                    <div class="explorer-grid">${cards}</div>
                    <div style="margin-top:2rem;">
                        <button class="btn btn-ghost" data-action="home">\u2190 Back to Start</button>
                        <button class="btn btn-ghost" data-action="reset-dims">Reset</button>
                    </div>
                </div>`;

            DIMENSIONS.forEach(dim => {
                const row = app.querySelector('[data-dim-row="' + dim.id + '"]');
                if (!row) return;

                if (steppedDims.has(dim.id)) {
                    const step0 = dim.narrativeSteps[0];
                    row.querySelectorAll('.dim-pill[data-group-vals]').forEach(pill => {
                        pill.addEventListener('click', () => {
                            const gVals = pill.dataset.groupVals.split(',');
                            if (gVals.length === 1) {
                                delete sel._expandedGroup;
                                _applySelection(sel, dim.id, gVals[0]);
                            } else {
                                if (sel._expandedGroup === dim.id) {
                                    delete sel._expandedGroup;
                                    delete sel[dim.id];
                                } else {
                                    delete sel[dim.id];
                                    sel._expandedGroup = dim.id;
                                }
                            }
                            update();
                        });
                    });
                    const subRow = app.querySelector('[data-dim-sub="' + dim.id + '"]');
                    if (subRow) {
                        subRow.querySelectorAll('.dim-pill[data-val]').forEach(pill => {
                            pill.addEventListener('click', () => {
                                if (pill.classList.contains('disabled')) return;
                                delete sel._expandedGroup;
                                _applySelection(sel, dim.id, pill.dataset.val);
                                update();
                            });
                        });
                    }
                } else {
                row.querySelectorAll('.dim-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        if (pill.classList.contains('locked') || pill.classList.contains('disabled')) return;
                        _applySelection(sel, dim.id, pill.dataset.val);
                        update();
                    });
                });
                }
            });

            app.querySelectorAll('.explorer-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (card.classList.contains('dimmed')) return;
                    const tid = card.dataset.tid;
                    const dims = effectiveDims();
                    const resolved = resolveTemplate(tid, dims);
                    const vk = resolved ? resolved.variantKey : null;
                    navigate({ screen: 'outcome', templateId: tid, variantKey: vk, showPath: false, dims: dims });
                });
            });

            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
            listen('[data-action="reset-dims"]', 'click', () => { sel = {}; delete sel._expandedGroup; update(); });
            update();
        }

        // --- Render: Map (unified view) ---
        function renderMap(initialDims, lockedOutcomeId, initialFlags) {
            let sel = initialDims ? { ...initialDims } : {};
            let lockedId = (lockedOutcomeId && templatesMap[lockedOutcomeId]) ? lockedOutcomeId : '';
            const flags = initialFlags || {};
            let fullQuestions = flags.fullQuestions !== false;
            let expandTimeline = flags.expandTimeline !== false;
            let narrowDim = null;
            let narrowValues = null;
            let timelineDurations = [];

            delete sel._storyNarrowDim;
            delete sel._storyNarrowValues;
            delete sel._expandedGroup;
            Engine.cleanSelection(sel);

            function getLockedTemplate() {
                return lockedId ? templatesMap[lockedId] : null;
            }

            function wouldReachOutcome(dimId, valueId) {
                const t = getLockedTemplate();
                if (!t) return true;
                const test = { ...sel };
                test[dimId] = valueId;
                Engine.cleanSelection(test);
                const eff = Engine.effectiveDims(test);
                return Engine.templatePartialMatch(t, eff);
            }

            function buildTimelineEvents() {
                const events = [];
                let foundFrontier = false;
                const renderOrder = [];
                for (const dim of DIMENSIONS) {
                    if (dim.virtual) continue;
                    if (!Engine.isDimVisible(sel, dim)) continue;
                    renderOrder.push(dim);
                }
                const afterMap = {};
                for (const dim of renderOrder) {
                    const after = Engine.getRenderAfter(sel, dim);
                    if (after) afterMap[dim.id] = after;
                }
                const ordered = [];
                const placed = new Set();
                const deferred = [];
                for (const dim of renderOrder) {
                    if (afterMap[dim.id]) { deferred.push(dim); continue; }
                    ordered.push(dim);
                    placed.add(dim.id);
                    for (const d of deferred) {
                        if (placed.has(afterMap[d.id])) { ordered.push(d); placed.add(d.id); }
                    }
                }
                for (const d of deferred) { if (!placed.has(d.id)) ordered.push(d); }

                for (const dim of ordered) {
                    const locked = Engine.isDimLocked(sel, dim);
                    const value = sel[dim.id] || locked;
                    const step0 = dim.narrativeSteps && dim.narrativeSteps[0];
                    const hasGroups = step0 && step0.groups;
                    const isLockedDim = locked !== null;

                    if (!value) {
                        if (!fullQuestions && !foundFrontier) {
                            foundFrontier = true;
                            if (hasGroups && !(narrowDim === dim.id && narrowValues)) {
                                const siblings = [];
                                for (const g of step0.groups) {
                                    if (g.values.length === 1) {
                                        const vid = g.values[0];
                                        const dv = dim.values.find(v => v.id === vid);
                                        if (dv && Engine.isValueDisabled(sel, dim, dv)) continue;
                                        siblings.push({ value: vid, label: g.label || (dv && dv.label) || vid, dimension: dim.id, reachable: wouldReachOutcome(dim.id, vid) });
                                    } else {
                                        const anyEnabled = g.values.some(vid => { const dv = dim.values.find(v => v.id === vid); return dv && !Engine.isValueDisabled(sel, dim, dv); });
                                        if (!anyEnabled) continue;
                                        siblings.push({ value: '_grp:' + g.values.join(','), label: g.label || '...', dimension: dim.id, reachable: g.values.some(vid => wouldReachOutcome(dim.id, vid)) });
                                    }
                                }
                                if (siblings.length > 0) {
                                    events.push({ headline: '', description: '', durationMin: 0, durationMax: 0, stage: dim.stage, year: '', paramLabel: '', dimLabel: dim.label, dimension: dim.id, selectedValue: null, siblings, isFrontier: true });
                                }
                            } else if (hasGroups && narrowDim === dim.id && narrowValues) {
                                const siblings = narrowValues
                                    .map(vid => dim.values.find(v => v.id === vid))
                                    .filter(dv => dv && !Engine.isValueDisabled(sel, dim, dv))
                                    .map(dv => ({ value: dv.id, label: dv.label, dimension: dim.id, reachable: wouldReachOutcome(dim.id, dv.id) }));
                                if (siblings.length > 0) {
                                    events.push({ headline: '', description: '', durationMin: 0, durationMax: 0, stage: dim.stage, year: '', paramLabel: '', dimLabel: dim.label + ' Level', dimension: dim.id, selectedValue: null, siblings, isFrontier: true });
                                }
                            } else {
                                const siblings = dim.values
                                    .filter(v => !Engine.isValueDisabled(sel, dim, v))
                                    .map(v => ({ value: v.id, label: v.label, dimension: dim.id, reachable: wouldReachOutcome(dim.id, v.id) }));
                                if (siblings.length > 0) {
                                    events.push({ headline: '', description: '', durationMin: 0, durationMax: 0, stage: dim.stage, year: '', paramLabel: '', dimLabel: dim.label, dimension: dim.id, selectedValue: null, siblings, isFrontier: true });
                                }
                            }
                        }
                        continue;
                    }

                    if (hasGroups) {
                        const activeGroup = step0.groups.find(g => g.values.includes(value));
                        const groupSiblings = step0.groups.map(g => {
                            if (g.values.length === 1) {
                                const vid = g.values[0];
                                const dv = dim.values.find(v => v.id === vid);
                                return { value: vid, label: g.label || (dv && dv.label) || vid, dimension: dim.id, reachable: vid === value || wouldReachOutcome(dim.id, vid) };
                            }
                            return { value: '_grp:' + g.values.join(','), label: g.label || '...', dimension: dim.id, reachable: g === activeGroup || g.values.some(vid => wouldReachOutcome(dim.id, vid)) };
                        });
                        const groupSelVal = activeGroup
                            ? (activeGroup.values.length === 1 ? activeGroup.values[0] : '_grp:' + activeGroup.values.join(','))
                            : null;
                        const isSingle = activeGroup && activeGroup.values.length === 1;
                        const grpTE = activeGroup && activeGroup.timelineEvent ? activeGroup.timelineEvent : {};
                        const narr0 = isSingle ? dimNarrativeFor(dim.id, value, sel) : grpTE;
                        events.push({
                            headline: narr0.headline || '',
                            description: narr0.description || '',
                            durationMin: narr0.durationMin != null ? narr0.durationMin : null,
                            durationMax: narr0.durationMax != null ? narr0.durationMax : null,
                            stage: dim.stage, year: '',
                            paramLabel: activeGroup ? (activeGroup.label || dim.label) : dim.label,
                            dimLabel: dim.label,
                            dimension: dim.id, selectedValue: groupSelVal,
                            siblings: groupSiblings, isFrontier: false, isLocked: isLockedDim
                        });
                        if (activeGroup && activeGroup.values.length > 1) {
                            const narr = dimNarrativeFor(dim.id, value, sel);
                            const subSiblings = activeGroup.values
                                .map(vid => dim.values.find(v => v.id === vid))
                                .filter(dv => dv && (!Engine.isValueDisabled(sel, dim, dv) || dv.id === value))
                                .map(dv => ({ value: dv.id, label: dv.label, dimension: dim.id, reachable: dv.id === value || wouldReachOutcome(dim.id, dv.id) }));
                            events.push({
                                headline: narr.headline || '', description: narr.description || '',
                                durationMin: narr.durationMin != null ? narr.durationMin : null,
                                durationMax: narr.durationMax != null ? narr.durationMax : null,
                                stage: dim.stage, year: '',
                                paramLabel: (dim.values.find(v => v.id === value) || {}).label || value,
                                dimLabel: dim.label + ' Level',
                                dimension: dim.id, selectedValue: value,
                                siblings: subSiblings, isFrontier: false, isLocked: isLockedDim
                            });
                        }
                    } else {
                        const narr = dimNarrativeFor(dim.id, value, sel);
                        const dimValue = dim.values.find(v => v.id === value);
                        const paramLabel = dimValue ? dimValue.label : value;
                        const siblings = dim.values
                            .filter(v => !Engine.isValueDisabled(sel, dim, v) || v.id === value)
                            .map(v => ({ value: v.id, label: v.label, dimension: dim.id, reachable: v.id === value || wouldReachOutcome(dim.id, v.id) }));
                        events.push({
                            headline: narr.headline || '', description: narr.description || '',
                            durationMin: narr.durationMin != null ? narr.durationMin : null,
                            durationMax: narr.durationMax != null ? narr.durationMax : null,
                            stage: narr.stage || dim.stage, year: '', paramLabel,
                            dimLabel: dim.label, dimension: dim.id, selectedValue: value,
                            siblings, isFrontier: false, isLocked: isLockedDim
                        });
                    }
                }
                return events;
            }

            function buildTimelineHtml(events) {
                let lastStage = 0;
                const hasDurations = events.some(e => e.durationMin != null);

                timelineDurations = events.map(e => {
                    const min = e.durationMin || 0;
                    const max = e.durationMax != null ? e.durationMax : min;
                    const step = max <= 1 ? 0.25 : 1;
                    return { min, max, current: Math.round((min + max) / 2 / step) * step };
                });
                const ranges = timelineDurations.filter(d => d.max > d.min).map(d => d.max - d.min);
                const meanRange = ranges.length ? ranges.reduce((a, b) => a + b, 0) / ranges.length : 1;
                let cumulative = 0;

                return events.map((e, i) => {
                    let headerHtml = '';
                    if (e.stage && e.stage !== lastStage) { lastStage = e.stage; headerHtml = stageHeaderHtml(e.stage); }
                    const d = timelineDurations[i];
                    const yearLabel = hasDurations ? formatRange(cumulative, cumulative + d.current) : '';
                    cumulative += d.current;

                    const isPoint = d.min === 0 && d.max === 0 && i > 0;
                    const yearHtml = (isPoint || !yearLabel) ? '' : `<div class="timeline-year" data-tsy="${i}">${esc(yearLabel)}</div>`;

                    const headlineHtml = (expandTimeline && e.headline) ? `<div class="timeline-headline">${esc(e.headline)}</div>` : '';
                    const descHtml = (expandTimeline && e.description) ? `<div class="timeline-desc">${esc(e.description)}</div>` : '';

                    let sliderHtml = '';
                    if (expandTimeline && d.max > d.min) {
                        const ratio = (d.max - d.min) / meanRange;
                        const tt = Math.sqrt(ratio);
                        const pct = Math.min(100, Math.max(15, tt * 50));
                        sliderHtml = `
                        <div class="timeline-slider">
                            <input type="range" min="${d.min}" max="${d.max}" step="${d.max <= 1 ? 0.25 : 1}" value="${d.current}" data-tsi="${i}" style="width:${pct.toFixed(0)}%">
                            <span class="timeline-slider-label" data-tsl="${i}">${formatDuration(d.current)}</span>
                        </div>`;
                    }

                    const frontierCls = e.isFrontier ? ' frontier-event' : '';
                    return `${headerHtml}
                        <div class="timeline-event${frontierCls}" data-dim="${esc(e.dimension || '')}">
                            <div class="timeline-top-row">${timelinePillHtml(e)}${yearHtml}</div>
                            ${headlineHtml}
                            ${descHtml}
                            ${sliderHtml}
                        </div>`;
                }).join('');
            }

            function updateTimelineLabels() {
                let cumulative = 0;
                timelineDurations.forEach((d, i) => {
                    const yearLabel = formatRange(cumulative, cumulative + d.current);
                    const yearEl = app.querySelector('[data-tsy="' + i + '"]');
                    if (yearEl) yearEl.textContent = yearLabel;
                    const slLabel = app.querySelector('[data-tsl="' + i + '"]');
                    if (slLabel) slLabel.textContent = formatDuration(d.current);
                    cumulative += d.current;
                });
            }

            function buildQuestionCardHtml() {
                const dim = findNextStoryDim(sel);
                if (!dim) return null;

                let narrativeStep = null;
                if (narrowDim === dim.id && narrowValues) {
                    const laterStep = dim.narrativeSteps && dim.narrativeSteps.find(s => !s.groups);
                    narrativeStep = laterStep || null;
                } else if (dim.narrativeSteps && dim.narrativeSteps.length > 0) {
                    for (const step of dim.narrativeSteps) {
                        if (step.groups) {
                            const anyGroupNeedsChoice = step.groups.some(g => g.values.length > 1 || !sel[dim.id]);
                            if (anyGroupNeedsChoice && !sel[dim.id]) { narrativeStep = step; break; }
                        } else {
                            if (!sel[dim.id]) { narrativeStep = step; break; }
                        }
                    }
                }

                const questionText = (narrativeStep && narrativeStep.text) || dim.questionText || dim.label;
                const questionContext = (narrativeStep && narrativeStep.context) || dim.questionContext || '';
                const questionSource = (narrativeStep && narrativeStep.source) || dim.source;

                let answerCards = [];
                if (narrativeStep && narrativeStep.groups) {
                    for (const group of narrativeStep.groups) {
                        if (group.values.length === 1) {
                            const valId = group.values[0];
                            const dimVal = dim.values.find(v => v.id === valId);
                            if (dimVal && Engine.isValueDisabled(sel, dim, dimVal)) continue;
                            const disabled = !wouldReachOutcome(dim.id, valId);
                            answerCards.push({
                                label: group.label || (dimVal && dimVal.answerLabel) || (dimVal && dimVal.label) || valId,
                                desc: group.desc || (dimVal && dimVal.answerDesc) || '',
                                action: { [dim.id]: valId },
                                disabled
                            });
                        } else {
                            const anyEnabled = group.values.some(vid => {
                                const dv = dim.values.find(v => v.id === vid);
                                return dv && !Engine.isValueDisabled(sel, dim, dv);
                            });
                            if (!anyEnabled) continue;
                            answerCards.push({
                                label: group.label,
                                desc: group.desc || '',
                                action: '_next_step',
                                groupValues: group.values,
                                disabled: false
                            });
                        }
                    }
                } else {
                    const valuesToShow = narrowValues
                        ? dim.values.filter(v => narrowValues.includes(v.id))
                        : dim.values;
                    for (const v of valuesToShow) {
                        if (Engine.isValueDisabled(sel, dim, v)) continue;
                        const variant = v.narrativeVariants ? resolveNarrativeVariant(v.narrativeVariants, sel) : null;
                        const disabled = !wouldReachOutcome(dim.id, v.id);
                        answerCards.push({
                            label: (variant && variant.answerLabel) || v.answerLabel || v.label,
                            desc: (variant && variant.answerDesc) || v.answerDesc || '',
                            action: { [dim.id]: v.id },
                            disabled
                        });
                    }
                }

                let source = '';
                if (questionSource) {
                    source = `<div class="question-source"><a href="${esc(questionSource.url)}" target="_blank" rel="noopener">${esc(questionSource.label)} \u2197</a></div>`;
                }

                const answersHtml = answerCards.map((a, i) => `
                    <div class="answer-card${a.disabled ? ' disabled' : ''}" data-aidx="${i}">
                        <div class="label">${esc(a.label)}</div>
                        ${fullQuestions && a.desc ? `<div class="desc">${esc(a.desc)}</div>` : ''}
                    </div>`).join('');

                return {
                    dim,
                    answerCards,
                    html: `<div class="map-question-card${fullQuestions ? '' : ' compact'}">
                        <div class="question-text">${esc(questionText)}</div>
                        ${fullQuestions && questionContext ? `<div class="question-context">${esc(questionContext)}</div>` : ''}
                        ${fullQuestions ? source : ''}
                        <div class="answers">${answersHtml}</div>
                    </div>`
                };
            }

            function buildOutcomeSectionHtml() {
                const eff = Engine.effectiveDims(sel);
                const matched = templatesList.filter(t => Engine.templateMatches(t, eff));
                if (matched.length === 0) return '';

                const t = matched[0];
                const resolved = resolveTemplate(t.id, eff);
                if (!resolved) return '';

                const key = outcomeKey(t.id, resolved.variantKey);
                markDiscovered(key);

                const storyHtml = (Array.isArray(resolved.story) ? resolved.story : [resolved.story])
                    .map(p => `<p>${esc(p)}</p>`).join('');

                let flavorsHtml = '';
                if (resolved.flavors && resolved.flavors.length > 0) {
                    flavorsHtml = resolved.flavors.map(f => `<p>${esc(f)}</p>`).join('');
                }

                return `<div class="map-outcome-section">
                    <div class="outcome-header">
                        <h1>${esc(resolved.title)}</h1>
                        ${resolved.subtitle ? `<div class="outcome-subtitle">${esc(resolved.subtitle)}</div>` : ''}
                        <span class="mood-badge mood-${resolved.mood}">${esc(resolved.mood)}</span>
                    </div>
                    <div class="outcome-summary">${esc(resolved.summary)}</div>
                    ${flavorsHtml ? `<div class="outcome-flavors">${flavorsHtml}</div>` : ''}
                    <div class="outcome-story">${storyHtml}</div>
                </div>`;
            }

            const lockerOptions = [`<option value="">Open (no lock)</option>`]
                .concat(templatesList.map(t => {
                    return `<option value="${esc(t.id)}"${t.id === lockedId ? ' selected' : ''}>${esc(t.title)}</option>`;
                })).join('');

            function syncHash() {
                let hash = '/map';
                const entries = [];
                for (const dim of DIMENSIONS) {
                    if (sel[dim.id]) entries.push(encodeURIComponent(dim.id) + '=' + encodeURIComponent(sel[dim.id]));
                }
                if (lockedId) entries.push('locked=' + encodeURIComponent(lockedId));
                if (!fullQuestions) entries.push('fq=0');
                if (!expandTimeline) entries.push('et=0');
                if (entries.length > 0) hash += '?' + entries.join('&');
                const stateFlags = { fullQuestions, expandTimeline };
                history.replaceState({ screen: 'map', dims: { ...sel }, lockedOutcomeId: lockedId, flags: stateFlags }, '', '#' + hash);
            }

            function update() {
                Engine.cleanSelection(sel);

                const events = buildTimelineEvents();
                const timelineEl = app.querySelector('.map-timeline');
                if (timelineEl) {
                    timelineEl.innerHTML = buildTimelineHtml(events);
                    timelineEl.querySelectorAll('.timeline-slider input[type="range"]').forEach(slider => {
                        slider.addEventListener('input', () => {
                            const idx = parseInt(slider.dataset.tsi);
                            timelineDurations[idx].current = parseFloat(slider.value);
                            updateTimelineLabels();
                        });
                    });
                    timelineEl.querySelectorAll('.tl-pill').forEach(pill => {
                        pill.addEventListener('click', () => {
                            const action = pill.dataset.pathaction;
                            if (!action) return;
                            const dimId = pill.dataset.dim;
                            const val = pill.dataset.val;
                            const isGrp = val && val.startsWith('_grp:');
                            if (isGrp) {
                                const groupVals = val.slice(5).split(',');
                                if (sel[dimId]) delete sel[dimId];
                                narrowDim = dimId;
                                narrowValues = groupVals;
                            } else if (action === 'frontier' || action === 'change') {
                                Engine.applySelection(sel, dimId, val);
                                narrowDim = null;
                                narrowValues = null;
                            } else if (action === 'unclick') {
                                if (sel[dimId]) Engine.applySelection(sel, dimId, sel[dimId]);
                                narrowDim = null;
                                narrowValues = null;
                            }
                            update();
                        });
                    });
                }

                const questionZone = app.querySelector('.map-question-zone');
                if (questionZone) {
                    const qResult = fullQuestions ? buildQuestionCardHtml() : null;
                    if (qResult) {
                        questionZone.innerHTML = qResult.html;
                        questionZone.style.display = '';
                        questionZone.querySelectorAll('.answer-card').forEach(cardEl => {
                            cardEl.addEventListener('click', () => {
                                if (cardEl.classList.contains('disabled')) return;
                                const idx = parseInt(cardEl.dataset.aidx, 10);
                                const chosen = qResult.answerCards[idx];
                                if (!chosen || chosen.disabled) return;

                                if (chosen.action === '_next_step') {
                                    narrowDim = qResult.dim.id;
                                    narrowValues = chosen.groupValues;
                                    collapseCardThenUpdate(null);
                                    return;
                                }

                                const [dimId, valueId] = Object.entries(chosen.action)[0];
                                Engine.applySelection(sel, dimId, valueId);
                                Engine.cleanSelection(sel);
                                narrowDim = null;
                                narrowValues = null;
                                collapseCardThenUpdate(dimId);
                            });
                        });
                    } else {
                        questionZone.innerHTML = '';
                        questionZone.style.display = 'none';
                    }
                }

                const outcomeZone = app.querySelector('.map-outcome-zone');
                if (outcomeZone) {
                    const nextDim = findNextStoryDim(sel);
                    if (!nextDim) {
                        outcomeZone.innerHTML = buildOutcomeSectionHtml();
                        outcomeZone.style.display = '';
                    } else {
                        outcomeZone.innerHTML = '';
                        outcomeZone.style.display = 'none';
                    }
                }

                syncHash();
            }

            function collapseCardThenUpdate(answeredDimId) {
                const card = app.querySelector('.map-question-zone .map-question-card');
                if (!card) { update(); return; }

                if (!document.startViewTransition) {
                    update();
                    return;
                }

                card.style.viewTransitionName = 'question-morph';

                const transition = document.startViewTransition(() => {
                    update();

                    if (answeredDimId) {
                        const newTimelineEl = app.querySelector('.map-timeline');
                        const newEvts = newTimelineEl.querySelectorAll('.timeline-event[data-dim="' + answeredDimId + '"]');
                        const lastEvt = newEvts.length ? newEvts[newEvts.length - 1] : null;
                        console.log('[morph] dim=' + answeredDimId, 'found=' + newEvts.length, lastEvt);
                        if (lastEvt) lastEvt.style.viewTransitionName = 'question-morph';
                    }

                    const nextCard = app.querySelector('.map-question-zone .map-question-card');
                    if (nextCard) nextCard.style.viewTransitionName = 'question-enter';
                });

                transition.finished.then(() => {
                    app.querySelectorAll('[style*="view-transition-name"]').forEach(el => {
                        el.style.viewTransitionName = '';
                    });
                });
            }


            app.innerHTML = `
                <div class="map-screen">
                    <div class="map-toolbar">
                        <div class="map-locker-wrap">
                            <label class="map-locker-label">Outcome</label>
                            <select class="map-outcome-locker">${lockerOptions}</select>
                            <button class="map-reset-btn" data-action="reset-sel">Reset</button>
                        </div>
                        <div class="map-toggles">
                            <label class="map-toggle"><input type="checkbox" data-flag="fq"${fullQuestions ? ' checked' : ''}><span>Full Questions</span></label>
                            <label class="map-toggle"><input type="checkbox" data-flag="et"${expandTimeline ? ' checked' : ''}><span>Expand Timeline</span></label>
                        </div>
                    </div>
                    <div class="map-timeline timeline"></div>
                    <div class="map-question-zone"></div>
                    <div class="map-outcome-zone" style="display:none"></div>
                    <div class="map-actions">
                        <button class="btn btn-ghost" data-action="home">\u2190 Back to Start</button>
                        <button class="btn btn-ghost" data-action="reset">Reset</button>
                        <button class="btn btn-ghost" data-action="share">Copy Link</button>
                    </div>
                </div>`;

            const lockerEl = app.querySelector('.map-outcome-locker');
            lockerEl.addEventListener('change', () => {
                lockedId = lockerEl.value;
                update();
            });

            app.querySelectorAll('.map-toggle input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.dataset.flag === 'fq') fullQuestions = cb.checked;
                    if (cb.dataset.flag === 'et') expandTimeline = cb.checked;
                    update();
                });
            });

            function resetSelections() {
                sel = {};
                narrowDim = null;
                narrowValues = null;
                update();
            }

            listen('[data-action="reset-sel"]', 'click', resetSelections);
            listen('[data-action="home"]', 'click', () => navigate({ screen: 'intro' }));
            listen('[data-action="reset"]', 'click', resetSelections);
            listen('[data-action="share"]', 'click', () => {
                const url = location.origin + location.pathname + location.hash;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
                } else {
                    showToast(url);
                }
            });

            update();
        }

        // --- Render: Error ---
        function renderError(err) {
            app.innerHTML = `
                <div class="error-screen">
                    <h2>Failed to Load</h2>
                    <p>Singularity Map needs to be served over HTTP to load its data files. If you opened this file directly, try running a local server:</p>
                    <code>python3 -m http.server 8000</code>
                    <p style="margin-top:1rem;font-size:0.85rem;">Then visit <strong>http://localhost:8000</strong></p>
                </div>`;
            console.error(err);
        }

        // --- Helpers ---
        function listen(selector, event, fn) {
            const el = app.querySelector(selector);
            if (el) el.addEventListener(event, fn);
        }

    })();
    </script>
</body>
</html>
